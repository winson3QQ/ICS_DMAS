      <div class="dash-row"><span class="dash-row-label">傷型</span><span class="dash-row-val">${injuryLabel}</span></div>
      <div class="dash-row"><span class="dash-row-label">主訴</span><span class="dash-row-val text-sm" style="text-align:right;max-width:60%">${p.chief_issue||'—'}</span></div>
      <div class="dash-row"><span class="dash-row-label">生命徵象</span><span class="dash-row-val text-sm" style="text-align:right;max-width:60%">${p.vitals_summary||'—'}</span></div>
      <div class="dash-row"><span class="dash-row-label">目前區域</span><span class="dash-row-val">${p.current_zone}</span></div>
      <div class="dash-row"><span class="dash-row-label">處置</span><span class="dash-row-val">${p.disposition}</span></div>
      <div style="margin:4px -4px 0;" class="section-hdr">歷程</div>
      <div style="font-size:12px;line-height:2;background:var(--surface2);padding:8px 12px;border-radius:8px;">
        ${(() => {
          const fmt = iso => iso ? iso.slice(0,16).replace('T',' ') : '—';
          const recolorDot = { red:'🔴', yellow:'🟡', green:'🟢', black:'⚫' };
          // 全部事件統一進時間軸，新→舊排序
          const allEvents = [];
          // 初始檢傷
          const initTriage = triages.find(t => !t.trauma_or_medical);
          const triageTime = initTriage?.triage_at || p.created_at || p.updated_at;
          const triageBy = initTriage?.triage_by || p.operator_name;
          allEvents.push({ at: triageTime, html: `<div><span style="color:var(--text3)">${fmt(triageTime)}</span> <span style="color:var(--primary);font-weight:600;">${triageBy}</span> — 檢傷</div>` });
          // 治療評估
          const assessRecs = triages.filter(t => !!t.trauma_or_medical).sort((a,b) => (a.triage_at||'') < (b.triage_at||'') ? 1 : -1);
          let assessCount = assessRecs.length;
          assessRecs.forEach((t, i) => {
            const label = i === assessCount-1 ? '初評' : `複評 ${assessCount-1-i}`;
            const typeLabel = t.trauma_or_medical === 'trauma' ? '🩸 創傷' : '💊 非創';
            let html = `<div><span style="color:var(--text3)">${fmt(t.triage_at)}</span> <span style="color:var(--primary);font-weight:600;">${t.triage_by||'—'}</span> — ${label} ${typeLabel}</div>`;
            if (t.chief_issue) html += `<div style="margin-left:2em;color:var(--text2);">主訴：${t.chief_issue}</div>`;
            if (t.vitals_summary) html += `<div style="margin-left:2em;color:var(--text2);">徵象：${t.vitals_summary}</div>`;
            const detail = [];
            if (t.condition_types?.length) detail.push(`狀況：${t.condition_types.join('、')}`);
            if (t.tourniquets?.length) detail.push(`止血帶：${t.tourniquets.map(q=>q.site+(q.time?' '+q.time:'')).join('、')}`);
            if (t.trauma_or_medical === 'trauma') {
              if (t.x_hemorrhage_controlled) detail.push(`X 止血：${t.x_hemorrhage_controlled}`);
              if (t.a_airway_patent)          detail.push(`A 呼吸道：${t.a_airway_patent}`);
              if (t.b_breathing_status)       detail.push(`B 呼吸：${t.b_breathing_status}`);
              if (t.c_pulse_quality)          detail.push(`C 循環：${t.c_pulse_quality}`);
              if (t.d_gcs)                    detail.push(`D 意識/GCS：${t.d_gcs}`);
              if (t.e_exposed)                detail.push(`E 暴露：${t.e_exposed}`);
            } else {
              if (t.abc_airway)     detail.push(`A 呼吸道：${t.abc_airway}`);
              if (t.abc_breathing)  detail.push(`B 呼吸：${t.abc_breathing}`);
              if (t.abc_circulation)detail.push(`C 循環：${t.abc_circulation}`);
              if (t.blood_glucose)  detail.push(`血糖：${t.blood_glucose}`);
              if (t.sample_s)       detail.push(`S 主訴：${t.sample_s}`);
              if (t.sample_a)       detail.push(`A 過敏：${t.sample_a}`);
              if (t.sample_m)       detail.push(`M 用藥：${t.sample_m}`);
              if (t.sample_p)       detail.push(`P 病史：${t.sample_p}`);
              if (t.sample_l)       detail.push(`L 最後飲食：${t.sample_l}`);
              if (t.sample_e)       detail.push(`E 誘因：${t.sample_e}`);
              if (t.opqrst_onset)   detail.push(`O 發作：${t.opqrst_onset}`);
              if (t.opqrst_quality) detail.push(`Q 性質：${t.opqrst_quality}`);
              if (t.opqrst_severity)detail.push(`嚴重度：${t.opqrst_severity}`);
            }
            if (t.past_medical_history?.length) detail.push(`病史：${t.past_medical_history.join('、')}`);
            if (t.allergy_flags?.length) detail.push(`過敏：${t.allergy_flags.join('、')}${t.allergy_detail?' — '+t.allergy_detail:''}`);
            if (t.routes?.airway?.length) detail.push(`管路：${t.routes.airway.join('、')}${t.routes.airway_detail?' '+t.routes.airway_detail:''}`);
            if (t.routes?.o2?.length) detail.push(`給氧：${t.routes.o2.join('、')}${t.routes.o2_flow?' '+t.routes.o2_flow+'L/min':''}`);
            if (t.routes?.iv) detail.push(`靜脈通路：已建立${t.routes.iv_detail?' — '+t.routes.iv_detail:''}`);
            if (t.treatment) detail.push(`治療：${t.treatment}`);
            if (detail.length > 0) {
              html += `<div style="margin-left:2em;margin-top:2px;">${detail.map(d=>`<div style="color:var(--text3);font-size:11px;">${d}</div>`).join('')}</div>`;
            }
            allEvents.push({ at: t.triage_at||'', html });
          });
          // 照護紀錄
          const careRecs = triages.filter(t => t.record_type === 'care').sort((a,b) => (a.triage_at||'') < (b.triage_at||'') ? 1 : -1);
          careRecs.forEach((t, i) => {
            let html = `<div><span style="color:var(--text3)">${fmt(t.triage_at)}</span> <span style="color:var(--primary);font-weight:600;">${t.triage_by||'—'}</span> — 👁 照護紀錄 #${careRecs.length - i}</div>`;
            if (t.vitals_summary) html += `<div style="margin-left:2em;color:var(--text2);">徵象：${t.vitals_summary}</div>`;
            if (t.consciousness) html += `<div style="margin-left:2em;color:var(--text2);">意識：${t.consciousness}</div>`;
            if (t.treatment) html += `<div style="margin-left:2em;color:var(--text2);">處置：${t.treatment}</div>`;
            if (t.care_notes) html += `<div style="margin-left:2em;color:var(--text3);font-size:11px;">備註：${t.care_notes}</div>`;
            allEvents.push({ at: t.triage_at||'', html });
          });
          // 轉色
          triages.filter(t => !!t.retriage_to).forEach(t => {
            allEvents.push({ at: t.triage_at||'', html: `<div><span style="color:var(--text3)">${fmt(t.triage_at)}</span> <span style="color:var(--primary);font-weight:600;">${t.triage_by||'—'}</span> — 轉色 ${recolorDot[t.retriage_from]||''}→${recolorDot[t.retriage_to]||t.retriage_to}</div>` });
          });
          if (p.transferred_at) allEvents.push({ at: p.transferred_at, html: `<div><span style="color:var(--text3)">${fmt(p.transferred_at)}</span> <span style="color:var(--primary);font-weight:600;">${p.transferred_by||'—'}</span> — 後送</div>` });
          if (p.handoff_at)     allEvents.push({ at: p.handoff_at,     html: `<div><span style="color:var(--text3)">${fmt(p.handoff_at)}</span> <span style="color:var(--primary);font-weight:600;">${p.handoff_by||'—'}</span> — 交接</div>` });
          // 新→舊排序
          allEvents.sort((a,b) => a.at < b.at ? 1 : -1);
          return allEvents.map(e=>e.html).join('');
        })()}
      </div>
    </div>`,
    `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>
     ${continueBtn}
     ${isDischarged ? '' : `<button class="btn btn-outline flex-1" onclick="closeModal();openSetDisposition(${id},'${p.display_id}')">狀態</button>`}`
  );
}

function refreshZoneCountdowns() {
  const now = new Date();
  document.querySelectorAll('[data-due]').forEach(el => {
    const due = new Date(el.dataset.due);
    const overdue = due < now;
    const minLeft = Math.max(0, Math.floor((due - now) / 60000));
    el.textContent = '再評估 ' + (overdue ? '逾時' : minLeft + '分');
    el.classList.toggle('overdue', overdue);
    el.closest('.patient-card')?.classList.toggle('overdue', overdue);
  });
}

   TRANSFER PAGE
════════════════════════════════════════════════════════════════ */
async function renderTransfer(el) {
  const colorPri = {red:0, yellow:1, green:2, black:3};
  const pending = _state.patients
    .filter(p => p.disposition === '後送')
    .sort((a, b) => {
      const pa = colorPri[a.triage_color] ?? 2;
      const pb = colorPri[b.triage_color] ?? 2;
      if (pa !== pb) return pa - pb;
      return (a.transferred_at || '') < (b.transferred_at || '') ? -1 : 1;
    });
  const doneList = await db.transfers.toArray();

  const pendingHtml = pending.length === 0
    ? `<div style="padding:32px;text-align:center;color:var(--text3);">目前無待後送傷患</div>`
    : pending.map(p => renderTransferCard(p)).join('');

  el.innerHTML = `
    <div class="section-hdr">待後送佇列 (${pending.length})</div>
    ${pendingHtml}
    ${doneList.length > 0 ? `
    <div class="section-hdr">已完成後送 (${doneList.length})</div>
    ${doneList.slice().reverse().map(t => {
      const pt = _state.patients.find(p => p.id === t.patient_id);
      const colorCls = pt ? (pt.triage_color || '') : '';
      return `
      <div class="patient-card ${colorCls} mb-1" style="opacity:.5;cursor:pointer;" onclick="openPatientDetail(${t.patient_id})">
        <div class="flex justify-between items-center">
          <span class="text-sm font-semibold">${t.patient_display_id||'—'}</span>
          <span class="tag tag-green">已交接</span>
        </div>
        <div class="text-xs text-gray mt-1">目的地：${t.destination||'—'} · ${(t.departed_at||'').slice(0,16).replace('T',' ')}</div>
      </div>`;
    }).join('')}` : ''}
  `;
}

function renderTransferCard(p) {
  return renderPatientCard(p); // 與治療區卡片統一格式
}

function _fillPrevVitals() {
  const v = _treatState.prevVitals;
  const c = _treatState.prevChief;
  if (c) { const el = document.getElementById('ta-chief'); if (el && !el.value) el.value = c; }
  if (!v) return;
  const map = { hr:'v-hr', sbp:'v-sbp', dbp:'v-dbp', rr:'v-rr', temp:'v-temp', spo2:'v-spo2', glucose:'v-glucose',
    gcs_e:'v-gcs-e', gcs_v:'v-gcs-v', gcs_m:'v-gcs-m', pupil_r:'v-pupil-r', pupil_l:'v-pupil-l' };
  Object.entries(map).forEach(([key, elId]) => {
    if (v[key] != null && v[key] !== '') {
      const el = document.getElementById(elId);
      if (el && !el.value) el.value = v[key];
    }
  });
}

function selectTreatType(type) {
  _treatState.injuryType = type;

function _buildVitalsSummary() {

async function saveTreatmentAssessment(id) {
  const injType = _treatState.injuryType || null;
  if (!injType) { showToast('請先選擇傷情分類（創傷或非創）'); return; }
  if (!gv('ta-chief')?.trim()) { showToast('請填寫主訴摘要'); return; }
  // 至少填一項生命徵象
  const vitalsSummary = _buildVitalsSummary();
  if (!vitalsSummary) { showToast('請至少填寫一項生命徵象'); return; }
  const now = localISO();
  // 結構化生命徵象
  const vitals = {
    hr: gv('v-hr')||null, sbp: gv('v-sbp')||null, dbp: gv('v-dbp')||null,
    rr: gv('v-rr')||null, temp: gv('v-temp')||null, spo2: gv('v-spo2')||null,
    glucose: gv('v-glucose')||null,
    gcs_e: gv('v-gcs-e')||null, gcs_v: gv('v-gcs-v')||null, gcs_m: gv('v-gcs-m')||null,
    pupil_r: gv('v-pupil-r')||null, pupil_l: gv('v-pupil-l')||null,
  };
  // 條件型 checkbox
  const conditionTypes = injType==='trauma' ? _collectChecked('tr-type-chk') : _collectChecked('nt-type-chk');
  // 止血帶
  const tourniquets = [];
  [['upper-l','上肢左'],['upper-r','上肢右'],['lower-l','下肢左'],['lower-r','下肢右']].forEach(([k,label])=>{
    if(document.getElementById('tq-'+k)?.checked) tourniquets.push({site:label, time:gv('tq-'+k+'-time')||''});
  });
  // 過去病史 multi-check
  const pmh = _collectChecked('pmh-chk');
  // 過敏史（創傷用 tr- 前綴，非創用原始 ID）
  const _allergyPrefix = injType === 'trauma' ? 'tr-' : '';
  const allergyFlags = [];
  if(document.getElementById(_allergyPrefix+'allergy-none')?.checked) allergyFlags.push('無已知過敏');
  if(document.getElementById(_allergyPrefix+'allergy-drug')?.checked) allergyFlags.push('藥物');
  if(document.getElementById(_allergyPrefix+'allergy-food')?.checked) allergyFlags.push('食物');
  if(document.getElementById(_allergyPrefix+'allergy-other')?.checked) allergyFlags.push('其他');
  // 管路
  const airwayDevices = _collectChecked('airway-chk');
  const o2Devices = _collectChecked('o2-chk');
  const routes = {
    airway: airwayDevices, airway_detail: gv('airway-detail')||'',
    o2: o2Devices, o2_flow: gv('o2-flow')||'',
    iv: !!document.getElementById('iv-established')?.checked, iv_detail: gv('iv-detail')||'',
  };
  // 給藥治療
  const treatment = gv('ta-treatment') || '';
  const assessData = {
    trauma_or_medical: injType,
    triage_at: now,
    triage_by: _state.operatorName,
    chief_issue: gv('ta-chief') || '',
    vitals_summary: vitalsSummary,
    vitals_structured: vitals,
    condition_types: conditionTypes,
    tourniquets: tourniquets.length ? tourniquets : null,
    past_medical_history: pmh,
    allergy_flags: allergyFlags,
    allergy_detail: injType === 'trauma' ? gv('tr-sample-a') || '' : gv('sample-a') || '',
    routes,
    treatment,
    // XABCDE
    moi: getMist('tr-moi-sel','tr-moi'),
    x_hemorrhage_controlled: getMist('x-hemorrhage','x-hemorrhage-notes'),
    a_airway_patent: getMist('a-airway','a-airway-notes'),
    b_breathing_status: getMist('b-breathing','b-interventions'),
    c_pulse_quality: getMist('c-pulse','c-interventions'),
    d_gcs: getMist('d-gcs','d-pupils'),
    e_exposed: getMist('e-exposed','e-findings'),
    // SAMPLE/OPQRST
    abc_airway: gv('abc-airway'), abc_breathing: gv('abc-breathing'), abc_circulation: gv('abc-circulation'),
    blood_glucose: gv('blood-glucose'),
    sample_s: gv('sample-s'),
    sample_a: injType === 'trauma' ? gv('tr-sample-a') || '' : gv('sample-a') || '',
    sample_m: injType === 'trauma' ? gv('tr-sample-m') || '' : gv('sample-m') || '',
    sample_p: gv('sample-p'), sample_l: gv('sample-l'), sample_e: gv('sample-e'),
    opqrst_onset: gv('opqrst-o'), opqrst_provoke: gv('opqrst-p'), opqrst_quality: gv('opqrst-q'),
    opqrst_radiation: gv('opqrst-r'), opqrst_severity: gv('opqrst-s'), opqrst_time: gv('opqrst-t'),
  };
  await db.triages.add({ ...assessData, patient_id: id });
  const patientForTimer = await db.patients.get(id);
  const newColor = _treatState.newColor;
  const oldColor = patientForTimer?.triage_color;
  const zoneMap = { red:'紅區', yellow:'黃區', green:'綠區', black:'黑區' };
  const effectiveColor = newColor || oldColor;
  const reassessMins = effectiveColor === 'red' ? 5 : 15;
  // 若有選新燈號，先記錄轉色
  if (newColor && newColor !== oldColor) {
    await db.triages.add({ patient_id: id, triage_at: now, triage_by: _state.operatorName, retriage_from: oldColor, retriage_to: newColor });
  }
  await db.patients.update(id, {
    injury_type: injType,
    care_status: 'assessed',
    assessed_by: _state.operatorName,
    assessed_at: now,
    chief_issue: gv('ta-chief') || '',
    vitals_summary: vitalsSummary,
    vitals_structured: vitals,
    condition_types: conditionTypes,
    past_medical_history: pmh,
    allergy_flags: allergyFlags,
    allergy_detail: gv('sample-a') || '',
    routes,
    treatment,
    ...(newColor && newColor !== oldColor ? { triage_color: newColor, current_zone: zoneMap[newColor] } : {}),
    reassess_due_at: localISO(new Date(Date.now() + reassessMins * 60000)),
    updated_at: now,
  });
  closeModal();
  const toastMsg = newColor && newColor !== oldColor ? `✅ 治療評估已儲存（燈號轉為${zoneMap[newColor]}）` : '✅ 治療評估已儲存';
  showToast(toastMsg);
  renderCurrentTab();
}

async function _buildTreatmentSummary(patientId) {
  const records = await db.triages.where('patient_id').equals(patientId).toArray();
  if (!records || records.length === 0) return '（無治療紀錄）';
  const fmt = iso => iso ? iso.slice(0, 16).replace('T', ' ') : '—';
  records.sort((a, b) => (a.triage_at || '') < (b.triage_at || '') ? -1 : 1);
  const sections = [];
  for (const t of records) {
    const parts = [];
    const hdr = `[${fmt(t.triage_at)}] ${t.triage_by || '—'}`;
    if (t.trauma_or_medical) {
      const lbl = t.trauma_or_medical === 'trauma' ? '治療評估（創傷）' : '治療評估（非創）';
      parts.push(`${hdr} — ${lbl}`);
      if (t.chief_issue)      parts.push(`主訴：${t.chief_issue}`);
      if (t.vitals_summary)   parts.push(`徵象：${t.vitals_summary}`);
      if (t.trauma_or_medical === 'trauma') {
        if (t.x_hemorrhage_controlled) parts.push(`X 止血：${t.x_hemorrhage_controlled}`);
        if (t.a_airway_patent)          parts.push(`A 呼吸道：${t.a_airway_patent}`);
        if (t.b_breathing_status)       parts.push(`B 呼吸：${t.b_breathing_status}`);
        if (t.c_pulse_quality)          parts.push(`C 循環：${t.c_pulse_quality}`);
        if (t.d_gcs)                    parts.push(`D 意識：${t.d_gcs}`);
        if (t.e_exposed)                parts.push(`E 暴露：${t.e_exposed}`);
        if (t.tourniquets?.length)      parts.push(`止血帶：${t.tourniquets.map(q=>`${q.site}${q.time?' '+q.time:''}`).join('、')}`);
      } else {
        if (t.abc_airway)      parts.push(`A 呼吸道：${t.abc_airway}`);
        if (t.abc_breathing)   parts.push(`B 呼吸：${t.abc_breathing}`);
        if (t.abc_circulation) parts.push(`C 循環：${t.abc_circulation}`);
        if (t.sample_m)        parts.push(`用藥：${t.sample_m}`);
        if (t.sample_p)        parts.push(`病史：${t.sample_p}`);
        if (t.sample_a)        parts.push(`過敏：${t.sample_a}`);
      }
      const rts = [];
      if (t.routes?.airway?.length) rts.push(`呼吸道：${t.routes.airway.join('、')}${t.routes.airway_detail?' '+t.routes.airway_detail:''}`);
      if (t.routes?.o2?.length)     rts.push(`給氧：${t.routes.o2.join('、')}${t.routes.o2_flow?' '+t.routes.o2_flow+'L/min':''}`);
      if (t.routes?.iv)             rts.push(`靜脈通路：已建立${t.routes.iv_detail?' — '+t.routes.iv_detail:''}`);
      if (rts.length) parts.push(`處置：${rts.join('；')}`);
      if (t.treatment) parts.push(`給藥治療：${t.treatment}`);
      if (t.condition_types?.length) parts.push(`狀況：${t.condition_types.join('、')}`);
    } else if (t.record_type === 'care') {
      parts.push(`${hdr} — 照護紀錄`);
      if (t.vitals_summary) parts.push(`徵象：${t.vitals_summary}`);
      if (t.consciousness)  parts.push(`意識：${t.consciousness}`);
      if (t.treatment)      parts.push(`處置：${t.treatment}`);
      if (t.care_notes)     parts.push(`備註：${t.care_notes}`);
    } else if (t.retriage_to) {
      const dot = {red:'🔴', yellow:'🟡', green:'🟢', black:'⚫'};
      parts.push(`${hdr} — 轉色 ${dot[t.retriage_from]||t.retriage_from||'?'} → ${dot[t.retriage_to]||t.retriage_to}`);
    } else if (t.vitals_summary) {
      parts.push(`${hdr} — 初始檢傷`);
      parts.push(`徵象：${t.vitals_summary}`);
    }
    if (parts.length) sections.push(parts.join('\n'));
  }
  return sections.length ? sections.join('\n\n') : '（無治療紀錄）';
}

function _onIsbarDirectionChange() {
  const v = document.getElementById('isbar-direction')?.value;
  const g = document.getElementById('isbar-vehicle-group');
  if (g) g.style.display = v === '車' ? 'block' : 'none';
  // 返回收容區類選項不需選醫院
  const noHosp = v === '自容' || v === '容帶回' || v === '自行離開';
  const hospEl = document.getElementById('isbar-hospital');
  if (hospEl) {
    hospEl.disabled = noHosp;
    hospEl.style.opacity = noHosp ? '0.4' : '';
    if (noHosp) hospEl.value = '';
  }
  _syncIsbarR();
}
function _syncIsbarR() {
  const dirRaw = document.getElementById('isbar-direction')?.value || '';
  const vehicle = document.getElementById('isbar-vehicle')?.value?.trim() || '';
  const dir = dirRaw === '車' ? `車 ${vehicle}`.trim() : dirRaw;
  const hosp = document.getElementById('isbar-hospital')?.value || '';
  const rEl = document.getElementById('isbar-r');
  if (!rEl) return;
  if (hosp && dir) rEl.value = `後送至 ${hosp}（${dir}）`;
  else if (hosp)   rEl.value = `後送至 ${hosp}`;
  else if (dir)    rEl.value = dir;
}

let _pendingHandoff = null;

async function completeHandoff(patientId) {
  const p = await db.patients.get(patientId);
  if (!p) return;
  const dirRaw = document.getElementById('isbar-direction')?.value || '';
  if (!dirRaw) { showToast('請選擇離站動向'); return; }
  const vehicle = document.getElementById('isbar-vehicle')?.value?.trim() || '';
  const direction = dirRaw === '車' ? `車 ${vehicle}` : dirRaw;
  const hospital = document.getElementById('isbar-hospital')?.value || '';
  const b = document.getElementById('isbar-b')?.value || '';
  const r = document.getElementById('isbar-r')?.value || '';
  if (!r.trim()) { showToast('請填寫 R — 後送目的地與建議'); return; }
  const checklist = ['止血','呼吸道','給氧','靜脈通路','保暖','固定']
    .filter(item => document.getElementById('chk-'+item)?.checked).join('、');
  _pendingHandoff = { patientId, b, r, checklist, direction, hospital };
  _confirmInModal(
    '確認後送交接',
    `<strong>${p.display_id}</strong> 後送至「<strong>${hospital||direction}</strong>」後無法修改，確認繼續？`,
    'doCompleteHandoff()',
    `openIsbar(${patientId})`
  );
}

async function doCompleteHandoff() {
  const { patientId, b, r, checklist, direction, hospital } = _pendingHandoff;
  _pendingHandoff = null;
  const p = await db.patients.get(patientId);
  if (!p) return;
  const now = localISO();
  await db.transfers.add({
    patient_id: patientId, patient_display_id: p.display_id,
    status: 'completed', destination: r,
    isbar_text: `B: ${b}\nR: ${r}\n已完成: ${checklist||'（未勾選）'}`,
    departed_at: now, handoff_done_at: now, created_at: now,
  });
  await db.patients.update(patientId, {
    disposition:'離開', current_zone:'已離區',
    handoff_by: _state.operatorName, handoff_at: now, updated_at: now,
    transfer_direction: direction, transfer_hospital: hospital,
  });
  closeModal();
  showToast(`${p.display_id} 後送交接完成`);
  // 查所有關聯的未結事件（不限類型）
  const linkedOpen = await db.incidents
    .filter(inc => inc.status !== '已結案' && inc.status !== 'closed' && inc.patient_id === patientId)
    .toArray();
  if (linkedOpen.length > 0) {
    const typeLabels = linkedOpen.map(inc => INCIDENT_TYPES[inc.type] || inc.type).join('、');
    _confirmInModal(
      '關聯事件未結案',
      `${p.display_id} 已後送，但仍有 ${linkedOpen.length} 件未結案事件：\n${typeLabels}\n\n是否全部結案？`,
      `_closeLinkedIncidents(${patientId})`,
      'closeModal()'
    );
  } else {
    renderCurrentTab();
  }
}

async function _closeLinkedIncidents(patientId) {
  const now = localISO();
  const linked = await db.incidents
    .filter(inc => inc.status !== '已結案' && inc.status !== 'closed' && inc.patient_id === patientId)
    .toArray();
  for (const inc of linked) {
    const statusNote = { time: now, text: '傷患已後送，事件自動結案', by: _state.operatorName };
    await db.incidents.update(inc.id, {
      status: '已結案', closed_at: now, closed_by: _state.operatorName,
      notes: [...(inc.notes || []), statusNote],
    });
  }
  closeModal();
  showToast(`${linked.length} 件關聯事件已結案`);
  renderCurrentTab();
}

function _stepperChange(id, delta) {
  const input = document.getElementById(id);
  if (input) { const v = parseInt(input.value) || 0; input.value = Math.max(parseInt(input.min)||0, v + delta); }
}

async function renderResources(el) {
  const items = await db.resources.toArray();

  if (items.length === 0) {
    el.innerHTML = `
      <div class="section-hdr">開場盤點</div>
      <div class="p-2">
        <div class="info-box info mb-2 text-sm">系統載入預設物資清單，請依實際數量調整後確認。</div>
        ${DEFAULT_RESOURCES.map((r,i) => `
          <div class="flex items-center gap-2 mb-2">
            <span class="flex-1 text-sm">${r.name}</span>
            <input type="number" class="form-input" style="width:70px;padding:6px;" id="res-qty-${i}" value="${r.qty_initial}" min="0">
          </div>`).join('')}
        <button class="btn btn-primary btn-full mt-2" onclick="initResources()">確認盤點完成</button>
      </div>
    `;
    return;
  }

  const activeItems = items.filter(r => !r.disabled);
  const disabledItems = items.filter(r => r.disabled);
  const lowItems = activeItems.filter(r => r.qty_current <= r.qty_low_threshold);
  const byCategory = {};
  activeItems.forEach(r => { if (!byCategory[r.category]) byCategory[r.category] = []; byCategory[r.category].push(r); });

  const _renderResCard = (r, gray=false) => {
    const low = !gray && r.qty_current <= r.qty_low_threshold;
    const pct = r.qty_initial > 0 ? Math.min(100, Math.round((r.qty_current / r.qty_initial) * 100)) : 0;
    const barColor = low ? 'var(--orange)' : 'var(--green)';
    return `
      <div class="card mb-1" style="opacity:${gray?.4:1};${low?'border-left:3px solid var(--orange)':''};cursor:pointer;" onclick="openResourceDetail(${r.id})">
        <div class="flex justify-between items-center">
          <span class="font-semibold text-sm" style="${gray?'color:var(--text3);text-decoration:line-through;':''}">${r.name}</span>
          ${gray
            ? `<span style="font-size:12px;color:var(--text3);">已停用</span>`
            : `<span class="${low?'text-red font-bold':''}" style="font-size:15px;">${r.qty_current} <span style="font-size:11px;color:var(--text3);">/ ${r.qty_initial}</span></span>`}
        </div>
        ${!gray ? `
        <div style="height:4px;background:var(--border);border-radius:2px;margin:6px 0 4px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${barColor};border-radius:2px;transition:width .3s;"></div>
        </div>
        ${low ? `<div class="text-xs" style="color:var(--orange);margin-bottom:4px;">⚠️ 低量（門檻 ${r.qty_low_threshold}）</div>` : ''}
        <div class="flex gap-1">
          <button class="pc-btn" onclick="event.stopPropagation();openResourceUse(${r.id})">取用</button>
          <button class="pc-btn" onclick="event.stopPropagation();openResourceAdd(${r.id})">補充</button>
          ${low ? `<button class="pc-btn" style="color:var(--red);border-color:var(--red);" onclick="event.stopPropagation();reportResourceShortage(${r.id})">缺料通報</button>` : ''}
        </div>` : `
        <div class="flex gap-1" style="margin-top:4px;">
          <button class="pc-btn" onclick="event.stopPropagation();restoreResource(${r.id})">恢復</button>
        </div>`}
      </div>`;
  };

  const listHtml = Object.entries(byCategory).map(([cat, catItems]) => `
    <div class="section-hdr">${cat}</div>
    ${catItems.map(r => _renderResCard(r)).join('')}
  `).join('') + (disabledItems.length ? `
    <div class="section-hdr" style="color:var(--text3);">已停用</div>
    ${disabledItems.map(r => _renderResCard(r, true)).join('')}
  ` : '');

  const lastResCheck = parseInt(localStorage.getItem('med_last_res_check') || '0', 10);
  const resCheckOverdue = lastResCheck > 0 && (Date.now() - lastResCheck) > 30 * 60 * 1000;
  const resCheckNever = lastResCheck === 0;
  const lastCheckText = lastResCheck > 0
    ? `上次盤點：${new Date(lastResCheck).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})}`
    : '尚未完成盤點';

  el.innerHTML = `
    ${(resCheckOverdue||resCheckNever) ? `<div class="info-box warn" style="margin:0 14px 10px;">⏰ ${resCheckNever?'尚未完成盤點確認':'距上次盤點逾 30 分鐘'}，請盤點後標記完成。</div>` : ''}
    ${lowItems.length > 0 ? `<div class="info-box warn" style="margin:0 14px 10px;">⚠️ ${lowItems.length} 項低量：${lowItems.map(r=>r.name).join('、')}</div>` : ''}

    <div style="padding:14px;display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-primary btn-full btn-sm" onclick="openAddResourceModal()">＋ 新增物資</button>
      <button class="btn btn-outline btn-full btn-sm" onclick="openImportResourceModal()">📥 匯入清單</button>
      <button class="btn btn-outline btn-full btn-sm" onclick="markResourceCheck()">✓ 標記盤點完成（${lastCheckText}）</button>
      <button class="btn btn-ghost btn-full btn-sm" onclick="resetInventory()">重置盤點</button>
    </div>
  `;
}

async function doUseResource(id) {
  const r = await db.resources.get(id);
  if (!r) return;
  const qty = parseInt(document.getElementById('use-qty')?.value) || 0;
  const reason = document.getElementById('use-reason')?.value?.trim() || '';
  if (qty <= 0) { showToast('數量必須大於 0'); return; }
  if (qty > r.qty_current) { showToast('數量超過庫存'); return; }
  const now = localISO();
  const tx = [...(r.transactions || []), { time: now, type: 'use', qty, reason, by: _state.operatorName }];
  const newQty = r.qty_current - qty;
  await db.resources.update(id, { qty_current: newQty, transactions: tx });
  closeModal();
  if (newQty <= r.qty_low_threshold) {
    await db.incidents.add({
      type:'resource_shortage', severity:'中', status:'已通報',
      notes:[{ time: now, text: `${r.name} 低量（剩 ${newQty}）`, by: _state.operatorName }],
      reported_by: _state.operatorName, assigned_to:'', reported_at: now
    });
    showToast(`⚠️ ${r.name} 低量（剩 ${newQty}），事件已建立`);
  } else {
    showToast(`${r.name} 取用 ${qty} ✅`);
  }
  renderCurrentTab();
}

async function saveNewResource() {
  const name = document.getElementById('new-res-name')?.value?.trim();
  if (!name) { showToast('請填寫物資名稱'); return; }
  const qty = parseInt(document.getElementById('new-res-qty')?.value) || 0;
  await db.resources.add({
    name, category: document.getElementById('new-res-cat')?.value || '其他',
    qty_initial: qty, qty_current: qty,
    qty_low_threshold: parseInt(document.getElementById('new-res-thresh')?.value) || 2,
    transactions: []
  });
  closeModal();
  showToast('物資已新增');
  renderCurrentTab();
}

async function openResourceDetail(id) {
  const r = await db.resources.get(id);
  if (!r) return;
  const txList = (r.transactions || []).slice().reverse();
  const txHtml = txList.length === 0
    ? '<div style="color:var(--text3);padding:8px;">尚無異動紀錄</div>'
    : txList.map(t => {
      const icon = t.type === 'use' ? '📤' : '📥';
      const color = t.type === 'use' ? 'var(--red)' : 'var(--green)';
      const sign = t.type === 'use' ? '-' : '+';
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
        <span>${icon}</span> <span style="color:${color};font-weight:700;">${sign}${t.qty}</span>
        <span style="color:var(--text3);margin-left:4px;">${(t.time||'').slice(0,16).replace('T',' ')}</span>
        <span style="color:var(--primary);font-weight:600;margin-left:4px;">${t.by||''}</span>
        ${t.reason ? `<span style="color:var(--text2);margin-left:4px;">${t.reason}</span>` : ''}
      </div>`;
    }).join('');

    `<div style="text-align:center;padding:10px 0;">
      <span style="font-size:36px;font-weight:900;color:var(--primary);">${r.qty_current}</span>
      <span style="font-size:14px;color:var(--text3);"> / ${r.qty_initial}</span>
    </div>
    <div class="dash-row"><span class="dash-row-label">類別</span><span class="dash-row-val">${r.category}</span></div>
    <div class="dash-row"><span class="dash-row-label">警戒線</span><span class="dash-row-val">${r.qty_low_threshold}</span></div>
    <div class="section-hdr">異動紀錄（${txList.length} 筆）</div>
    <div style="max-height:200px;overflow-y:auto;">${txHtml}</div>`,
    `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>
     <button class="btn btn-outline flex-1" onclick="closeModal();openEditResourceModal(${id})">編輯</button>
     <button class="btn btn-outline flex-1" onclick="closeModal();openResourceUse(${id})">取用</button>
     <button class="btn btn-primary flex-1" onclick="closeModal();openResourceAdd(${id})">補充</button>
     <button class="btn btn-outline flex-1" style="color:var(--red);border-color:var(--red);" onclick="${r.disabled?`restoreResource(${id})`:`confirmDeleteResource(${id})`}">${r.disabled?'恢復':'停用'}</button>`

}

async function openEditResourceModal(id) {
  const r = await db.resources.get(id);
  if (!r) return;
  openModal(`編輯：${r.name}`,
    `<div class="form-group">
      <div class="form-label">物資名稱 <span class="req">*</span></div>
      <input class="form-input" id="edit-res-name" value="${r.name}">
    </div>
    <div class="form-group">
      <div class="form-label">類別</div>
      <select class="form-select" id="edit-res-cat">
        ${['止血類','呼吸道類','循環類','藥品','固定類','保暖類','監測器材','其他'].map(c=>`<option${r.category===c?' selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <div class="form-label">低量警戒線</div>
      <input class="form-input" id="edit-res-thresh" type="number" min="0" value="${r.qty_low_threshold}">

async function saveEditResource(id) {
  const name = document.getElementById('edit-res-name')?.value?.trim();
  if (!name) { showToast('請填寫物資名稱'); return; }
  await db.resources.update(id, {
    name,
    category: document.getElementById('edit-res-cat')?.value || '其他',
    qty_low_threshold: parseInt(document.getElementById('edit-res-thresh')?.value) || 2,
  });
  closeModal();
  showToast('已更新');
  renderCurrentTab();
}

async function confirmDeleteResource(id) {
  const r = await db.resources.get(id);
  if (!r) return;
  window._pendingDeleteResourceId = id;
  _confirmInModal(
    '停用物資',
    `確定停用「${r.name}」？項目將變灰顯示，可隨時恢復。`,
    'doDeleteResource()',
    'closeModal()'
  );
}

async function doDeleteResource() {
  const id = window._pendingDeleteResourceId;
  if (!id) return;
  window._pendingDeleteResourceId = null;
  await db.resources.update(id, { disabled: true });
  closeModal();
  showToast('已停用');
  renderCurrentTab();
}

async function restoreResource(id) {
  await db.resources.update(id, { disabled: false });
  closeModal();
  showToast('已恢復');
  renderCurrentTab();
}

function openImportResourceModal() {
  const presetJson = JSON.stringify(DEFAULT_RESOURCES.map(r=>({name:r.name,category:r.category,qty:r.qty_initial,threshold:r.qty_low_threshold})), null, 2);
  openModal('匯入物資清單',
    `<div style="font-size:12px;color:var(--text3);margin-bottom:8px;">貼入 JSON 陣列，或點「載入預設」再修改數量後匯入。格式：<code>[{"name":"…","category":"…","qty":0,"threshold":2}]</code></div>
    <textarea class="form-input form-textarea" id="import-res-json" style="min-height:180px;font-size:11px;font-family:monospace;">${presetJson}</textarea>`,
    `<button class="btn btn-ghost flex-1" onclick="closeModal()">取消</button>
     <button class="btn btn-primary flex-1" onclick="doImportResources()">匯入（附加）</button>`
  );
}

async function doImportResources() {
  let items;
  try { items = JSON.parse(document.getElementById('import-res-json')?.value || '[]'); }
  catch(e) { showToast('JSON 格式錯誤'); return; }
  if (!Array.isArray(items) || items.length === 0) { showToast('清單為空'); return; }
  const existing = await db.resources.toArray();
  const existingNames = new Set(existing.map(r => r.name));
  const toAdd = items
    .filter(i => i.name && !existingNames.has(i.name))
    .map(i => ({
      name: String(i.name),
      category: i.category || '其他',
      qty_initial: parseInt(i.qty) || 0,
      qty_current: parseInt(i.qty) || 0,
      qty_low_threshold: parseInt(i.threshold) || 2,
      transactions: [],
    }));
  if (toAdd.length === 0) { showToast('無新項目可匯入（名稱重複皆略過）'); return; }
  await db.resources.bulkAdd(toAdd);
  closeModal();
  showToast(`已匯入 ${toAdd.length} 項物資`);
  renderCurrentTab();
}

async function resetInventory() {
  if (!confirm('確定重置所有物資盤點資料？')) return;
  await db.resources.clear();
  renderCurrentTab();
}

/* ════════════════════════════════════════════════════════════════
   INCIDENTS PAGE
════════════════════════════════════════════════════════════════ */
const INCIDENT_TYPES = {
  security_threat:'安全威脅', violent_patient:'暴力傷患',
  infectious_risk:'傳染疑慮', resource_shortage:'物資短缺',
  capacity_overload:'量能超載', equipment_failure:'設備故障', evacuation:'撤退'
};

async function renderIncidents(el) {
  const all = await db.incidents.toArray();
  const open = all.filter(i => i.status !== '已結案' && i.status !== 'closed');
  const closed = all.filter(i => i.status === '已結案' || i.status === 'closed');

  el.innerHTML = `
    <div style="padding:14px;display:flex;justify-content:space-between;align-items:center;">
      ${_state.currentTab === 'events' ? '<div></div>' : '<button class="btn btn-ghost" onclick="_state.morePage=null;renderCurrentTab()">← 返回</button>'}
      <button class="btn btn-danger btn-sm" onclick="openCreateIncident()">＋ 通報事件</button>
    </div>
    <div class="section-hdr">開放事件 (${open.length})</div>
    ${open.length === 0 ? `<div style="padding:24px;text-align:center;color:var(--text3);">目前無開放事件</div>` : ''}
    ${open.map(inc => renderIncidentCard(inc, true)).join('')}
    ${closed.length > 0 ? `
      <div class="section-hdr">已結案 (${closed.length})</div>
      ${closed.slice().reverse().slice(0,5).map(inc => renderIncidentCard(inc, false)).join('')}
    ` : ''}
  `;
}

function renderIncidentCard(inc, isOpen) {
  // 舊資料相容
  if (inc.status === 'open') inc.status = '已通報';
  if (inc.status === 'closed') inc.status = '已結案';
  if (inc.severity === 'high') inc.severity = '高';
  if (inc.severity === 'medium') inc.severity = '中';
  if (inc.severity === 'low') inc.severity = '低';
  const sevColor = inc.severity === '高' ? 'var(--red)' : inc.severity === '中' ? 'var(--orange)' : 'var(--green)';
  const sevTag = inc.severity === '高' ? 'tag-red' : inc.severity === '中' ? 'tag-yellow' : 'tag-green';
  const statusTag = inc.status === '已結案' ? 'tag-green' : inc.status === '處理中' ? 'tag-orange' : 'tag-red';
  const lastNote = Array.isArray(inc.notes) && inc.notes.length > 0 ? inc.notes[inc.notes.length-1].text : (typeof inc.notes === 'string' ? inc.notes : '—');
  return `
    <div class="card mb-2" style="${isOpen ? 'border-left:3px solid '+sevColor : 'opacity:.5'};cursor:pointer;" onclick="openIncidentDetail(${inc.id})">
      <div class="flex justify-between items-center mb-1">
        <span class="font-semibold">${INCIDENT_TYPES[inc.type]||inc.type}</span>
        <div class="flex gap-1"><span class="tag ${sevTag}">${inc.severity||'中'}</span><span class="tag ${statusTag}">${inc.status}</span></div>
      </div>
      <div class="text-sm mb-1" style="white-space:pre-wrap;">${lastNote}</div>
      ${inc.patient_transferred_at ? `<div class="text-xs" style="color:var(--orange);font-weight:600;margin-bottom:2px;">⚠️ 傷患已後送，待 ${inc.patient_transferred_reminded_to||'—'} 手動結案</div>` : ''}
      <div class="text-xs"><span style="color:var(--text3)">${(inc.reported_at||'').slice(0,16).replace('T',' ')}</span> <span style="color:var(--primary);font-weight:600;">${inc.reported_by||'（系統自動）'}</span> — 通報</div>
    </div>
  `;
}

const INCIDENT_GUIDANCE = {
  security_threat: '① 通報組長與安全官\n② 隔離受影響區域，禁止無關人員進入\n③ 確認現場安全後方可繼續作業',
  violent_patient: '① 通報安全官，保持安全距離\n② 請求協助制伏或隔離\n③ 評估傷患與工作人員傷情',
  infectious_risk: '① 立即穿戴 PPE（口罩 N95、手套、護目鏡）\n② 隔離傷患，限制接觸人員\n③ 通報醫療組長，記錄接觸史',
  resource_shortage: '① 確認短缺物資與剩餘量\n② 向後勤組請求緊急補給\n③ 調整處置優先順序，保留關鍵物資',
  capacity_overload: '① 加速評估待後送傷患\n② 通報前進指揮所，請求增援\n③ 啟動量能調配 SOP',
  equipment_failure: '① 立即停止使用故障設備\n② 找替代方案或備用設備\n③ 通報後勤，記錄故障設備',
  evacuation: '① 依撤退 SOP 執行\n② 優先後送紅/黃傷患\n③ 清點全體人員與傷患人數',
};

async function openIncidentDetail(id) {
  const inc = await db.incidents.get(id);
  if (!inc) return;
  // 舊資料相容：英文值映射為中文
  if (inc.status === 'open') inc.status = '已通報';
  if (inc.status === 'closed') inc.status = '已結案';
  if (inc.severity === 'high') inc.severity = '高';
  if (inc.severity === 'medium') inc.severity = '中';
  if (inc.severity === 'low') inc.severity = '低';
  if (typeof inc.notes === 'string') inc.notes = inc.notes ? [{ time: inc.reported_at || '', text: inc.notes, by: inc.reported_by || '' }] : [];
  const sevTag = inc.severity === '高' ? 'tag-red' : inc.severity === '中' ? 'tag-yellow' : 'tag-green';
  const sevLabel = inc.severity || '中';
  const isClosed = inc.status === '已結案';
  const statusTag = isClosed ? 'tag-green' : inc.status === '處理中' ? 'tag-orange' : 'tag-red';
  const guidance = INCIDENT_GUIDANCE[inc.type] || '';

  let patientBanner = '';
  if (inc.patient_id) {
    const lp = _state.patients.find(p => p.id === inc.patient_id) || await db.patients.get(inc.patient_id);
    const colorDot = { red:'🔴', yellow:'🟡', green:'🟢', black:'⚫' };
    const dot = lp ? (colorDot[lp.triage_color]||'👤') : '👤';
    const label = lp ? `${dot} ${lp.display_id}` : `👤 #${inc.patient_id}`;
    patientBanner = `
      <div style="background:var(--red-bg);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div>
          <div style="font-size:11px;color:var(--primary);font-weight:600;margin-bottom:2px;">觸發此事件的傷患</div>
          <div style="font-size:15px;font-weight:700;">${label}</div>
          ${lp?.chief_issue ? `<div style="font-size:12px;color:var(--text2);margin-top:2px;">${lp.chief_issue}</div>` : ''}
        </div>
        <button class="btn btn-primary btn-sm" onclick="closeModal();openPatientDetail(${inc.patient_id})">查看履歷</button>
      </div>`;
  }

  const transferAlert = inc.patient_transferred_at ? `
    <div style="background:var(--orange-bg,#fff3e0);border:1px solid var(--orange);border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600;color:var(--orange);">
      ⚠️ 傷患已後送（${inc.patient_transferred_at.slice(0,16).replace('T',' ')}）<br>
      <span style="font-weight:400;font-size:12px;">提醒 ${inc.patient_transferred_reminded_to||'—'} 手動結案</span>
    </div>` : '';

  const notesHtml = (inc.notes||[]).map(n =>
    `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">` +
    `<span style="color:var(--text3)">${(n.time||'').slice(0,16).replace('T',' ')}</span> ` +
    `<span style="color:var(--primary);font-weight:600;">${n.by||'—'}</span> — ${n.text||''}` +
    `</div>`
  ).join('') || '<span style="color:var(--text3)">無記錄</span>';

  openModal(
    INCIDENT_TYPES[inc.type]||inc.type,
    `<div class="flex flex-col gap-1">
      ${transferAlert}
      ${patientBanner}
      <div class="flex gap-2 mb-2"><span class="tag ${sevTag}">${sevLabel}</span><span class="tag ${statusTag}">${inc.status}</span></div>
      <div class="dash-row"><span class="dash-row-label">通報者</span><span class="dash-row-val">${inc.reported_by||'—'}</span></div>
      <div class="dash-row"><span class="dash-row-label">通報時間</span><span class="dash-row-val text-sm">${(inc.reported_at||'').slice(0,16).replace('T',' ')}</span></div>
      <div class="dash-row"><span class="dash-row-label">負責人</span><span class="dash-row-val">${inc.assigned_to||'未指派'}</span></div>
      ${inc.closed_at ? `<div class="dash-row"><span class="dash-row-label">結案時間</span><span class="dash-row-val text-sm">${inc.closed_at.slice(0,16).replace('T',' ')}</span></div>` : ''}
      ${inc.closed_by ? `<div class="dash-row"><span class="dash-row-label">結案人員</span><span class="dash-row-val">${inc.closed_by}</span></div>` : ''}
      ${guidance ? `<div class="section-hdr" style="margin:8px -4px 4px;">建議處置步驟</div>
        <div class="info-box info" style="font-size:12px;white-space:pre-wrap;">${guidance}</div>` : ''}
      <div class="section-hdr" style="margin:8px -4px 4px;">處置紀錄</div>
      <div>${notesHtml}</div>
      ${!isClosed ? `
      <div class="section-hdr" style="margin:8px -4px 4px;">指派負責人</div>
      <input class="form-input" id="inc-assign" placeholder="姓名或角色" value="${inc.assigned_to||''}">
      <div class="section-hdr" style="margin:8px -4px 4px;">追加處置紀錄</div>
      <textarea class="form-input form-textarea" id="inc-new-note" placeholder="補充說明…" style="min-height:70px;"></textarea>
      ` : ''}
    </div>`,
    isClosed
      ? `<button class="btn btn-ghost btn-full" onclick="closeModal()">關閉</button>`
      : `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>
         ${inc.status !== '處理中' ? `<button class="btn btn-outline flex-1" onclick="updateIncidentStatus(${id},'處理中')">處理中</button>` : ''}
         <button class="btn btn-primary flex-1" onclick="addIncidentNote(${id})">追加紀錄</button>
         ${(inc.notes||[]).length >= 1 ? `<button class="btn flex-1" style="background:var(--green);color:#fff;" onclick="updateIncidentStatus(${id},'已結案')">結案</button>` : `<button class="btn flex-1" style="background:var(--border);color:var(--text3);cursor:not-allowed;" disabled>結案</button>`}`
  );
}

async function addIncidentNote(id) {
  const inc = await db.incidents.get(id);
  if (!inc) { showToast('找不到該事件'); return; }
  if (inc.status === '已結案') { showToast('已結案事件不可修改'); return; }
  const noteText = document.getElementById('inc-new-note')?.value?.trim();
  const assigned = document.getElementById('inc-assign')?.value || '';
  if (!noteText) { showToast('請填寫紀錄內容'); return; }
  const notes = [...(inc.notes||[]), { time: localISO(), text: noteText, by: _state.operatorName }];
  await db.incidents.update(id, { notes, assigned_to: assigned });
  showToast('紀錄已追加');
  closeModal();
  openIncidentDetail(id);
}

async function updateIncidentStatus(id, status) {
  const inc = await db.incidents.get(id);
  if (!inc) { showToast('找不到該事件'); return; }
  if (inc.status === '已結案') { showToast('已結案事件不可變更狀態'); return; }
  if (status === '已結案' && (inc.notes||[]).length < 1) {
    showToast('⚠️ 請先追加處置紀錄才可結案'); return;
  }
  const assigned = document.getElementById('inc-assign')?.value || inc.assigned_to || '';
  const statusNote = { time: localISO(), text: `狀態變更為「${status}」`, by: _state.operatorName };
  const upd = { status, notes: [...(inc.notes||[]), statusNote], assigned_to: assigned };
  if (status === '已結案') {
    upd.closed_at = localISO();
    upd.closed_by = _state.operatorName;
    if (inc.type === 'security_threat' && inc.patient_id) {
      await db.patients.update(inc.patient_id, { security_cleared: 'yes', updated_at: localISO() });
      await loadPatients();
    }
  }
  await db.incidents.update(id, upd);
  closeModal();
  showToast(`事件已更新：${status}`);
  renderCurrentTab();
}

  openModal('通報事件',

          <option value="高">高（立即威脅）</option>

}

function _autoIncidentSeverity() {
  const type = document.getElementById('inc-type')?.value;

  if (!sev) return;
  const HIGH_TYPES = ['security_threat', 'infectious_risk', 'capacity_overload', 'evacuation'];
  sev.value = HIGH_TYPES.includes(type) ? '高' : '中';
}

async function createIncident() {
  const type = document.getElementById('inc-type')?.value;
  const severity = document.getElementById('inc-sev')?.value;
  const noteText = document.getElementById('inc-notes')?.value?.trim();
  const patientId = parseInt(document.getElementById('inc-patient')?.value) || null;
  if (!noteText) { showToast('請填寫事件說明'); return; }

    reported_by: _state.operatorName, assigned_to:'',
    patient_id: patientId, reported_at: localISO(), closed_at: null
  });
  closeModal();
  showToast('事件已通報');
  await renderCurrentTab();

/* ── 自動推算值勤人數（最近 30 分鐘有操作的不重複人員數）── */
async function calcMedicalActiveStaff() {
  const cutoff = new Date(Date.now() - 30 * 60 * 1000).toISOString();
  const operators = new Set();
  const triages = await db.triages.filter(t => (t.triage_at || '') >= cutoff).toArray();
  triages.forEach(t => { if (t.triage_by) operators.add(t.triage_by); });
  const patients = await db.patients.filter(p => (p.updated_at || '') >= cutoff).toArray();
  patients.forEach(p => { if (p.operator_name) operators.add(p.operator_name); });
  return operators.size;
}

async function doQrSnapshot() {
  const r=countByColor('red'), y=countByColor('yellow'), g=countByColor('green'), b=countByColor('black');
  const pending = getPendingTransfer();
  const uuid = generateSnapshotUUID();
  const now = localISO();

  // 來源分布（任務 6a）
  const allPatients = await db.patients.toArray();
  const src_a = allPatients.filter(p => p.source_type === 'A').length;
  const src_b = allPatients.filter(p => p.source_type === 'B').length;
  const src_c = allPatients.filter(p => p.source_type === 'C').length;

  // 自動推算值勤人數（任務 7-2）
  const staff_on_duty = await calcMedicalActiveStaff();

  // 物資現況（任務 8-1）
  const cfg = await db.config.get('supplies_max');
  const supplies_max = cfg?.value || { iv:10, oxygen:5, tourniquet:30 };
  const allRes = await db.resources.toArray();
  const findRes = name => allRes.find(r => r.name && r.name.includes(name));
  const ivRes = findRes('IV') || findRes('iv') || findRes('通路');
  const oxRes = findRes('氧氣');
  const tqRes = findRes('止血帶');
  const supplies = {
    iv:        ivRes ? ivRes.qty_current : supplies_max.iv,
    oxygen:    oxRes ? oxRes.qty_current : supplies_max.oxygen,
    tourniquet: tqRes ? tqRes.qty_current : supplies_max.tourniquet,
  };

  // 人均服務量
  const inPlace = r + y + g + b;
  const staff_ratio = staff_on_duty > 0 ? Math.round(inPlace / staff_on_duty * 10) / 10 : 0;

  // 事件壓力（最近 30 分鐘）
  const cutoff30 = new Date(Date.now() - 30 * 60 * 1000).toISOString();
  const allInc = await db.incidents.toArray();
  const openInc = allInc.filter(i => i.status !== '已結案' && i.status !== 'closed');
  const recent = allInc.filter(i => (i.reported_at || i.opened_at || '') >= cutoff30);
  const incident_pressure = {
    high:   recent.filter(i => i.severity === '高' || i.severity === 'high').length,
    medium: recent.filter(i => i.severity === '中' || i.severity === 'medium').length,
    low:    recent.filter(i => i.severity === '低' || i.severity === 'low').length,
    open_total: openInc.length,
    resolved_30min: allInc.filter(i =>
      (i.status === '已結案' || i.status === 'closed') &&
      (i.closed_at || '') >= cutoff30
    ).length,
  };

  // 精簡 payload（縮短 key 名，減少 QR 密度，提升掃描成功率）
  const payload = { v:1, src:'med', t:now.slice(0,16), r, y, g, b, pe:pending, st:staff_on_duty };
  const payloadStr = JSON.stringify(payload);
  // 完整資料仍存 DB（含 extra 欄位供指揮部使用）
  await db.snapshots.add({ snapshot_uuid:uuid, snapshot_time:now, type:'qr',
    payload: JSON.stringify({ v:1, snapshot_id:uuid, t:now, src:'medical',
      casualties:{ red:r, yellow:y, green:g, black:b }, pending_evac:pending,
      staff_on_duty,
      extra:{ src_a, src_b, src_c, supplies, supplies_max,
              staff_ratio, incident_pressure } }) });

  openModal('QR 快照',
    `<div style="text-align:center">
      <div id="qr-render" style="display:inline-block;margin:16px auto;"></div>
      <div class="info-box info mt-2 text-sm">${uuid.slice(0,8)}…<br>${now.slice(0,16)}</div>
      <div class="text-xs text-gray mt-1">供指揮部幕僚掃描（每 20 分鐘更新一次）</div>
    </div>`,
    `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>`
  );
  setTimeout(()=>{
    try {
      const qr = qrcode(5, 'M');
      qr.addData(payloadStr);
      qr.make();
      const el = document.getElementById('qr-render');
      if (el) el.innerHTML = qr.createImgTag(4, 8);
    } catch(e) {
      const el = document.getElementById('qr-render');
      if (el) el.textContent = 'QR 產生失敗：' + (e.message || e);
    }
  }, 100);
}

function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer || `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-body').scrollTop = 0;
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function _confirmInModal(title, msg, confirmFnStr, cancelFnStr) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = `<p style="padding:16px 4px;font-size:15px;line-height:1.7;">${msg}</p>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-ghost flex-1" onclick="${cancelFnStr||'closeModal()'}">取消</button>
    <button class="btn btn-danger flex-1" onclick="${confirmFnStr}">確認</button>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.remove('hidden'); el.style.opacity='1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.classList.add('hidden'),300); }, 2500);
}

function copyText(txt) {
  navigator.clipboard?.writeText(txt).then(()=>showToast('已複製')).catch(()=>showToast('複製失敗'));
}

  if (piUrl) {

    try {

      const adminUrl = `https://${u.hostname}:${adminPort}/admin.html`;

async function doExportEncrypted() {
  // 收集所有資料表
  const patients  = await db.patients.toArray();
  const triages   = await db.triages.toArray();
  const transfers = await db.transfers.toArray();
  const incidents = await db.incidents.toArray();
  const resources = await db.resources.toArray();
  _exportPayload = JSON.stringify({
    exportAt: localISO(), version: PWA_VERSION,
    patients, triages, transfers, incidents, resources
  });

  openModal('加密匯出資料', `
    <div class="info-box info text-sm mb-2">
      全部資料以 <b>AES-256-GCM</b> 加密後下載為 <code>.enc</code> 檔。<br>
      請設定匯出密碼（與登入 PIN 無關，請妥善保管）。
    </div>
    <div class="form-group">
      <div class="form-label">匯出密碼</div>
      <input type="password" id="exp-pw" class="form-input" placeholder="至少 6 字元" autocomplete="new-password">
    </div>
    <div class="form-group mt-2">
      <div class="form-label">確認密碼</div>
      <input type="password" id="exp-pw2" class="form-input" placeholder="再次輸入" autocomplete="new-password">
    </div>
    <div id="exp-err" class="text-sm text-red mt-1" style="min-height:18px;"></div>
  `, `
    <button class="btn btn-ghost flex-1" onclick="closeModal()">取消</button>
    <button class="btn btn-primary flex-1" onclick="confirmExport()">加密下載</button>
  `);
}

async function confirmExport() {
  const pw   = document.getElementById('exp-pw')?.value  || '';
  const pw2  = document.getElementById('exp-pw2')?.value || '';
  const errEl = document.getElementById('exp-err');
  errEl.textContent = '';
  if (pw.length < 6)   { errEl.textContent = '密碼至少 6 字元'; return; }
  if (pw !== pw2)      { errEl.textContent = '兩次密碼不一致'; return; }
  if (!_exportPayload) { errEl.textContent = '資料遺失，請重新操作'; return; }
  try {
    const encrypted = await ExportCrypto.encrypt(_exportPayload, pw);
    const blob = new Blob([encrypted], { type:'application/octet-stream' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `medical-export-${localISO().slice(0,10)}.enc`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    _exportPayload = null;
    closeModal();
    showToast('加密匯出完成');
  } catch(e) {
    errEl.textContent = '加密失敗：' + (e.message || e);
  }
}

/* ════════════════════════════════════════════════════════════════
   床位容量設定 UI
════════════════════════════════════════════════════════════════ */
function openSlotConfig() {
  const cfg = getSlotConfig();
  openModal('設定各區床位容量', `
    <div class="info-box info text-sm mb-2">
      設定各治療區最大床位數。超過容量時儀表板會顯示警示。
    </div>
    <div class="form-group">
      <div class="form-label">🔴 紅區床位數</div>
      <input type="number" id="slot-red" class="form-input" value="${cfg.red}" min="1" max="99" inputmode="numeric">
    </div>
    <div class="form-group mt-2">
      <div class="form-label">🟡 黃區床位數</div>
      <input type="number" id="slot-yellow" class="form-input" value="${cfg.yellow}" min="1" max="99" inputmode="numeric">
    </div>
    <div class="form-group mt-2">
      <div class="form-label">🟢 綠區床位數</div>
      <input type="number" id="slot-green" class="form-input" value="${cfg.green}" min="1" max="99" inputmode="numeric">
    </div>
  `, `
    <button class="btn btn-ghost flex-1" onclick="closeModal()">取消</button>
    <button class="btn btn-primary flex-1" onclick="saveSlotConfig()">儲存</button>
  `);
}

function saveSlotConfig() {
  const red    = Math.max(1, parseInt(document.getElementById('slot-red')?.value,    10) || DEFAULT_SLOTS.red);
  const yellow = Math.max(1, parseInt(document.getElementById('slot-yellow')?.value, 10) || DEFAULT_SLOTS.yellow);
  const green  = Math.max(1, parseInt(document.getElementById('slot-green')?.value,  10) || DEFAULT_SLOTS.green);
  setSlotConfig(red, yellow, green);
  closeModal();
  showToast('床位設定已儲存');
  renderCurrentTab();
}

/* ════════════════════════════════════════════════════════════════
   物資盤點標記
════════════════════════════════════════════════════════════════ */
function markResourceCheck() {
  localStorage.setItem('med_last_res_check', Date.now().toString());
  showToast('物資盤點已標記完成');
  renderCurrentTab();
}

/* ════════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════════ */
async function boot() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  await initLogin();
}

boot();
