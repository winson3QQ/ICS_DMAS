<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<script>const PWA_VERSION='v0.1.0';</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1565C0">
<title>醫療組</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --primary:#8D0000; --primary-dk:#6B0000; --primary-lt:#B71C1C;
  --bg:#F5F5F5; --surface:#FFFFFF; --surface2:#FAFAFA;
  --text:#1A1A1A; --text2:#666; --text3:#999; --border:#E0E0E0;
  --red:#C62828; --red-bg:#FFEBEE; --red-lt:#EF5350;
  --yellow:#E65100; --yellow-bg:#FFF3E0;
  --green:#2E7D32; --green-bg:#E8F5E9;
  --black-zone:#212121; --black-bg:#EEEEEE;
  --blue:#1565C0; --blue-bg:#E3F2FD;
  --gray:#757575; --gray-bg:#F5F5F5;
  --orange:#E65100; --orange-bg:#FFF3E0;
  --shadow:0 2px 8px rgba(0,0,0,.12); --shadow-sm:0 1px 4px rgba(0,0,0,.08);
  --r:10px; --r-sm:6px; --tab-h:62px; --hdr-h:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-size:16px;font-family:-apple-system,'PingFang TC','微軟正黑體',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:inherit;font-size:16px;}
.hidden{display:none!important;}
.flex{display:flex;} .flex-col{flex-direction:column;} .items-center{align-items:center;}
.justify-between{justify-content:space-between;} .gap-1{gap:6px;} .gap-2{gap:12px;} .gap-3{gap:18px;}
.mt-1{margin-top:6px;} .mt-2{margin-top:12px;} .mt-3{margin-top:18px;}
.mb-1{margin-bottom:6px;} .mb-2{margin-bottom:12px;}
.w-full{width:100%;} .text-sm{font-size:13px;} .text-xs{font-size:11px;}
.font-bold{font-weight:700;} .font-semibold{font-weight:600;}
.text-center{text-align:center;} .text-primary{color:var(--primary);}
.text-red{color:var(--red);} .text-green{color:var(--green);} .text-gray{color:var(--gray);}
.rounded{border-radius:var(--r);} .rounded-sm{border-radius:var(--r-sm);}
.p-2{padding:12px;} .p-3{padding:18px;} .px-3{padding-left:18px;padding-right:18px;}
.py-2{padding-top:12px;padding-bottom:12px;} .overflow-y{overflow-y:auto;}
.flex-1{flex:1;} .relative{position:relative;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r-sm);font-size:15px;font-weight:600;transition:opacity .15s;}
.btn:active{opacity:.75;} .btn-primary{background:var(--primary);color:#fff;}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
.btn-danger{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--text2);padding:8px 12px;}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-full{width:100%;}
.btn-success{background:var(--green);color:#fff;}
.btn-warning{background:var(--orange);color:#fff;}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600;}
.tag-red{background:var(--red-bg);color:var(--red);}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow);}
.tag-green{background:var(--green-bg);color:var(--green);}
.tag-black{background:var(--black-bg);color:var(--black-zone);}
.tag-blue{background:var(--blue-bg);color:var(--blue);}
.tag-gray{background:var(--gray-bg);color:var(--gray);}
.divider{height:1px;background:var(--border);margin:12px 0;}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;background:#fff;color:var(--text);}
.form-input:focus{outline:none;border-color:var(--primary);}
.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;background:#fff;appearance:none;}
.form-textarea{resize:vertical;min-height:72px;}
.form-group{margin-bottom:14px;}
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:14px;}
.info-box{padding:10px 14px;border-radius:var(--r-sm);font-size:13px;}
.info-box.info{background:var(--blue-bg);color:var(--blue);}
.info-box.warn{background:var(--yellow-bg);color:var(--orange);}
.info-box.error{background:var(--red-bg);color:var(--red);}
.info-box.success{background:var(--green-bg);color:var(--green);}
/* ── Layout ── */
#login-screen,#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#login-screen{background:linear-gradient(160deg,var(--primary-dk) 0%,var(--primary) 55%,var(--primary-lt) 100%);color:#fff;align-items:center;justify-content:center;padding:24px;overflow-y:auto;}
/* ── Login screen ── */
.login-wrap{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;}
.login-logo{font-size:60px;margin-bottom:8px;}
.login-title{font-size:24px;font-weight:700;margin-bottom:3px;}
.login-sub{font-size:13px;opacity:.75;margin-bottom:24px;}
.login-notice{font-size:12px;background:rgba(255,255,255,.15);padding:6px 14px;border-radius:8px;color:rgba(255,255,255,.85);margin-bottom:18px;text-align:center;width:100%;}
.login-field{width:100%;margin-bottom:10px;}
.login-input{width:100%;padding:13px 16px;border-radius:var(--r-sm);border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:16px;}
.login-input::placeholder{color:rgba(255,255,255,.5);}
.login-input:focus{outline:none;border-color:#fff;}
.login-btn{width:100%;padding:14px;border-radius:var(--r-sm);background:#fff;color:var(--primary);font-size:16px;font-weight:700;border:none;cursor:pointer;margin-top:6px;transition:opacity .15s;}
.login-btn:active{opacity:.8;}
.login-warn{min-height:18px;font-size:13px;color:#FF8A80;margin-top:8px;text-align:center;width:100%;}
.login-admin-btn{margin-top:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);border-radius:20px;padding:7px 20px;font-size:13px;cursor:pointer;font-family:inherit;}
.login-version{color:rgba(255,255,255,.4);font-size:11px;margin-top:14px;}
/* ── Admin panel (bottom sheet) ── */
#admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;}
#admin-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:18px 18px 0 0;z-index:301;max-height:90vh;flex-direction:column;}
.adm-hdr{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.adm-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.adm-tab{flex:1;padding:10px 0;font-size:14px;font-weight:600;color:var(--text3);border:none;background:transparent;border-bottom:2px solid transparent;cursor:pointer;}
.adm-tab.active{color:var(--primary);border-color:var(--primary);}
.adm-body{overflow-y:auto;padding:14px 16px;flex:1;}
.adm-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:8px;}
.adm-card-name{font-weight:700;font-size:15px;}
.adm-card-meta{font-size:12px;color:var(--text2);margin-top:3px;}
.adm-btn{padding:5px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:inherit;}
.adm-btn-primary{border-color:var(--primary);color:var(--primary);}
.adm-btn-del{border-color:var(--red);color:var(--red);}
.adm-btn-toggle{border-color:var(--orange);color:var(--orange);}
/* ── App shell ── */
#app-header{height:var(--hdr-h);background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;position:relative;z-index:10;}
.hdr-title{font-size:16px;font-weight:700;}
.hdr-role{font-size:12px;opacity:.85;}
.hdr-idle{font-size:11px;opacity:.7;}
#alert-banner{display:none;background:var(--red);color:#fff;padding:8px 14px;font-size:13px;font-weight:600;flex-shrink:0;z-index:9;}
#alert-banner.warn{background:var(--orange);}
#app-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#app-tabs{height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 2px;background:transparent;border:none;color:var(--text3);font-size:10px;font-weight:600;position:relative;cursor:pointer;transition:color .15s;}
.tab-item.active{color:var(--primary);}
.tab-item .tab-icon{font-size:20px;}
.tab-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
/* ── Capacity bar ── */
.cap-bar{display:flex;gap:8px;padding:12px 14px 0;background:var(--surface);margin-bottom:2px;}
.cap-stat{flex:1;text-align:center;padding:8px 4px;border-radius:var(--r-sm);}
.cap-stat .cap-n{font-size:24px;font-weight:700;}
.cap-stat .cap-l{font-size:11px;font-weight:600;margin-top:2px;}
.cap-stat.red{background:var(--red-bg);color:var(--red);}
.cap-stat.yellow{background:var(--yellow-bg);color:var(--yellow);}
.cap-stat.green{background:var(--green-bg);color:var(--green);}
.cap-stat.black{background:var(--black-bg);color:var(--black-zone);}
/* ── Capacity light ── */
.cap-light-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);margin-bottom:8px;}
.cap-light{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:14px;}
.cap-light-dot{width:14px;height:14px;border-radius:50%;}
/* ── Section header ── */
.section-hdr{padding:10px 14px 4px;font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}
/* ── Dashboard rows ── */
.dash-row{background:var(--surface);padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dash-row-label{font-size:14px;color:var(--text2);}
.dash-row-val{font-size:16px;font-weight:700;}
/* ── Patient card ── */
.patient-card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);margin:6px 10px;padding:12px;border-left:4px solid transparent;}
.patient-card.red{border-color:var(--red);}
.patient-card.yellow{border-color:var(--yellow);}
.patient-card.green{border-color:var(--green);}
.patient-card.black{border-color:var(--black-zone);}
.patient-card.overdue{box-shadow:0 0 0 2px var(--red);}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.pc-id{font-size:16px;font-weight:700;}
.pc-timer{font-size:13px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--blue-bg);color:var(--blue);}
.pc-timer.overdue{background:var(--red-bg);color:var(--red);}
.pc-issue{font-size:13px;color:var(--text2);margin-bottom:6px;}
.pc-actions{display:flex;gap:6px;flex-wrap:wrap;}
.pc-btn{padding:5px 10px;border-radius:var(--r-sm);font-size:12px;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--text);}
.pc-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.pc-btn.danger{background:var(--red);border-color:var(--red);color:#fff;}
/* ── Zone tabs ── */
.zone-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.zone-tab{padding:10px 16px;font-size:14px;font-weight:600;color:var(--text3);border:none;background:transparent;border-bottom:3px solid transparent;white-space:nowrap;cursor:pointer;}
.zone-tab.active.red{color:var(--red);border-color:var(--red);}
.zone-tab.active.yellow{color:var(--yellow);border-color:var(--yellow);}
.zone-tab.active.green{color:var(--green);border-color:var(--green);}
.zone-tab.active.black{color:var(--black-zone);border-color:var(--black-zone);}
/* ── Intake form ── */
.source-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px;}
.source-btn{padding:12px 6px;border-radius:var(--r-sm);border:2px solid var(--border);background:transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;}
.source-btn.active{border-color:var(--primary);background:var(--blue-bg);color:var(--primary);}
.intake-form{padding:0 14px 80px;}
.trauma-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.trauma-btn{padding:14px;border-radius:var(--r-sm);border:2px solid var(--border);background:transparent;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;}
.trauma-btn.active.trauma{border-color:var(--red);background:var(--red-bg);color:var(--red);}
.trauma-btn.active.medical{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.triage-color-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.triage-color-btn{padding:12px 4px;border-radius:var(--r-sm);border:2px solid transparent;font-size:13px;font-weight:700;cursor:pointer;text-align:center;}
.triage-color-btn.red{background:var(--red-bg);color:var(--red);}
.triage-color-btn.yellow{background:var(--yellow-bg);color:var(--yellow);}
.triage-color-btn.green{background:var(--green-bg);color:var(--green);}
.triage-color-btn.black{background:var(--black-bg);color:var(--black-zone);}
.triage-color-btn.selected{border-color:currentColor;box-shadow:0 0 0 2px currentColor;}
.start-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.start-item{padding:10px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:#fff;display:flex;flex-direction:column;gap:4px;}
.start-item label{font-size:11px;font-weight:700;color:var(--text3);}
.start-item select{border:none;padding:0;font-size:14px;font-weight:600;background:transparent;}
/* ── Modal / overlay ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;}
.modal-hdr{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-title{font-size:17px;font-weight:700;}
.modal-body{overflow-y:auto;padding:16px 18px;flex:1;}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
/* ── Toast ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 18px;border-radius:24px;font-size:14px;z-index:200;pointer-events:none;transition:opacity .3s;}
/* ── Idle warning overlay ── */
#idle-warning{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:150;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;gap:16px;}
.idle-title{font-size:22px;font-weight:700;}
.idle-sub{font-size:15px;opacity:.8;}
.idle-cd{font-size:48px;font-weight:700;color:#FF8A80;}
/* ── Stub page ── */
.stub-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center;color:var(--text3);}
.stub-icon{font-size:48px;margin-bottom:16px;}
.stub-title{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.stub-desc{font-size:14px;line-height:1.6;}
/* ── Print hide ── */
@media print{#app-tabs,#app-header,#alert-banner{display:none!important;}}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">🏥</div>
    <div class="login-title">醫療組管理系統</div>
    <div class="login-sub">Medical Team PWA · 離線優先</div>
    <div class="login-notice" id="login-notice" style="display:none;"></div>
    <div class="login-field">
      <input class="login-input" id="login-username" type="text" placeholder="帳號（任務代號）" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="login-field">
      <input class="login-input" id="login-pin" type="password" inputmode="numeric" placeholder="PIN（4–6 位數字）" maxlength="6" autocomplete="off"
        onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <button class="login-btn" onclick="handleLogin()">登入</button>
    <div class="login-warn" id="login-warn"></div>
    <button class="login-admin-btn" onclick="openAdminPanel()">⚙️ 帳號管理</button>
    <div class="login-version">醫療組 PWA v0.1.0 · 規格 v0.4</div>
  </div>
</div>

<!-- ══ ADMIN PANEL ═══════════════════════════════════════════════ -->
<div id="admin-overlay" onclick="closeAdminPanel()"></div>
<div id="admin-panel">
  <div class="adm-hdr">
    <span style="font-size:17px;font-weight:700;">⚙️ 帳號管理</span>
    <button class="btn btn-ghost" onclick="closeAdminPanel()" style="font-size:18px;">✕</button>
  </div>
  <!-- PIN verify -->
  <div id="adm-pin-screen" style="padding:20px 18px;">
    <div class="form-group"><label class="form-label">管理員 PIN</label>
      <input id="adm-pin-input" type="password" inputmode="numeric" class="form-input" placeholder="輸入管理員 PIN" maxlength="6"
        onkeydown="if(event.key==='Enter')adminVerify()">
    </div>
    <button class="btn btn-primary btn-full" onclick="adminVerify()">確認</button>
    <div id="adm-pin-err" style="color:var(--red);font-size:13px;margin-top:8px;min-height:16px;"></div>
  </div>
  <!-- Main tabs (hidden until verified) -->
  <div id="adm-main" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="adm-tabs">
      <button class="adm-tab active" id="adm-tab-list" onclick="admShowTab('list')">帳號列表</button>
      <button class="adm-tab" id="adm-tab-add" onclick="admShowTab('add')">新增帳號</button>
      <button class="adm-tab" id="adm-tab-cfg" onclick="admShowTab('cfg')">設定</button>
    </div>
    <div class="adm-body">
      <div id="adm-panel-list"></div>
      <div id="adm-panel-add" style="display:none;">
        <div class="form-group"><label class="form-label">帳號（唯一）</label><input class="form-input" id="adm-new-user" placeholder="例：醫官甲"></div>
        <div class="form-group"><label class="form-label">顯示名稱</label><input class="form-input" id="adm-new-display" placeholder="姓名或工號"></div>
        <div class="form-group"><label class="form-label">角色</label>
          <select class="form-select" id="adm-new-role">
            <option value="組長">組長</option><option value="副組長">副組長</option>
            <option value="檢傷官">檢傷官</option><option value="治療官">治療官</option>
            <option value="後送官">後送官</option><option value="後勤官">後勤官</option>
            <option value="通訊官">通訊官</option><option value="機動人員">機動人員</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">PIN（4–6 位）</label><input class="form-input" id="adm-new-pin" type="password" inputmode="numeric" maxlength="6" placeholder="設定登入 PIN"></div>
        <button class="btn btn-primary btn-full" onclick="admAddAccount()">建立帳號</button>
        <div id="adm-add-msg" style="font-size:13px;margin-top:8px;min-height:16px;"></div>
      </div>
      <div id="adm-panel-cfg" style="display:none;">
        <div class="form-group"><label class="form-label">修改管理員 PIN</label>
          <input class="form-input" id="adm-cfg-pin" type="password" inputmode="numeric" maxlength="6" placeholder="新管理員 PIN（4–6 位）">
        </div>
        <button class="btn btn-primary btn-full" onclick="admChangeAdminPin()">更新管理員 PIN</button>
        <div id="adm-cfg-msg" style="font-size:13px;margin-top:8px;min-height:16px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ═══════════════════════════════════════════════════════ -->
<div id="app" class="hidden">
  <div id="app-header">
    <div>
      <div class="hdr-title">🏥 醫療組</div>
      <div class="hdr-role" id="hdr-role"></div>
    </div>
    <div style="text-align:right">
      <div class="hdr-idle" id="hdr-idle"></div>
      <div style="font-size:11px;opacity:.7" id="hdr-ws"></div>
    </div>
  </div>

  <div id="alert-banner"></div>

<!-- ══ SCRIPTS ════════════════════════════════════════════════════ -->
<script src="lib/dexie.min.js"></script>
<script src="lib/qrcode.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════════════════════════
   DATABASE
════════════════════════════════════════════════════════════════ */
const db = new Dexie('MedicalPWA_v1');
db.version(1).stores({
  patients:  '++id, display_id, triage_color, current_zone, injury_type, disposition, updated_at',
  triages:   '++id, patient_id, triage_at, trauma_or_medical',
  slots:     '++id, zone, status',
  transfers: '++id, patient_id, status, created_at',
  resources: '++id, name, category',
  incidents: '++id, type, severity, status, reported_at',
  shifts:    '++id, started_at, role, operator_name',
  snapshots: '++id, snapshot_uuid, snapshot_time, type',
  config:    'key'
});
db.version(2).stores({
  patients:  '++id, display_id, triage_color, current_zone, injury_type, disposition, updated_at',
  triages:   '++id, patient_id, triage_at, trauma_or_medical',
  slots:     '++id, zone, status',
  transfers: '++id, patient_id, status, created_at',
  resources: '++id, name, category',
  incidents: '++id, type, severity, status, reported_at',
  shifts:    '++id, started_at, role, operator_name',
  snapshots: '++id, snapshot_uuid, snapshot_time, type',
  config:    'key',
  accounts:  '++id, username, role, status'
});

/* ════════════════════════════════════════════════════════════════
   CRYPTO (PIN hash)
════════════════════════════════════════════════════════════════ */
const Crypto = {
  async hashPin(pin, salt='medical-pwa-v2') {
    const enc = new TextEncoder();
    const raw = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveBits']);
    const bits = await crypto.subtle.deriveBits(
      { name:'PBKDF2', salt:enc.encode(salt), iterations:100000, hash:'SHA-256' }, raw, 256
    );
    return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
};

/* ════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════ */
let _state = {
  currentAccountId: null,
  loginAttempts: 0,
  loginCooldown: false,
  operatorName: '',
  role: '',
  currentTab: 'dashboard',
  currentZone: 'red',
  ws: null,
  wsConnected: false,
  idleTimer: null,
  idleWarnTimer: null,
  idleCountdown: null,
  idleWarning: false,
  patients: [],
  intakeSource: 'A',    // A=前進MIST, B=收容, C=自行
  intakeInjury: null,   // 'trauma' | 'medical'
  intakeTriageColor: null,
  morePage: null,       // null | 'resources' | 'incidents' | 'shift'
  zoneTimer: null,      // interval for zone card countdown refresh
};

/* ════════════════════════════════════════════════════════════════
   PIN LOGIC
════════════════════════════════════════════════════════════════ */
const IDLE_WARN_S = 90;
const IDLE_LOCK_S = 30;

/* ════════════════════════════════════════════════════════════════
   DEFAULT ACCOUNTS
════════════════════════════════════════════════════════════════ */
const DEFAULT_ACCOUNTS_RAW = [
  { username:'組長',     display_name:'組長',     role:'組長',   pin:'1234' },
  { username:'副組長',   display_name:'副組長',   role:'副組長', pin:'1234' },
  { username:'檢傷官甲', display_name:'檢傷官甲', role:'檢傷官', pin:'1234' },
  { username:'檢傷官乙', display_name:'檢傷官乙', role:'檢傷官', pin:'1234' },
  { username:'治療官',   display_name:'治療官',   role:'治療官', pin:'1234' },
  { username:'後送官',   display_name:'後送官',   role:'後送官', pin:'1234' },
  { username:'後勤官',   display_name:'後勤官',   role:'後勤官', pin:'1234' },
  { username:'通訊官',   display_name:'通訊官',   role:'通訊官', pin:'1234' },
  { username:'機動甲',   display_name:'機動甲',   role:'機動人員', pin:'1234' },
];
const DEFAULT_ADMIN_PIN = '0000';

async function seedAccounts() {
  const count = await db.accounts.count();
  if (count > 0) return false;
  const now = new Date().toISOString();
  for (const a of DEFAULT_ACCOUNTS_RAW) {
    const pin_hash = await Crypto.hashPin(a.pin);
    await db.accounts.add({ username:a.username, display_name:a.display_name, role:a.role, pin_hash, status:'active', created_at:now });
  }
  const adminHash = await Crypto.hashPin(DEFAULT_ADMIN_PIN);
  await db.config.put({ key:'adminPinHash', value:adminHash });
  return true; // first boot
}

/* ════════════════════════════════════════════════════════════════
   LOGIN
════════════════════════════════════════════════════════════════ */
async function initLogin() {
  const firstBoot = await seedAccounts();
  if (firstBoot) {
    const notice = document.getElementById('login-notice');
    notice.textContent = '首次啟動：預設帳號已建立，PIN 均為 1234，管理員 PIN 為 0000。請儘早修改。';
    notice.style.display = 'block';
  }
}

async function handleLogin() {
  const warn = document.getElementById('login-warn');
  warn.textContent = '';
  if (_state.loginCooldown) { warn.textContent = '⚠️ 冷卻中，請稍候'; return; }

  const username = document.getElementById('login-username').value.trim();
  const pin = document.getElementById('login-pin').value;

  if (!username) { warn.textContent = '⚠️ 請輸入帳號'; return; }
  if (!pin || pin.length < 4 || !/^\d+$/.test(pin)) { warn.textContent = '⚠️ PIN 需為 4–6 位數字'; return; }

  const acct = await db.accounts.where('username').equals(username).first();
  if (!acct) { warn.textContent = '❌ 帳號不存在'; return; }
  if (acct.status === 'suspended') { warn.textContent = '❌ 帳號已停用，請聯絡管理員'; return; }

  const hash = await Crypto.hashPin(pin);
  if (hash !== acct.pin_hash) {
    _state.loginAttempts++;
    document.getElementById('login-pin').value = '';
    if (_state.loginAttempts >= 3) {
      _state.loginCooldown = true;
      let cd = 30;
      warn.textContent = `❌ 錯誤次數過多，冷卻 ${cd}s`;
      const t = setInterval(()=>{
        cd--;
        warn.textContent = cd > 0 ? `冷卻中：${cd}s` : '';
        if (cd <= 0) { clearInterval(t); _state.loginCooldown=false; _state.loginAttempts=0; }
      }, 1000);
    } else {
      warn.textContent = `❌ PIN 錯誤（${_state.loginAttempts}/3）`;
    }
    return;
  }

  _state.loginAttempts = 0;
  _state.currentAccountId = acct.id;
  _state.role = acct.role;
  _state.operatorName = acct.display_name || acct.username;
  document.getElementById('login-pin').value = '';
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('hdr-role').textContent = `${acct.role}・${_state.operatorName}`;
  startIdleTimer();
  loadPatients().then(renderCurrentTab);
  connectWS();
}

/* ════════════════════════════════════════════════════════════════
   IDLE TIMER  (90s 警告 + 30s 自動登出)
════════════════════════════════════════════════════════════════ */
function startIdleTimer() {
  clearIdleTimers();
  _state.idleTimer = setTimeout(showIdleWarning, IDLE_WARN_S * 1000);
}

function showIdleWarning() {
  _state.idleWarning = true;
  document.getElementById('idle-warning').classList.remove('hidden');
  let cd = IDLE_LOCK_S;
  document.getElementById('idle-cd').textContent = cd;
  _state.idleWarnTimer = setInterval(()=>{
    cd--;
    document.getElementById('idle-cd').textContent = cd;
    updateIdleHdr(cd);
    if (cd <= 0) { clearIdleTimers(); doLock(); }
  }, 1000);
}

function resetIdle() {
  clearIdleTimers();
  document.getElementById('idle-warning').classList.add('hidden');
  _state.idleWarning = false;
  startIdleTimer();
  updateIdleHdr(IDLE_WARN_S);
}

function doLock() {
  document.getElementById('idle-warning').classList.add('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  const warn = document.getElementById('login-warn');
  warn.textContent = '⚠️ 閒置登出，請重新登入';
  _state.idleWarning = false;
  _state.currentAccountId = null;
  _state.role = '';
  _state.operatorName = '';
}

function clearIdleTimers() {
  clearTimeout(_state.idleTimer);
  clearInterval(_state.idleWarnTimer);
  clearInterval(_state.idleCountdown);
}

function updateIdleHdr(secsLeft) {
  const el = document.getElementById('hdr-idle');
  if (!el) return;
  const m = Math.floor(secsLeft/60), s = secsLeft%60;
  el.textContent = secsLeft <= 30 ? `鎖定 ${s}s` : '';
}

// 任何互動都重置
['touchstart','mousedown','keydown','scroll'].forEach(ev=>{
  document.addEventListener(ev, ()=>{ if(!_state.idleWarning && _state.role) startIdleTimer(); }, { passive:true });
});

/* ════════════════════════════════════════════════════════════════
   WEBSOCKET
════════════════════════════════════════════════════════════════ */
function connectWS() {
  const piIp = '192.168.100.30';
  const url = `ws://${piIp}:8775`;
  try {
    _state.ws = new WebSocket(url);
    _state.ws.onopen = ()=>{ _state.wsConnected=true; setWsStatus('●','#69F0AE'); };
    _state.ws.onclose = ()=>{ _state.wsConnected=false; setWsStatus('○','rgba(255,255,255,.5)'); setTimeout(connectWS, 5000); };
    _state.ws.onerror = ()=>{ _state.wsConnected=false; setWsStatus('○','rgba(255,255,255,.5)'); };
    _state.ws.onmessage = e=>{ try{ handleWsMsg(JSON.parse(e.data)); }catch(_){} };
  } catch(_) {}
}

function setWsStatus(sym, color) {
  const el = document.getElementById('hdr-ws');
  if (el) { el.textContent = `WS ${sym}`; el.style.color = color; }
}

function handleWsMsg(msg) {
  // 未來處理 Pi 推送的同步訊息
}

/* ════════════════════════════════════════════════════════════════
   DB HELPERS
════════════════════════════════════════════════════════════════ */
async function loadPatients() {
  _state.patients = await db.patients.where('disposition').notEqual('discharged').toArray();
}

function countByColor(color) {
  return _state.patients.filter(p=>p.triage_color===color && p.current_zone !== '已離區').length;
}

function countByZone(zone) {
  return _state.patients.filter(p=>p.current_zone===zone).length;
}

function getPendingTransfer() {
  return _state.patients.filter(p=>p.disposition==='後送').length;
}

function nextDisplayId() {
  const n = _state.patients.length + 1;
  return `M${String(n).padStart(3,'0')}`;
}

function generateSnapshotUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}

/* ════════════════════════════════════════════════════════════════
   TAB ROUTING
════════════════════════════════════════════════════════════════ */
function switchTab(tab) {
  _state.currentTab = tab;
  _state.morePage = null;
  if (_state.zoneTimer) { clearInterval(_state.zoneTimer); _state.zoneTimer = null; }
  document.querySelectorAll('.tab-item').forEach(el=>el.classList.toggle('active', el.dataset.tab===tab));
  renderCurrentTab();
}

async function renderCurrentTab() {
  await loadPatients();
  await refreshAlertBanner();
  const content = document.getElementById('app-content');
  if (_state.zoneTimer) { clearInterval(_state.zoneTimer); _state.zoneTimer = null; }
  switch(_state.currentTab) {
    case 'dashboard': renderDashboard(content); break;
    case 'intake':    renderIntake(content); break;
    case 'zones':
      renderZones(content);
      _state.zoneTimer = setInterval(()=>{ if(_state.currentTab==='zones') refreshZoneCountdowns(); }, 30000);
      break;
    case 'transfer':  await renderTransfer(content); break;
    case 'more':      await renderMore(content); break;
  }
}

/* ════════════════════════════════════════════════════════════════
   ALERT BANNER
════════════════════════════════════════════════════════════════ */
async function refreshAlertBanner() {
  const banner = document.getElementById('alert-banner');
  const openIncidents = await db.incidents.where('status').equals('open').count();
  const redFull = countByZone('紅區') > 0 && getRedSlotsFree() === 0;
  const securityOpen = openIncidents > 0 && await db.incidents.where({status:'open',type:'security_threat'}).count() > 0;
  if (securityOpen) {
    banner.style.display='block'; banner.className='';
    banner.textContent = '🚨 安全威脅事件 — 請立即確認';
  } else if (redFull) {
    banner.style.display='block'; banner.className='';
    banner.textContent = '🔴 紅區滿載 — 請立即通報組長';
  } else if (openIncidents > 0) {
    banner.style.display='block'; banner.className='warn';
    banner.textContent = `⚠️ ${openIncidents} 件開放事件`;
  } else {
    banner.style.display='none';
  }
}

function getRedSlotsFree() {
  // TODO: 從 slots 表讀取；先用簡單估算
  return 999;
}

/* ════════════════════════════════════════════════════════════════

    el.classList.toggle('selected', el.classList.contains(c));
  });

function gv(id) { const el=document.getElementById(id); return el ? el.value.trim() : ''; }

async function submitIntake() {
  if (!_state.intakeTriageColor) { showToast('請選擇檢傷分色'); return; }
  const zoneMap = { red:'紅區', yellow:'黃區', green:'綠區', black:'黑區' };
  const now = new Date().toISOString();

  // Build triage record
  const triageData = {
    triage_at: now,
    triage_by: _state.operatorName,
    trauma_or_medical: _state.intakeInjury,
    start_walk: gv('start-walk'),
    start_breathing: gv('start-breathing'),
    start_circulation: gv('start-circ'),
    start_mental: gv('start-mental'),
    // MIST
    mist_m: gv('mist-m'), mist_i: gv('mist-i'), mist_s: gv('mist-s'), mist_t: gv('mist-t'),
    // XABCDE (trauma)
    x_hemorrhage_controlled: gv('x-hemorrhage'),
    a_airway_patent: gv('a-airway'), a_airway_notes: gv('a-airway-notes'),
    b_breathing_status: gv('b-breathing'), b_interventions: gv('b-interventions'),
    c_pulse_quality: gv('c-pulse'), c_interventions: gv('c-interventions'),
    d_gcs: gv('d-gcs'), d_pupils: gv('d-pupils'),
    e_exposed: gv('e-exposed'), e_findings: gv('e-findings'),
    // SAMPLE/OPQRST (medical)
    abc_airway: gv('abc-airway'), abc_breathing: gv('abc-breathing'), abc_circulation: gv('abc-circulation'),
    blood_glucose: gv('blood-glucose'),
    sample_s: gv('sample-s'), sample_a: gv('sample-a'), sample_m: gv('sample-m'),
    sample_p: gv('sample-p'), sample_l: gv('sample-l'), sample_e: gv('sample-e'),
    opqrst_onset: gv('opqrst-o'), opqrst_provoke: gv('opqrst-p'), opqrst_quality: gv('opqrst-q'),
    opqrst_radiation: gv('opqrst-r'), opqrst_severity: gv('opqrst-s'), opqrst_time: gv('opqrst-t'),
  };

  const patientData = {
    display_id: nextDisplayId(),
    triage_color: _state.intakeTriageColor,
    injury_type: _state.intakeInjury,
    current_zone: zoneMap[_state.intakeTriageColor],
    source_type: _state.intakeSource,
    chief_issue: gv('chief-issue') || gv('mist-i') || gv('sample-s') || '',
    vitals_summary: gv('vitals-summary') || gv('mist-s') || '',
    security_cleared: gv('intake-security') !== 'pending',
    registered_with_shelter: gv('intake-shelter') || 'not_registered',
    disposition: '留觀',
    reassess_due_at: new Date(Date.now() + (_state.intakeTriageColor==='red'?5:15)*60000).toISOString(),
    operator_name: _state.operatorName,
    updated_at: now,
  };

  const patientId = await db.patients.add(patientData);
  await db.triages.add({ ...triageData, patient_id: patientId });

  _state.intakeInjury = null;
  _state.intakeTriageColor = null;
  showToast(`✅ ${patientData.display_id} 已接收，分至${zoneMap[_state.intakeTriageColor||'green']}`);
  switchTab('zones');
}

/* ════════════════════════════════════════════════════════════════
   ZONES
════════════════════════════════════════════════════════════════ */
function renderZones(el) {
  const zones = [
    { id:'red',    label:'紅區', cls:'red' },
    { id:'yellow', label:'黃區', cls:'yellow' },
    { id:'green',  label:'綠區', cls:'green' },
    { id:'black',  label:'黑區', cls:'black' },
  ];
  const zoneMap = { red:'紅區', yellow:'黃區', green:'綠區', black:'黑區' };

  const tabs = zones.map(z=>{
    const n = countByZone(z.label);
    return `<button class="zone-tab ${_state.currentZone===z.id?'active '+z.cls:''}" onclick="setZone('${z.id}')">${z.label} ${n>0?`(${n})`:''}</button>`;
  }).join('');

  const cur = zoneMap[_state.currentZone];
  const patients = _state.patients.filter(p=>p.current_zone===cur);
  const cards = patients.length === 0
    ? `<div style="padding:32px;text-align:center;color:var(--text3);">本區目前無傷患</div>`
    : patients.map(p=>renderPatientCard(p)).join('');

  // Update tab badge
  const overdue = _state.patients.filter(p=>{
    if (!p.reassess_due_at) return false;
    return new Date(p.reassess_due_at) < new Date();
  }).length;
  const badge = document.getElementById('tab-badge-zones');
  if (badge) { badge.textContent=overdue; badge.classList.toggle('hidden', overdue===0); }

  el.innerHTML = `
    <div class="zone-tabs">${tabs}</div>
    <div id="zone-cards">${cards}</div>
  `;
}

function setZone(z) {
  _state.currentZone = z;
  renderCurrentTab();
}

function renderPatientCard(p) {
  const colorMap = { red:'red', yellow:'yellow', green:'green', black:'black' };
  const cls = colorMap[p.triage_color] || '';
  const due = p.reassess_due_at ? new Date(p.reassess_due_at) : null;
  const now = new Date();
  const overdue = due && due < now;
  const minLeft = due ? Math.max(0, Math.floor((due-now)/60000)) : null;
  const timerStr = due ? (overdue ? '逾時' : `${minLeft}分`) : '';
  const timerCls = overdue ? 'overdue' : '';
  return `
    <div class="patient-card ${cls} ${overdue?'overdue':''}" onclick="openPatientDetail(${p.id})">
      <div class="pc-top">
        <span class="pc-id">${p.display_id}</span>
        <span class="pc-timer ${timerCls}" ${due ? `data-due="${p.reassess_due_at}"` : ''}>再評估 ${timerStr}</span>
      </div>
      <div class="pc-issue">${p.chief_issue || '（無主訴摘要）'}</div>
      <div style="font-size:12px;color:var(--text3);">${p.vitals_summary||''}</div>
      <div class="pc-actions mt-1">
        <button class="pc-btn" onclick="event.stopPropagation();resetReassess(${p.id})">重設再評估</button>
        <button class="pc-btn" onclick="event.stopPropagation();openMoveZone(${p.id})">移區</button>
        <button class="pc-btn primary" onclick="event.stopPropagation();markTransfer(${p.id})">後送</button>
      </div>
    </div>
  `;
}

async function resetReassess(id) {
  const p = await db.patients.get(id);
  if (!p) return;
  const mins = p.triage_color === 'red' ? 5 : 15;
  await db.patients.update(id, { reassess_due_at: new Date(Date.now()+mins*60000).toISOString(), updated_at: new Date().toISOString() });
  showToast('再評估計時重設');
  renderCurrentTab();
}

async function markTransfer(id) {
  await db.patients.update(id, { disposition:'後送', updated_at:new Date().toISOString() });
  showToast('已標記待後送');
  renderCurrentTab();
}

function openMoveZone(id) {
  const zones = ['紅區','黃區','綠區','黑區','後送區','已離區'];
  const opts = zones.map(z=>`<button class="btn btn-outline btn-full mb-1" onclick="moveZone(${id},'${z}');closeModal()">${z}</button>`).join('');
  openModal('移轉區域', opts, `<button class="btn btn-ghost flex-1" onclick="closeModal()">取消</button>`);
}

async function moveZone(id, zone) {
  await db.patients.update(id, { current_zone:zone, updated_at:new Date().toISOString() });
  showToast(`已移至 ${zone}`);
  renderCurrentTab();
}

async function openPatientDetail(id) {
  const p = await db.patients.get(id);
  if (!p) return;
  const triages = await db.triages.where('patient_id').equals(id).toArray();
  const latest = triages[triages.length-1];
  const colorLabel = { red:'🔴 紅', yellow:'🟡 黃', green:'🟢 綠', black:'⚫ 黑' };
  openModal(
    `${p.display_id} 傷患詳情`,
    `<div class="flex flex-col gap-2">
      <div class="dash-row"><span class="dash-row-label">檢傷分色</span><span class="dash-row-val">${colorLabel[p.triage_color]||p.triage_color}</span></div>
      <div class="dash-row"><span class="dash-row-label">目前區域</span><span class="dash-row-val">${p.current_zone}</span></div>
      <div class="dash-row"><span class="dash-row-label">傷型</span><span class="dash-row-val">${p.injury_type==='trauma'?'創傷':'非創'}</span></div>
      <div class="dash-row"><span class="dash-row-label">主訴</span><span class="dash-row-val text-sm" style="text-align:right;max-width:60%">${p.chief_issue||'—'}</span></div>
      <div class="dash-row"><span class="dash-row-label">生命徵象</span><span class="dash-row-val text-sm" style="text-align:right;max-width:60%">${p.vitals_summary||'—'}</span></div>
      <div class="dash-row"><span class="dash-row-label">處置</span><span class="dash-row-val">${p.disposition}</span></div>
      <div class="dash-row"><span class="dash-row-label">操作者</span><span class="dash-row-val text-sm">${p.operator_name}</span></div>
      ${latest ? `<div class="info-box info mt-1" style="font-size:12px;word-break:break-all;">最新檢傷：${latest.triage_at?.slice(0,16)||''} by ${latest.triage_by||''}</div>` : ''}
    </div>`,
    `<button class="btn btn-outline flex-1" onclick="openMoveZone(${id});closeModal()">移區</button>
     <button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>`
  );
}

/* ════════════════════════════════════════════════════════════════
   MORE PAGE
════════════════════════════════════════════════════════════════ */
async function renderMore(el) {
  if (_state.morePage === 'resources') { await renderResources(el); return; }
  if (_state.morePage === 'incidents') { await renderIncidents(el); return; }
  if (_state.morePage === 'shift')     { await renderShift(el); return; }

  const openInc = await db.incidents.where('status').equals('open').count();
  const lowRes = await db.resources.filter(r => r.qty_current <= r.qty_low_threshold).count();
  const lastShift = (await db.shifts.orderBy('started_at').last());
  const shiftAgo = lastShift ? Math.floor((Date.now()-new Date(lastShift.started_at))/3600000) : null;

  el.innerHTML = `
    <div class="section-hdr">功能</div>
    <div class="dash-row" onclick="_state.morePage='resources';renderCurrentTab()" style="cursor:pointer;">
      <span class="dash-row-label">📦 物資管理</span>
      <span class="flex items-center gap-1">${lowRes>0?`<span class="tag tag-yellow">${lowRes} 低量</span>`:''}  <span class="text-gray text-sm">→</span></span>
    </div>
    <div class="dash-row" onclick="_state.morePage='incidents';renderCurrentTab()" style="cursor:pointer;">
      <span class="dash-row-label">⚠️ 事件記錄</span>
      <span class="flex items-center gap-1">${openInc>0?`<span class="tag tag-red">${openInc} 件</span>`:''}  <span class="text-gray text-sm">→</span></span>
    </div>
    <div class="dash-row" onclick="_state.morePage='shift';renderCurrentTab()" style="cursor:pointer;">
      <span class="dash-row-label">🔄 交班 / 快照</span>
      <span class="flex items-center gap-1">${shiftAgo!==null?`<span class="text-xs text-gray">${shiftAgo}h 前</span>`:''}  <span class="text-gray text-sm">→</span></span>
    </div>
    <div class="section-hdr">系統</div>
    <div class="dash-row" style="cursor:pointer;" onclick="doQrSnapshot()">
      <span class="dash-row-label">📷 產生 QR 快照</span><span class="text-gray text-sm">→</span>
    </div>
    <div class="dash-row" style="cursor:pointer;" onclick="doLogout()">
      <span class="dash-row-label">🔒 登出（切換角色）</span><span class="text-gray text-sm">→</span>
    </div>
    <div style="padding:14px;font-size:12px;color:var(--text3);text-align:center;">
      醫療組 PWA ${PWA_VERSION} · 規格 v0.4
    </div>
  `;
}

function refreshZoneCountdowns() {
  const now = new Date();
  document.querySelectorAll('[data-due]').forEach(el => {
    const due = new Date(el.dataset.due);
    const overdue = due < now;
    const minLeft = Math.max(0, Math.floor((due - now) / 60000));
    el.textContent = '再評估 ' + (overdue ? '逾時' : minLeft + '分');
    el.classList.toggle('overdue', overdue);
    el.closest('.patient-card')?.classList.toggle('overdue', overdue);
  });
}

async function renderTransfer(el) {
  const pending = _state.patients.filter(p => p.disposition === '後送');
  const doneList = await db.transfers.toArray();

  const pendingHtml = pending.length === 0
    ? `<div style="padding:32px;text-align:center;color:var(--text3);">目前無待後送傷患</div>`
    : pending.map(p => renderTransferCard(p)).join('');

  el.innerHTML = `
    <div class="section-hdr">待後送佇列 (${pending.length})</div>
    ${pendingHtml}
    ${doneList.length > 0 ? `
    <div class="section-hdr">已完成後送 (${doneList.length})</div>
    ${doneList.slice().reverse().slice(0,5).map(t => `
      <div class="card mb-1" style="opacity:.7">
        <div class="flex justify-between items-center">
          <span class="text-sm font-semibold">${t.patient_display_id||'—'}</span>

async function completeHandoff(patientId) {
  const p = await db.patients.get(patientId);
  if (!p) return;
  const b = document.getElementById('isbar-b')?.value || '';
  const r = document.getElementById('isbar-r')?.value || '';
  const checklist = ['止血','呼吸道','給氧','靜脈通路','保暖','固定']
    .filter(item => document.getElementById('chk-'+item)?.checked).join('、');
  const now = new Date().toISOString();
  await db.transfers.add({
    patient_id: patientId, patient_display_id: p.display_id,
    status: 'completed', destination: r,
    isbar_text: `B: ${b}\nR: ${r}\n已完成: ${checklist||'（未勾選）'}`,
    departed_at: now, handoff_done_at: now, created_at: now,
  });
  await db.patients.update(patientId, { disposition:'離開', current_zone:'已離區', updated_at: now });
  closeModal();
  showToast(`${p.display_id} 後送交接完成`);

}

  { name:'AED', category:'監測器材', qty_initial:1, qty_low_threshold:1 },
];

async function renderResources(el) {
  const items = await db.resources.toArray();

  if (items.length === 0) {
    el.innerHTML = `
      <div style="padding:14px;"><button class="btn btn-ghost" onclick="_state.morePage=null;renderCurrentTab()">← 返回</button></div>
      <div class="section-hdr">開場盤點</div>
      <div class="p-2">
        <div class="info-box info mb-2 text-sm">系統載入預設物資清單，請依實際數量調整後確認。</div>
        ${DEFAULT_RESOURCES.map((r,i) => `
          <div class="flex items-center gap-2 mb-2">
            <span class="flex-1 text-sm">${r.name}</span>
            <input type="number" class="form-input" style="width:70px;padding:6px;" id="res-qty-${i}" value="${r.qty_initial}" min="0">
          </div>`).join('')}
        <button class="btn btn-primary btn-full mt-2" onclick="initResources()">確認盤點完成</button>
      </div>
    `;
    return;
  }

  const lowItems = items.filter(r => r.qty_current <= r.qty_low_threshold);
  const byCategory = {};
  items.forEach(r => { if (!byCategory[r.category]) byCategory[r.category] = []; byCategory[r.category].push(r); });

  const listHtml = Object.entries(byCategory).map(([cat, catItems]) => `
    <div class="section-hdr">${cat}</div>
    ${catItems.map(r => {
      const low = r.qty_current <= r.qty_low_threshold;
      return `
        <div class="card mb-1" style="${low ? 'border-left:3px solid var(--orange)' : ''}">
          <div class="flex justify-between items-center">
            <span class="font-semibold text-sm">${r.name}</span>
            <span class="${low ? 'text-red font-bold' : ''}">${r.qty_current} / ${r.qty_initial}</span>
          </div>
          ${low ? `<div class="text-xs" style="color:var(--orange);">⚠️ 低量（門檻 ${r.qty_low_threshold}）</div>` : ''}
          <div class="flex gap-1 mt-1">
            <button class="pc-btn" onclick="useResource(${r.id},1)">取用 1</button>
            <button class="pc-btn" onclick="restockResource(${r.id})">補給</button>
          </div>
        </div>`;
    }).join('')}
  `).join('');

  el.innerHTML = `
    <div style="padding:14px;"><button class="btn btn-ghost" onclick="_state.morePage=null;renderCurrentTab()">← 返回</button></div>
    ${lowItems.length > 0 ? `<div class="info-box warn" style="margin:0 14px 10px;">⚠️ ${lowItems.length} 項低量：${lowItems.map(r=>r.name).join('、')}</div>` : ''}
    ${listHtml}
    <div style="padding:14px;"><button class="btn btn-outline btn-full btn-sm" onclick="resetInventory()">重置盤點</button></div>
  `;
}

async function initResources() {
  const rows = DEFAULT_RESOURCES.map((r,i) => {
    const qty = parseInt(document.getElementById('res-qty-'+i)?.value || r.qty_initial, 10);
    return { ...r, qty_current: qty, qty_initial: qty };
  });
  await db.resources.bulkAdd(rows);
  showToast('盤點完成');
  renderCurrentTab();
}

async function useResource(id, qty) {
  const r = await db.resources.get(id);
  if (!r) return;
  const newQty = Math.max(0, r.qty_current - qty);
  await db.resources.update(id, { qty_current: newQty });
  if (newQty <= r.qty_low_threshold) {
    await db.incidents.add({
      type:'resource_shortage', severity:'medium', status:'open',
      notes:`${r.name} 低量（剩 ${newQty}）`,
      reported_by:_state.operatorName, assigned_to:'',
      linked_patients:'', reported_at:new Date().toISOString()
    });
    showToast(`⚠️ ${r.name} 低量，事件已建立`);
  } else {
    showToast(`${r.name} 已取用 ${qty}`);
  }
  renderCurrentTab();
}

async function restockResource(id) {
  const r = await db.resources.get(id);
  if (!r) return;
  const input = prompt(`補給 ${r.name}，請輸入補充數量：`);
  if (!input) return;
  const qty = parseInt(input, 10);
  if (isNaN(qty) || qty <= 0) return;
  await db.resources.update(id, { qty_current: r.qty_current + qty });
  showToast(`${r.name} 補給 +${qty}`);
  renderCurrentTab();
}

async function resetInventory() {
  if (!confirm('確定重置所有物資盤點資料？')) return;
  await db.resources.clear();
  renderCurrentTab();
}

async function doQrSnapshot() {
  const r=countByColor('紅'), y=countByColor('黃'), g=countByColor('綠'), b=countByColor('黑');
  const pending = getPendingTransfer();
  const uuid = generateSnapshotUUID();
  const now = new Date().toISOString();
  const payload = {
    v:1, type:'snapshot_medical', snapshot_id:uuid, t:now,
    src:'medical', casualties:{ red:r, yellow:y, green:g, black:b },
    pending_evac:pending
  };
  const payloadStr = JSON.stringify(payload);
  await db.snapshots.add({ snapshot_uuid:uuid, snapshot_time:now, type:'qr', payload:payloadStr });

  openModal('QR 快照',
    `<div style="text-align:center">
      <div id="qr-render" style="display:inline-block;margin:16px auto;"></div>
      <div class="info-box info mt-2 text-sm">${uuid.slice(0,8)}…<br>${now.slice(0,16)}</div>
      <div class="text-xs text-gray mt-1">供指揮部幕僚掃描（每 20 分鐘更新一次）</div>
    </div>`,
    `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>`
  );
  setTimeout(()=>{
    try {
      new QRCode(document.getElementById('qr-render'), {
        text: payloadStr, width:200, height:200, correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      document.getElementById('qr-render').textContent = payloadStr.slice(0,80)+'…';
    }
  }, 100);
}

function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer || `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.remove('hidden'); el.style.opacity='1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.classList.add('hidden'),300); }, 2500);
}

function copyText(txt) {
  navigator.clipboard?.writeText(txt).then(()=>showToast('已複製')).catch(()=>showToast('複製失敗'));
}

  document.getElementById('admin-overlay').style.display = 'block';
  document.getElementById('admin-panel').style.display = 'flex';
  if (_adminAuthed) { admShowMain(); } else { document.getElementById('adm-pin-screen').style.display='block'; document.getElementById('adm-main').style.display='none'; }
}

function closeAdminPanel() {
  document.getElementById('admin-overlay').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'none';
}

async function adminVerify() {
  const pin = document.getElementById('adm-pin-input').value;
  const errEl = document.getElementById('adm-pin-err');
  errEl.textContent = '';
  if (!pin) { errEl.textContent = '請輸入 PIN'; return; }
  const cfg = await db.config.get('adminPinHash');
  if (!cfg?.value) { errEl.textContent = '管理員 PIN 未設定'; return; }
  const hash = await Crypto.hashPin(pin);
  if (hash !== cfg.value) { errEl.textContent = 'PIN 不正確'; document.getElementById('adm-pin-input').value=''; return; }
  document.getElementById('adm-pin-input').value = '';
  _adminAuthed = true;
  admShowMain();
}

function admShowMain() {
  document.getElementById('adm-pin-screen').style.display = 'none';
  const main = document.getElementById('adm-main');
  main.style.display = 'flex';
  admShowTab('list');
}

function admShowTab(tab) {
  ['list','add','cfg'].forEach(t => {
    document.getElementById('adm-panel-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('adm-tab-'+t).classList.toggle('active', t===tab);
  });
  if (tab === 'list') admLoadAccounts();
}

async function admLoadAccounts() {
  const el = document.getElementById('adm-panel-list');
  const accounts = await db.accounts.toArray();
  if (!accounts.length) { el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0;">尚無帳號</div>'; return; }
  el.innerHTML = accounts.map(a => `
    <div class="adm-card" id="adm-card-${a.id}">
      <div class="adm-card-name">${a.username}${a.display_name&&a.display_name!==a.username?`（${a.display_name}）`:''}</div>
      <div class="adm-card-meta">${a.role} · <span style="color:${a.status==='active'?'var(--green)':'var(--red)'}">${a.status==='active'?'啟用':'停用'}</span></div>
      <div id="adm-edit-${a.id}" style="display:none;margin-top:8px;">
        <div style="display:flex;gap:6px;margin-bottom:6px;">
          <input type="password" inputmode="numeric" id="adm-newpin-${a.id}" class="form-input" placeholder="新 PIN（4-6碼，留空不改）" style="flex:1;padding:7px 10px;font-size:14px;">
          <select id="adm-newrole-${a.id}" class="form-input form-select" style="flex:1;padding:7px 10px;font-size:14px;">
            ${['組長','副組長','檢傷官','治療官','後送官','後勤官','通訊官','機動人員'].map(r=>`<option value="${r}"${a.role===r?' selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="adm-btn adm-btn-primary" style="flex:1;" onclick="admSave(${a.id})">儲存</button>
          <button class="adm-btn" style="flex:1;" onclick="admToggleEdit(${a.id},false)">取消</button>
        </div>
        <div id="adm-edit-msg-${a.id}" style="font-size:12px;margin-top:4px;color:var(--green);min-height:16px;"></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
        <button class="adm-btn adm-btn-primary" onclick="admToggleEdit(${a.id},true)">修改</button>
        <button class="adm-btn adm-btn-toggle" onclick="admToggleStatus(${a.id},'${a.status}')">${a.status==='active'?'停用':'啟用'}</button>
        <button class="adm-btn adm-btn-del" onclick="admDelete(${a.id},'${a.username}')">刪除</button>
      </div>
    </div>
  `).join('');
}

function admToggleEdit(id, show) {
  document.getElementById('adm-edit-'+id).style.display = show ? 'block' : 'none';
}

async function admSave(id) {
  const pin = document.getElementById('adm-newpin-'+id).value;
  const role = document.getElementById('adm-newrole-'+id).value;
  const msgEl = document.getElementById('adm-edit-msg-'+id);
  const upd = { role };
  if (pin) {
    if (!/^\d{4,6}$/.test(pin)) { msgEl.style.color='var(--red)'; msgEl.textContent='PIN 需 4-6 位數字'; return; }
    upd.pin_hash = await Crypto.hashPin(pin);
  }
  await db.accounts.update(id, upd);
  msgEl.style.color = 'var(--green)'; msgEl.textContent = '已儲存';
  setTimeout(() => admLoadAccounts(), 800);
}

async function admToggleStatus(id, cur) {
  await db.accounts.update(id, { status: cur==='active' ? 'suspended' : 'active' });
  admLoadAccounts();
}

async function admDelete(id, username) {
  if (!confirm(`確定刪除帳號「${username}」？`)) return;
  await db.accounts.delete(id);
  admLoadAccounts();
}

async function admAddAccount() {
  const u = document.getElementById('adm-new-user').value.trim();
  const dn = document.getElementById('adm-new-display').value.trim();
  const role = document.getElementById('adm-new-role').value;
  const pin = document.getElementById('adm-new-pin').value;
  const msg = document.getElementById('adm-add-msg');
  msg.style.color = 'var(--red)'; msg.textContent = '';
  if (!u) { msg.textContent = '請填帳號名稱'; return; }
  if (!/^\d{4,6}$/.test(pin)) { msg.textContent = 'PIN 需 4-6 位數字'; return; }
  const exists = await db.accounts.where('username').equals(u).first();
  if (exists) { msg.textContent = '帳號已存在'; return; }
  const pin_hash = await Crypto.hashPin(pin);
  await db.accounts.add({ username:u, display_name:dn||u, role, pin_hash, status:'active', created_at:new Date().toISOString() });
  msg.style.color = 'var(--green)'; msg.textContent = `帳號「${u}」已建立`;
  document.getElementById('adm-new-user').value=''; document.getElementById('adm-new-display').value=''; document.getElementById('adm-new-pin').value='';
}

async function admChangeAdminPin() {
  const pin = document.getElementById('adm-cfg-pin').value;
  const msg = document.getElementById('adm-cfg-msg');
  msg.style.color = 'var(--red)'; msg.textContent = '';
  if (!/^\d{4,6}$/.test(pin)) { msg.textContent = 'PIN 需 4-6 位數字'; return; }
  const hash = await Crypto.hashPin(pin);
  await db.config.put({ key:'adminPinHash', value:hash });
  msg.style.color = 'var(--green)'; msg.textContent = '管理員 PIN 已更新';
  document.getElementById('adm-cfg-pin').value = '';
  _adminAuthed = false;
}

/* ════════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════════ */
async function boot() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  await initLogin();
}

boot();
</script>
</body>
</html>
