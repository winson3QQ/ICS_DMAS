async function renderResources(el) {
  const items = await db.resources.toArray();

  if (items.length === 0) {
    el.innerHTML = `
      <div style="padding:14px;"><button class="btn btn-ghost" onclick="_state.morePage=null;renderCurrentTab()">← 返回</button></div>
      <div class="section-hdr">開場盤點</div>
      <div class="p-2">
        <div class="info-box info mb-2 text-sm">系統載入預設物資清單，請依實際數量調整後確認。</div>
        ${DEFAULT_RESOURCES.map((r,i) => `
          <div class="flex items-center gap-2 mb-2">
            <span class="flex-1 text-sm">${r.name}</span>
            <input type="number" class="form-input" style="width:70px;padding:6px;" id="res-qty-${i}" value="${r.qty_initial}" min="0">
          </div>`).join('')}
        <button class="btn btn-primary btn-full mt-2" onclick="initResources()">確認盤點完成</button>
      </div>
    `;
    return;
  }

  const lowItems = items.filter(r => r.qty_current <= r.qty_low_threshold);
  const byCategory = {};
  items.forEach(r => { if (!byCategory[r.category]) byCategory[r.category] = []; byCategory[r.category].push(r); });

  const listHtml = Object.entries(byCategory).map(([cat, catItems]) => `
    <div class="section-hdr">${cat}</div>
    ${catItems.map(r => {
      const low = r.qty_current <= r.qty_low_threshold;
      return `
        <div class="card mb-1" style="${low ? 'border-left:3px solid var(--orange)' : ''}">
          <div class="flex justify-between items-center">
            <span class="font-semibold text-sm">${r.name}</span>
            <span class="${low ? 'text-red font-bold' : ''}">${r.qty_current} / ${r.qty_initial}</span>
          </div>
          ${low ? `<div class="text-xs" style="color:var(--orange);">⚠️ 低量（門檻 ${r.qty_low_threshold}）</div>` : ''}
          <div class="flex gap-1 mt-1">
            <button class="pc-btn" onclick="useResource(${r.id},1)">取用 1</button>
            <button class="pc-btn" onclick="restockResource(${r.id})">補給</button>
          </div>
        </div>`;
    }).join('')}
  `).join('');

  el.innerHTML = `
    <div style="padding:14px;"><button class="btn btn-ghost" onclick="_state.morePage=null;renderCurrentTab()">← 返回</button></div>
    ${lowItems.length > 0 ? `<div class="info-box warn" style="margin:0 14px 10px;">⚠️ ${lowItems.length} 項低量：${lowItems.map(r=>r.name).join('、')}</div>` : ''}
    ${listHtml}
    <div style="padding:14px;"><button class="btn btn-outline btn-full btn-sm" onclick="resetInventory()">重置盤點</button></div>
  `;
}

async function initResources() {
  const rows = DEFAULT_RESOURCES.map((r,i) => {
    const qty = parseInt(document.getElementById('res-qty-'+i)?.value || r.qty_initial, 10);
    return { ...r, qty_current: qty, qty_initial: qty };
  });
  await db.resources.bulkAdd(rows);
  showToast('盤點完成');
  renderCurrentTab();
}

async function useResource(id, qty) {
  const r = await db.resources.get(id);
  if (!r) return;
  const newQty = Math.max(0, r.qty_current - qty);
  await db.resources.update(id, { qty_current: newQty });
  if (newQty <= r.qty_low_threshold) {
    await db.incidents.add({
      type:'resource_shortage', severity:'medium', status:'open',
      notes:`${r.name} 低量（剩 ${newQty}）`,
      reported_by:_state.operatorName, assigned_to:'',
      linked_patients:'', reported_at:localISO()
    });
    showToast(`⚠️ ${r.name} 低量，事件已建立`);
  } else {
    showToast(`${r.name} 已取用 ${qty}`);
  }
  renderCurrentTab();
}

async function restockResource(id) {
  const r = await db.resources.get(id);
  if (!r) return;
  const input = prompt(`補給 ${r.name}，請輸入補充數量：`);
  if (!input) return;
  const qty = parseInt(input, 10);
  if (isNaN(qty) || qty <= 0) return;
  await db.resources.update(id, { qty_current: r.qty_current + qty });
  showToast(`${r.name} 補給 +${qty}`);
  renderCurrentTab();
}

async function resetInventory() {
  if (!confirm('確定重置所有物資盤點資料？')) return;
  await db.resources.clear();
  renderCurrentTab();
}

const INCIDENT_TYPES = {

async function renderIncidents(el) {
  const all = await db.incidents.toArray();
  const open = all.filter(i => i.status === 'open');
  const closed = all.filter(i => i.status === 'closed');

  el.innerHTML = `
    <div style="padding:14px;display:flex;justify-content:space-between;align-items:center;">
      ${_state.currentTab === 'events' ? '<div></div>' : '<button class="btn btn-ghost" onclick="_state.morePage=null;renderCurrentTab()">← 返回</button>'}

    ${open.length === 0 ? `<div style="padding:24px;text-align:center;color:var(--text3);">目前無開放事件</div>` : ''}

      <div class="section-hdr">已結案 (${closed.length})</div>

function renderIncidentCard(inc, isOpen) {
  const sevColor = { high:'var(--red)', medium:'var(--orange)', low:'var(--green)' }[inc.severity] || 'var(--gray)';
  const sevTag = inc.severity === 'high' ? 'tag-red' : inc.severity === 'medium' ? 'tag-yellow' : 'tag-green';
  const sevLabel = inc.severity === 'high' ? '高' : inc.severity === 'medium' ? '中' : '低';
  return `
    <div class="card mb-2" style="${isOpen ? 'border-left:3px solid '+sevColor : 'opacity:.7'};cursor:pointer;" onclick="openIncidentDetail(${inc.id})">
      <div class="flex justify-between items-center mb-1">
        <span class="font-semibold">${INCIDENT_TYPES[inc.type]||inc.type}</span>
        <span class="tag ${sevTag}">${sevLabel}</span>
      </div>
      <div class="text-sm mb-1" style="white-space:pre-wrap;">${inc.notes||'—'}</div>
      ${inc.patient_transferred_at ? `<div class="text-xs" style="color:var(--orange);font-weight:600;margin-bottom:2px;">⚠️ 傷患已後送，待 ${inc.patient_transferred_reminded_to||'—'} 手動結案</div>` : ''}
      <div class="text-xs text-gray">${inc.reported_by||'（系統自動）'} · ${(inc.reported_at||'').slice(0,16).replace('T',' ')}</div>
    </div>
  `;
}

const INCIDENT_GUIDANCE = {

  infectious_risk: '① 立即穿戴 PPE（口罩 N95、手套、護目鏡）\n② 隔離傷患，限制接觸人員\n③ 通報醫療組長，記錄接觸史',
  resource_shortage: '① 確認短缺物資與剩餘量\n② 向後勤組請求緊急補給\n③ 調整處置優先順序，保留關鍵物資',
  capacity_overload: '① 加速評估待後送傷患\n② 通報前進指揮所，請求增援\n③ 啟動量能調配 SOP',
  equipment_failure: '① 立即停止使用故障設備\n② 找替代方案或備用設備\n③ 通報後勤，記錄故障設備',
  evacuation: '① 依撤退 SOP 執行\n② 優先後送紅/黃傷患\n③ 清點全體人員與傷患人數',
};

async function openIncidentDetail(id) {
  const inc = await db.incidents.get(id);
  if (!inc) return;
  const sevTag = inc.severity === 'high' ? 'tag-red' : inc.severity === 'medium' ? 'tag-yellow' : 'tag-green';
  const sevLabel = inc.severity === 'high' ? '高（立即威脅）' : inc.severity === 'medium' ? '中（需追蹤）' : '低（知悉）';
  const statusLabel = inc.status === 'open' ? '🔴 開放中' : '✅ 已結案';
  const guidance = INCIDENT_GUIDANCE[inc.type] || '';
  // 關聯傷患（唯讀）：顯示觸發事件的傷患，置於頂部
  let patientBanner = '';
  if (inc.patient_id) {
    const lp = _state.patients.find(p => p.id === inc.patient_id) || await db.patients.get(inc.patient_id);
    const colorDot = { red:'🔴', yellow:'🟡', green:'🟢', black:'⚫' };
    const dot = lp ? (colorDot[lp.triage_color]||'👤') : '👤';
    const label = lp ? `${dot} ${lp.display_id}` : `👤 #${inc.patient_id}`;
    patientBanner = `
      <div style="background:var(--red-bg);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div>
          <div style="font-size:11px;color:var(--primary);font-weight:600;margin-bottom:2px;">觸發此事件的傷患</div>
          <div style="font-size:15px;font-weight:700;">${label}</div>
          ${lp?.chief_issue ? `<div style="font-size:12px;color:var(--text2);margin-top:2px;">${lp.chief_issue}</div>` : ''}
        </div>
        <button class="btn btn-primary btn-sm" onclick="closeModal();openPatientDetail(${inc.patient_id})">查看履歷</button>
      </div>`;
  } else {
    patientBanner = `<div style="background:var(--surface2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text3);">無關聯傷患記錄</div>`;
  }
  const transferAlert = inc.patient_transferred_at ? `
    <div style="background:var(--orange-bg,#fff3e0);border:1px solid var(--orange);border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600;color:var(--orange);">
      ⚠️ 傷患已後送（${inc.patient_transferred_at.slice(0,16).replace('T',' ')}）<br>
      <span style="font-weight:400;font-size:12px;">提醒 ${inc.patient_transferred_reminded_to||'—'} 手動結案，此事件仍開放中</span>
    </div>` : '';
  openModal(
    INCIDENT_TYPES[inc.type]||inc.type,
    `<div class="flex flex-col gap-1">
      ${transferAlert}
      ${patientBanner}
      <div class="dash-row"><span class="dash-row-label">狀態</span><span class="dash-row-val">${statusLabel}</span></div>
      <div class="dash-row"><span class="dash-row-label">嚴重程度</span><span class="dash-row-val"><span class="tag ${sevTag}">${sevLabel}</span></span></div>
      <div class="dash-row"><span class="dash-row-label">通報者</span><span class="dash-row-val">${inc.reported_by||'—'}</span></div>
      <div class="dash-row"><span class="dash-row-label">通報時間</span><span class="dash-row-val text-sm">${(inc.reported_at||'').slice(0,16).replace('T',' ')}</span></div>
      ${inc.closed_at ? `<div class="dash-row"><span class="dash-row-label">結案時間</span><span class="dash-row-val text-sm">${inc.closed_at.slice(0,16).replace('T',' ')}</span></div>` : ''}
      ${inc.notes ? `<div style="padding:10px;background:var(--surface2);border-radius:8px;font-size:13px;white-space:pre-wrap;">${inc.notes}</div>` : ''}
      ${guidance ? `<div class="section-hdr" style="margin:8px -4px 4px;">建議處置步驟</div>
        <div class="info-box info" style="font-size:12px;white-space:pre-wrap;">${guidance}</div>` : ''}
      ${inc.status === 'open' ? `
      <div class="section-hdr" style="margin:8px -4px 4px;">指派負責人</div>
      <input class="form-input" id="inc-assign" placeholder="姓名或角色" value="${inc.assigned_to||''}">
      <div class="section-hdr" style="margin:8px -4px 4px;">處置記錄</div>
      <textarea class="form-input form-textarea" id="inc-action" placeholder="已採取的措施、後續追蹤…" style="min-height:70px;">${inc.action_notes||''}</textarea>
      <button class="btn btn-outline btn-full" onclick="saveIncidentAction(${id})">💾 更新記錄</button>
      ` : `
      ${inc.assigned_to ? `<div class="dash-row"><span class="dash-row-label">處理人員</span><span class="dash-row-val">${inc.assigned_to}</span></div>` : ''}
      ${inc.closed_by ? `<div class="dash-row"><span class="dash-row-label">結案人員</span><span class="dash-row-val">${inc.closed_by}</span></div>` : ''}
      ${inc.action_notes ? `<div class="section-hdr" style="margin:8px -4px 4px;">處置記錄</div>

    </div>`,
    inc.status === 'open'
      ? `<button class="btn btn-danger flex-1" onclick="closeIncidentWithConfirm(${id})">結案</button>
         <button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>`
      : `<button class="btn btn-ghost btn-full" onclick="closeModal()">關閉</button>`
  );
}

async function saveIncidentAction(id) {
  const assigned = document.getElementById('inc-assign')?.value || '';
  const action = document.getElementById('inc-action')?.value || '';
  await db.incidents.update(id, { assigned_to: assigned, action_notes: action });
  showToast('處置記錄已更新');
}

let _pendingIncidentClose = null;

async function closeIncidentWithConfirm(id) {
  const action = document.getElementById('inc-action')?.value || '';
  if (!action.trim()) { showToast('請先填寫處置記錄再結案'); return; }
  const assigned = document.getElementById('inc-assign')?.value || '';
  _pendingIncidentClose = { id, action, assigned };
  _confirmInModal(
    '確認結案',
    '結案後事件記錄將設為唯讀，無法修改，確認繼續？',
    'doCloseIncident()',
    `openIncidentDetail(${id})`
  );
}

async function doCloseIncident() {
  const { id, action, assigned } = _pendingIncidentClose;
  _pendingIncidentClose = null;
  await db.incidents.update(id, {
    status: 'closed', closed_at: localISO(),
    action_notes: action,
    assigned_to: assigned,
    closed_by: _state.operatorName,
  });
  const inc = await db.incidents.get(id);
  if (inc?.type === 'security_threat' && inc.patient_id) {
    await db.patients.update(inc.patient_id, { security_cleared: 'yes', updated_at: localISO() });
    await loadPatients();
  }
  closeModal();
  showToast('事件已結案');
  renderCurrentTab();
}

function openCreateIncident() {
  const patientOpts = [
    `<option value="">（無關聯傷患）</option>`,
    ..._state.patients
      .filter(p => p.current_zone !== '已離區')
      .map(p => `<option value="${p.id}">${p.display_id} ${p.chief_issue ? '— ' + p.chief_issue.slice(0,20) : ''}</option>`)
  ].join('');
  openModal('通報事件',
    `<div class="flex flex-col gap-2">
      <div class="form-group">
        <div class="form-label">事件類型</div>
        <select class="form-select" id="inc-type">
          ${Object.entries(INCIDENT_TYPES).map(([v,l]) => `<option value="${v}">${l}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">嚴重程度</div>
        <select class="form-select" id="inc-sev">
          <option value="high">高（立即威脅）</option>
          <option value="medium" selected>中（需追蹤）</option>
          <option value="low">低（知悉）</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">關聯傷患（選填）</div>
        <select class="form-select" id="inc-patient">${patientOpts}</select>
      </div>
      <div class="form-group">
        <div class="form-label">事件說明</div>
        <textarea class="form-input form-textarea" id="inc-notes" placeholder="簡述事件狀況…"></textarea>
      </div>
    </div>`,
    `<button class="btn btn-danger flex-1" onclick="createIncident()">通報</button>
     <button class="btn btn-ghost flex-1" onclick="closeModal()">取消</button>`
  );
}

async function createIncident() {
  const type = document.getElementById('inc-type')?.value;
  const severity = document.getElementById('inc-sev')?.value;
  const notes = document.getElementById('inc-notes')?.value;
  const patientId = parseInt(document.getElementById('inc-patient')?.value) || null;
  if (!notes?.trim()) { showToast('請填寫事件說明'); return; }
  const id = await db.incidents.add({
    type, severity, status:'open', notes,
    reported_by:_state.operatorName, assigned_to:'',
    patient_id: patientId, linked_patients:'', reported_at:localISO()
  });
  await renderCurrentTab();
  openIncidentDetail(id);
}

async function renderShift(el) {
  const shifts = await db.shifts.toArray();
  const redPatients = _state.patients.filter(p => p.triage_color === 'red' && p.current_zone !== '已離區');

  const lowResources = await db.resources.filter(r => r.qty_current <= r.qty_low_threshold).count();
  const pendingEvac = getPendingTransfer();
  const lastShift = shifts.length > 0 ? shifts[shifts.length-1] : null;
  const shiftAgo = lastShift ? Math.floor((Date.now()-new Date(lastShift.started_at))/3600000) : null;
  const needForceShift = shiftAgo !== null && shiftAgo >= 4;

  el.innerHTML = `
    <div style="padding:14px;"><button class="btn btn-ghost" onclick="_state.morePage=null;renderCurrentTab()">← 返回</button></div>

        <div class="flex justify-between mb-1"><span>🟡 黃區</span><span>${countByColor('yellow')}</span></div>
        <div class="flex justify-between mb-1"><span>🟢 綠區</span><span>${countByColor('green')}</span></div>
        <div class="flex justify-between mb-1"><span>⚫ 黑區</span><span>${countByColor('black')}</span></div>
        <div class="flex justify-between mb-1"><span>🚑 待後送</span><span>${pendingEvac}</span></div>
        <div class="flex justify-between mb-1"><span>⚠️ 開放事件</span><span>${openIncidents}</span></div>
        <div class="flex justify-between"><span>📦 低量物資</span><span>${lowResources}</span></div>
      </div>
      ${redPatients.length > 0 ? `
        <div class="info-box error mb-2 text-sm">
          <b>🔴 紅區傷患逐一交接（${redPatients.length} 人）</b><br>
          ${redPatients.map(p => `${p.display_id}：${p.chief_issue||'—'} / ${p.vitals_summary||'—'}`).join('<br>')}
        </div>` : ''}
      <div class="form-group">
        <div class="form-label">交班備註</div>
        <textarea class="form-input form-textarea" id="shift-notes" placeholder="特別注意事項、未完成任務、下一班需追蹤項目…" style="min-height:100px;"></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="createShift()">建立交班紀錄</button>
    </div>
    ${shifts.length > 0 ? `
    <div class="section-hdr">歷史交班 (${shifts.length})</div>
    ${shifts.slice().reverse().map(s => {
      let snapHtml = '';
      if (s.snapshot) { try { const snap = JSON.parse(s.snapshot); snapHtml = `<div class="text-xs text-gray mt-1">紅${snap.red||0} 黃${snap.yellow||0} 綠${snap.green||0} 黑${snap.black||0} · 後送${snap.pending||0}</div>`; } catch(_) {} }
      return `<div class="card mb-2 text-sm" style="opacity:.8">
        <div class="flex justify-between mb-1">
          <span class="font-semibold">${s.operator_name} · ${s.role}</span>
          <span class="text-gray">${(s.started_at||'').slice(0,16)}</span>
        </div>
        ${s.handover_notes ? `<div>${s.handover_notes}</div>` : ''}
        ${snapHtml}
      </div>`;
    }).join('')}
    ` : ''}
  `;
}

async function createShift() {
  const notes = document.getElementById('shift-notes')?.value || '';
  const snap = { red:countByColor('red'), yellow:countByColor('yellow'), green:countByColor('green'), black:countByColor('black'), pending:getPendingTransfer() };
  await db.shifts.add({
    started_at: localISO(),
    role: _state.role, operator_name: _state.operatorName,
    handover_notes: notes, snapshot: JSON.stringify(snap)
  });
  showToast('交班紀錄已建立');
  renderCurrentTab();
}

function renderStub(el, icon, title, desc) {
  el.innerHTML = `<div class="stub-page"><div class="stub-icon">${icon}</div><div class="stub-title">${title}</div><div class="stub-desc">${desc}</div></div>`;
}

/* ════════════════════════════════════════════════════════════════
   QR SNAPSHOT
════════════════════════════════════════════════════════════════ */
async function doQrSnapshot() {
  const r=countByColor('red'), y=countByColor('yellow'), g=countByColor('green'), b=countByColor('black');
  const pending = getPendingTransfer();
  const uuid = generateSnapshotUUID();
  const now = localISO();
  const payload = {
    v:1, type:'snapshot_medical', snapshot_id:uuid, t:now,
    src:'medical', casualties:{ red:r, yellow:y, green:g, black:b },
    pending_evac:pending
  };
  const payloadStr = JSON.stringify(payload);
  await db.snapshots.add({ snapshot_uuid:uuid, snapshot_time:now, type:'qr', payload:payloadStr });

  openModal('QR 快照',
    `<div style="text-align:center">
      <div id="qr-render" style="display:inline-block;margin:16px auto;"></div>
      <div class="info-box info mt-2 text-sm">${uuid.slice(0,8)}…<br>${now.slice(0,16)}</div>
      <div class="text-xs text-gray mt-1">供指揮部幕僚掃描（每 20 分鐘更新一次）</div>
    </div>`,
    `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>`
  );
  setTimeout(()=>{
    try {
      new QRCode(document.getElementById('qr-render'), {
        text: payloadStr, width:200, height:200, correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {
      document.getElementById('qr-render').textContent = payloadStr.slice(0,80)+'…';
    }
  }, 100);
}

function doLogout() {
  localStorage.removeItem('med_session');
  localStorage.removeItem('med_last_tab');
  clearIdleTimers();
  _state.role = '';
  _state.operatorName = '';
  _state.currentAccountId = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('idle-warning').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-warn').textContent = '';
  const cdEl = document.getElementById('idle-countdown'); if (cdEl) cdEl.textContent = '';
}

/* ════════════════════════════════════════════════════════════════
   MODAL / TOAST
════════════════════════════════════════════════════════════════ */
function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer || `<button class="btn btn-ghost flex-1" onclick="closeModal()">關閉</button>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function _confirmInModal(title, msg, confirmFnStr, cancelFnStr) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = `<p style="padding:16px 4px;font-size:15px;line-height:1.7;">${msg}</p>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-danger flex-1" onclick="${confirmFnStr}">確認</button>
    <button class="btn btn-ghost flex-1" onclick="${cancelFnStr||'closeModal()'}">取消</button>`;
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.remove('hidden'); el.style.opacity='1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.classList.add('hidden'),300); }, 2500);
}

function copyText(txt) {
  navigator.clipboard?.writeText(txt).then(()=>showToast('已複製')).catch(()=>showToast('複製失敗'));
}

/* ════════════════════════════════════════════════════════════════
   ADMIN PANEL
════════════════════════════════════════════════════════════════ */
let _adminAuthed = false;

function openAdminPanel() {
  document.getElementById('admin-overlay').style.display = 'block';
  document.getElementById('admin-panel').style.display = 'flex';
  if (_adminAuthed) { admShowMain(); } else { document.getElementById('adm-pin-screen').style.display='block'; document.getElementById('adm-main').style.display='none'; }
}

function closeAdminPanel() {
  document.getElementById('admin-overlay').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'none';
}

async function adminVerify() {
  const pin = document.getElementById('adm-pin-input').value;
  const errEl = document.getElementById('adm-pin-err');
  errEl.textContent = '';
  if (!pin) { errEl.textContent = '請輸入 PIN'; return; }
  const cfg = await db.config.get('adminPinHash');
  if (!cfg?.value) { errEl.textContent = '管理員 PIN 未設定'; return; }
  const hash = await Crypto.hashPin(pin);
  if (hash !== cfg.value) { errEl.textContent = 'PIN 不正確'; document.getElementById('adm-pin-input').value=''; return; }
  document.getElementById('adm-pin-input').value = '';
  _adminAuthed = true;
  admShowMain();
}

function admShowMain() {
  document.getElementById('adm-pin-screen').style.display = 'none';
  const main = document.getElementById('adm-main');
  main.style.display = 'flex';
  admShowTab('list');
}

function admShowTab(tab) {
  ['list','add','cfg'].forEach(t => {
    document.getElementById('adm-panel-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('adm-tab-'+t).classList.toggle('active', t===tab);
  });
  if (tab === 'list') admLoadAccounts();
}

async function admLoadAccounts() {
  const el = document.getElementById('adm-panel-list');
  const accounts = await db.accounts.toArray();
  if (!accounts.length) { el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0;">尚無帳號</div>'; return; }
  el.innerHTML = accounts.map(a => `
    <div class="adm-card" id="adm-card-${a.id}">
      <div class="adm-card-name">${a.username}${a.display_name&&a.display_name!==a.username?`（${a.display_name}）`:''}</div>
      <div class="adm-card-meta">${a.role} · <span style="color:${a.status==='active'?'var(--green)':'var(--red)'}">${a.status==='active'?'啟用':'停用'}</span></div>
      <div id="adm-edit-${a.id}" style="display:none;margin-top:8px;">
        <div style="display:flex;gap:6px;margin-bottom:6px;">
          <input type="password" inputmode="numeric" id="adm-newpin-${a.id}" class="form-input" placeholder="新 PIN（4-6碼，留空不改）" style="flex:1;padding:7px 10px;font-size:14px;">
          <select id="adm-newrole-${a.id}" class="form-input form-select" style="flex:1;padding:7px 10px;font-size:14px;">
            ${['組長','副組長','檢傷官','治療官','後送官','後勤官','通訊官','機動人員'].map(r=>`<option value="${r}"${a.role===r?' selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="adm-btn adm-btn-primary" style="flex:1;" onclick="admSave(${a.id})">儲存</button>
          <button class="adm-btn" style="flex:1;" onclick="admToggleEdit(${a.id},false)">取消</button>
        </div>
        <div id="adm-edit-msg-${a.id}" style="font-size:12px;margin-top:4px;color:var(--green);min-height:16px;"></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
        <button class="adm-btn adm-btn-primary" onclick="admToggleEdit(${a.id},true)">修改</button>
        <button class="adm-btn adm-btn-toggle" onclick="admToggleStatus(${a.id},'${a.status}')">${a.status==='active'?'停用':'啟用'}</button>
        <button class="adm-btn adm-btn-del" onclick="admDelete(${a.id},'${a.username}')">刪除</button>
      </div>
    </div>
  `).join('');
}

function admToggleEdit(id, show) {
  document.getElementById('adm-edit-'+id).style.display = show ? 'block' : 'none';
}

async function admSave(id) {
  const pin = document.getElementById('adm-newpin-'+id).value;
  const role = document.getElementById('adm-newrole-'+id).value;
  const msgEl = document.getElementById('adm-edit-msg-'+id);
  const upd = { role };
  if (pin) {
    if (!/^\d{4,6}$/.test(pin)) { msgEl.style.color='var(--red)'; msgEl.textContent='PIN 需 4-6 位數字'; return; }
    upd.pin_hash = await Crypto.hashPin(pin);
  }
  await db.accounts.update(id, upd);
  msgEl.style.color = 'var(--green)'; msgEl.textContent = '已儲存';
  setTimeout(() => admLoadAccounts(), 800);
}

async function admToggleStatus(id, cur) {
  await db.accounts.update(id, { status: cur==='active' ? 'suspended' : 'active' });
  admLoadAccounts();
}

async function admDelete(id, username) {
  if (!confirm(`確定刪除帳號「${username}」？`)) return;
  await db.accounts.delete(id);
  admLoadAccounts();
}

async function admAddAccount() {
  const u = document.getElementById('adm-new-user').value.trim();
  const dn = document.getElementById('adm-new-display').value.trim();
  const role = document.getElementById('adm-new-role').value;
  const pin = document.getElementById('adm-new-pin').value;
  const msg = document.getElementById('adm-add-msg');
  msg.style.color = 'var(--red)'; msg.textContent = '';
  if (!u) { msg.textContent = '請填帳號名稱'; return; }
  if (!/^\d{4,6}$/.test(pin)) { msg.textContent = 'PIN 需 4-6 位數字'; return; }
  const exists = await db.accounts.where('username').equals(u).first();
  if (exists) { msg.textContent = '帳號已存在'; return; }
  const pin_hash = await Crypto.hashPin(pin);
  await db.accounts.add({ username:u, display_name:dn||u, role, pin_hash, status:'active', created_at:localISO() });
  msg.style.color = 'var(--green)'; msg.textContent = `帳號「${u}」已建立`;
  document.getElementById('adm-new-user').value=''; document.getElementById('adm-new-display').value=''; document.getElementById('adm-new-pin').value='';
}

async function admChangeAdminPin() {
  const pin = document.getElementById('adm-cfg-pin').value;
  const msg = document.getElementById('adm-cfg-msg');
  msg.style.color = 'var(--red)'; msg.textContent = '';
  if (!/^\d{4,6}$/.test(pin)) { msg.textContent = 'PIN 需 4-6 位數字'; return; }
  const hash = await Crypto.hashPin(pin);
  await db.config.put({ key:'adminPinHash', value:hash });
  msg.style.color = 'var(--green)'; msg.textContent = '管理員 PIN 已更新';
  document.getElementById('adm-cfg-pin').value = '';
  _adminAuthed = false;
}

/* ════════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════════ */
async function boot() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  await initLogin();
}

boot();
</script>
