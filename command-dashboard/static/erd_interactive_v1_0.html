<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICS 資料模型　互動 ERD　v1.3</title>
<style>
:root {
  --bg: #f0f2f5; --surface: #fff; --border: #d8e0ec;
  --text: #1a2535; --mid: #4a5a70; --dim: #7a8ba0;
  --blue: #1d5fad; --blue-bg: #e8f0fc;
  --green: #1a9e52; --green-bg: #eaf7f0;
  --yellow: #c98000; --yellow-bg: #fff8e0;
  --red: #c92828; --red-bg: #fdeaea;
  --gray-bg: #f5f7fa;
  --mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, 'Noto Sans TC', sans-serif; font-size: 13px; min-height: 100vh; }

/* ── TOP ── */
.top { background: #1a2535; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.top-title { font-family: var(--mono); font-size: 13px; font-weight: 700; color: #fff; letter-spacing: .1em; }
.top-sub { font-family: var(--mono); font-size: 10px; color: #4a6080; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.fb { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1px solid #2d4060; background: transparent; color: #7a9bbf; cursor: pointer; transition: all .15s; }
.fb.on { background: var(--blue); color: #fff; border-color: var(--blue); }
.fb.all.on { background: #fff; color: #1a2535; border-color: #fff; }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 52px); }

/* ── ERD CANVAS ── */
.canvas { padding: 16px; overflow: auto; }
.erd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  align-items: start;
}

/* ── TABLE NODE ── */
.tnode {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.tnode:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(29,95,173,.15); transform: translateY(-1px); }
.tnode.active { border-color: var(--blue); border-width: 2px; box-shadow: 0 3px 16px rgba(29,95,173,.25); }
.tnode.new-v2 { border-color: var(--green); }
.tnode.new-v2 .thead { background: #1a7a40; }
.tnode.hidden { opacity: .2; pointer-events: none; }

.thead {
  background: #1a2535;
  padding: 7px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.thead .tname { font-family: var(--mono); font-size: 11px; font-weight: 700; color: #fff; }
.thead .tbadge { font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,.5); }
.thead .tnew { font-family: var(--mono); font-size: 9px; color: #7ddfaa; font-weight: 700; }

.tfields { padding: 6px 0; }
.tfield {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  font-family: var(--mono); font-size: 10px;
  border-bottom: 1px solid #f5f7fa;
  line-height: 1.3;
}
.tfield:last-child { border-bottom: none; }
.tfield .fname { color: var(--text); flex: 1; }
.tfield .ftype { color: var(--dim); font-size: 9px; }
.pk-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
.fk-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); flex-shrink: 0; }
.new-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.plain-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }

/* group separator */
.group-sep {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0 2px;
}
.group-sep .glabel {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 3px;
  white-space: nowrap;
}
.group-sep .gline { flex: 1; height: 1px; background: var(--border); }

/* ── DETAIL PANEL ── */
.detail {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  overflow: hidden;
}
.detail-head {
  background: #1a2535; padding: 12px 14px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.detail-head .dname { font-family: var(--mono); font-size: 14px; font-weight: 700; color: #fff; }
.detail-head .dsub  { font-family: var(--mono); font-size: 10px; color: #4a6080; margin-top: 2px; }
.detail-body { flex: 1; overflow-y: auto; padding: 12px 14px; }
.detail-body::-webkit-scrollbar { width: 4px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border); }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--dim); text-align: center; gap: 8px; }
.empty-state .icon { font-size: 36px; }
.empty-state p { font-size: 12px; line-height: 1.6; }

/* field detail rows */
.dfield {
  display: grid; grid-template-columns: 140px 1fr;
  gap: 8px; padding: 7px 0;
  border-bottom: 1px solid var(--border);
  align-items: start;
}
.dfield:last-child { border-bottom: none; }
.df-name { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); }
.df-right { display: flex; flex-direction: column; gap: 2px; }
.df-type { font-family: var(--mono); font-size: 11px; color: var(--dim); }
.df-desc { font-size: 11px; color: var(--mid); line-height: 1.4; }

.tag { font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 2px; font-weight: 700; }
.tag-pk { background: var(--blue-bg); color: var(--blue); }
.tag-fk { background: var(--yellow-bg); color: var(--yellow); }
.tag-new { background: var(--green-bg); color: var(--green); }

.dsec { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--dim); text-transform: uppercase; margin: 12px 0 6px; }

/* relations */
.rel-item {
  font-size: 11px; padding: 5px 8px;
  background: var(--gray-bg); border: 1px solid var(--border);
  border-radius: 4px; margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; transition: background .1s;
}
.rel-item:hover { background: var(--blue-bg); border-color: var(--blue); }
.rel-item .rf { font-family: var(--mono); font-size: 10px; color: var(--yellow); }
.rel-item .rt { font-family: var(--mono); font-size: 10px; color: var(--blue); font-weight: 700; }
.rel-item .rc { color: var(--dim); font-size: 10px; }
.rel-item .rd { color: var(--mid); flex: 1; }

.note-box { background: var(--gray-bg); border-left: 3px solid var(--blue); border-radius: 0 4px 4px 0; padding: 7px 10px; font-size: 11px; color: var(--mid); line-height: 1.6; margin-top: 10px; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="top">
  <div>
    <div class="top-title">ICS 民防系統　資料模型　v1.3　21 張表</div>
    <div class="top-sub">v1.5 新增：SYNC_LOG、SNAPSHOT.source　·　PREDICTION 納入規格　·　點擊查看欄位詳情與關聯</div>
  </div>
  <div class="filter-row">
    <button class="fb all on" onclick="filterGroup('all',this)">全部</button>

    <button class="fb" onclick="filterGroup('resource',this)" style="border-color:#f0d080;color:#f0d080">資源物資</button>
    <button class="fb" onclick="filterGroup('system',this)" style="border-color:#a8dfc0;color:#a8dfc0">系統基礎</button>
  </div>
</div>

<div class="layout">
  <div class="canvas">

  </div>
  <div class="detail" id="detail">
    <div class="detail-head">

      </div>
    </div>
  </div>
</div>

// 關聯定義 [from, fk, to, cardinality, desc]

  ['CMIST','shelter_profile_id','SHELTER_PROFILE','一對一','一筆收容記錄對應一筆特殊需求'],
  ['MEDICATION_LOG','person_id','PERSON','多對一','藥品記錄屬於一個人'],

const GROUP_COLORS = {
  core:     { bg:'#e8f0fc', text:'#1d5fad', label:'人員核心' },
  ops:      { bg:'#f0f2f5', text:'#4a5a70', label:'作業資源' },
  event:    { bg:'#fdeaea', text:'#c92828', label:'事件處置' },
  resource: { bg:'#fff8e0', text:'#c98000', label:'資源物資' },
  system:   { bg:'#eaf7f0', text:'#1a9e52', label:'系統基礎' },
};

let activeTable = null;
let activeGroup = 'all';

// ── render grid ──
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const groups = ['core','ops','event','resource','system'];
  groups.forEach(g => {
    const tables = TABLES.filter(t => t.group === g);
    if (activeGroup !== 'all' && activeGroup !== g) return;
    const gc = GROUP_COLORS[g];
    // separator
    const sep = document.createElement('div');
    sep.className = 'group-sep';
    sep.innerHTML = `
      <span class="glabel" style="background:${gc.bg};color:${gc.text}">${gc.label}</span>
      <div class="gline"></div>
    `;
    grid.appendChild(sep);
    // tables
    tables.forEach(t => {
      const node = document.createElement('div');
      node.className = 'tnode' + (t.isNew ? ' new-v2' : '');
      node.id = 'node-' + t.id;
      if (activeGroup !== 'all' && t.group !== activeGroup) node.classList.add('hidden');

      const previewFields = t.fields.slice(0, 5);
      const moreCount = t.fields.length - 5;

      node.innerHTML = `
        <div class="thead">
          <span class="tname">${t.id}</span>
          ${t.isNew ? '<span class="tnew">★ v2</span>' : `<span class="tbadge">${t.fields.length}欄</span>`}
        </div>
        <div class="tfields">
          ${previewFields.map(f => `
            <div class="tfield">
              <div class="${f.tag==='PK'?'pk-dot':f.tag==='FK'?'fk-dot':f.tag==='NEW'?'new-dot':'plain-dot'}"></div>
              <span class="fname">${f.name}</span>
              <span class="ftype">${f.type.split(' ')[0]}</span>
            </div>
          `).join('')}
          ${moreCount > 0 ? `<div class="tfield" style="color:var(--dim);font-size:9px;justify-content:center">+${moreCount} 更多欄位</div>` : ''}
        </div>
      `;
      node.addEventListener('click', () => selectTable(t.id));
      grid.appendChild(node);
    });
  });
}

// ── select table ──
function selectTable(id) {
  // deactivate previous
  if (activeTable) {
    const prev = document.getElementById('node-' + activeTable);
    if (prev) prev.classList.remove('active');
  }
  activeTable = id;
  const node = document.getElementById('node-' + id);
  if (node) {
    node.classList.add('active');
    node.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  const t = TABLES.find(t => t.id === id);
  if (!t) return;

  const gc = GROUP_COLORS[t.group];
  document.getElementById('d-name').textContent = t.id + (t.isNew ? '　★' : '');
  document.getElementById('d-sub').textContent = t.desc + '　·　' + gc.label;

  // rels involving this table
  const outgoing = RELATIONS.filter(r => r[0] === id);
  const incoming = RELATIONS.filter(r => r[2] === id);

  document.getElementById('d-body').innerHTML = `
    <div class="dsec">欄位（${t.fields.length} 個）</div>
    ${t.fields.map(f => `
      <div class="dfield">
        <div>
          <div class="df-name">${f.name}</div>
          ${f.tag ? `<span class="tag ${f.tag==='PK'?'tag-pk':f.tag==='FK'?'tag-fk':'tag-new'}">${f.tag}</span>` : ''}
        </div>
        <div class="df-right">
          <span class="df-type">${f.type}</span>
          <span class="df-desc">${f.desc}</span>
        </div>
      </div>
    `).join('')}

    ${outgoing.length > 0 ? `
      <div class="dsec">關聯（此表 → 其他表）</div>
      ${outgoing.map(r => `
        <div class="rel-item" onclick="selectTable('${r[2]}')">
          <span class="rf">${r[1]}</span>
          <span style="color:var(--dim);font-size:10px">→</span>
          <span class="rt">${r[2]}</span>
          <span class="rc">（${r[3]}）</span>
          <span class="rd">${r[4]}</span>
        </div>
      `).join('')}
    ` : ''}

    ${incoming.length > 0 ? `
      <div class="dsec">關聯（其他表 → 此表）</div>
      ${incoming.map(r => `
        <div class="rel-item" onclick="selectTable('${r[0]}')">
          <span class="rt">${r[0]}</span>
          <span style="color:var(--dim);font-size:10px">→</span>
          <span class="rf">${r[1]}</span>
          <span class="rc">（${r[3]}）</span>
          <span class="rd">${r[4]}</span>
        </div>
      `).join('')}
    ` : ''}

    ${t.note ? `<div class="note-box">${t.note}</div>` : ''}
  `;
}

// ── filter ──
function filterGroup(g, btn) {
  activeGroup = g;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid();
  // re-activate if still visible
  if (activeTable) {
    const t = TABLES.find(t => t.id === activeTable);
    if (t && (g === 'all' || t.group === g)) {
      setTimeout(() => {
        const node = document.getElementById('node-' + activeTable);
        if (node) node.classList.add('active');
      }, 10);
    }
  }
}

// ── init ──
renderGrid();
</script>
