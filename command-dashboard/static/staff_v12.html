<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ICS 儀表板 command-v0.1.0</title>
<style>
:root {
  --bg:#eef1f6; --surface:#fff; --surface2:#f4f6fa; --border:#d8e0ec;
  --green:#1a9e52; --green-bg:#eaf7f0;
  --yellow:#d49000; --yellow-bg:#fff8e0;
  --red:#cc2a2a; --red-bg:#fdeaea;
  --blue:#2060b0; --blue-bg:#e8f0fc;
  --text:#1a2535; --text2:#4a5a70; --text3:#7a8ba0;
  --mono:'IBM Plex Mono',monospace;
  --hdr:48px; --ab:28px;
  --src-a:#1565C0; --src-b:#E65100; --src-c:#2E7D32;
}
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang TC',sans-serif;}

/* ── HEADER ── */
#hdr{height:var(--hdr);background:#1a2535;border-bottom:2px solid #0d1825;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;}
.h-logo{font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;letter-spacing:.12em;}
.h-ver{font-family:var(--mono);font-size:8px;color:#3a5070;border:1px solid #2d4060;padding:1px 5px;border-radius:2px;}
.h-clock{font-family:var(--mono);font-size:17px;font-weight:700;color:#fff;}
.h-sep{width:1px;height:22px;background:#2a3f5a;flex-shrink:0;}

/* 狀態色塊 */
.status-blocks{display:flex;gap:5px;flex:1;}
.sb{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 10px;border-radius:5px;min-width:80px;cursor:default;transition:background .3s;}
.sb .sb-label{font-family:var(--mono);font-size:7px;color:rgba(255,255,255,.7);letter-spacing:.06em;text-transform:uppercase;}
.sb .sb-val{font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;line-height:1.3;white-space:nowrap;}
.sb.ok{background:rgba(26,158,82,.25);border:1px solid rgba(26,158,82,.5);}
.sb.warn{background:rgba(212,144,0,.3);border:1px solid rgba(212,144,0,.6);}
.sb.crit{background:rgba(204,42,42,.35);border:1px solid rgba(204,42,42,.7);}

#conn{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:#00d466;flex-shrink:0;}
#conn .dot{width:6px;height:6px;border-radius:50%;background:#00d466;box-shadow:0 0 4px #00d466;}
#conn.off .dot{background:#cc2a2a;box-shadow:0 0 4px #cc2a2a;}
#conn.off{color:#cc2a2a;}

/* ── ANALYSIS BAR ── */
#analysis-bar{
  background:#1e2d42;border-bottom:1px solid #2a3f5a;
  height:var(--ab);padding:0 14px;display:flex;align-items:center;
  font-family:var(--mono);font-size:10px;color:#9ab0c8;
  overflow:hidden;flex-shrink:0;
}
#analysis-bar .icon{margin-right:6px;font-size:12px;}

/* ── MAIN 2×2 ── */
#main{
  height:calc(100vh - var(--hdr) - var(--ab));
  display:grid;grid-template-rows:1fr 1fr;grid-template-columns:1fr 1fr;
  gap:5px;padding:5px;overflow:hidden;
}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:7px;display:flex;flex-direction:column;overflow:hidden;min-height:0;transition:background .5s;}
.card.bg-warn{background:#fffcf0;border-color:#e8d8a0;}
.card.bg-crit{background:#fff5f5;border-color:#e0a0a0;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.card-title{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);}
.card-meta{font-family:var(--mono);font-size:8px;color:var(--text3);}
.card-body{flex:1;padding:6px 8px;overflow:hidden;min-height:0;display:flex;flex-direction:column;gap:4px;}

/* ── LEGEND ── */
.legend{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;color:var(--text3);}
.ld{width:16px;height:3px;border-radius:1px;flex-shrink:0;}
.ld.dash{background:transparent;border-top:2px dashed;}

/* ── CHART ── */
.chart-wrap{flex:1;min-height:0;position:relative;}
canvas{display:block;width:100%!important;height:100%!important;}

/* ── OVERLAY MODAL ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(10,20,35,.75);z-index:100;align-items:center;justify-content:center;}
#overlay.show{display:flex;}
#modal{background:var(--surface);border-radius:10px;border:1px solid var(--border);width:min(720px,94vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}
#modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
#modal-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text2);}
#modal-close{font-size:16px;cursor:pointer;color:var(--text3);background:none;border:none;padding:2px 6px;border-radius:3px;}
#modal-close:hover{background:var(--bg);}
#modal-body{flex:1;overflow-y:auto;padding:14px;}

/* ── SLICE ── */
.slice-time{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.slice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.slice-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:10px;}
.slice-card-title{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.slice-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:3px;}
.slice-row .sk{color:var(--text3);}
.slice-row .sv{font-family:var(--mono);font-weight:700;}
.slice-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.slice-fill{height:100%;border-radius:2px;}
.src-breakdown{display:flex;gap:5px;margin-top:6px;}
.src-chip{flex:1;padding:4px 6px;border-radius:4px;text-align:center;border:1px solid;}
.src-chip .sc-label{font-family:var(--mono);font-size:7px;margin-bottom:1px;}
.src-chip .sc-val{font-family:var(--mono);font-size:16px;font-weight:700;line-height:1;}
.section-title{font-size:10px;font-weight:700;color:var(--text2);margin:10px 0 8px;letter-spacing:.05em;}

/* ── CHART NAV (圖表兩側) ── */
.side-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(255,255,255,.75);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:16px;padding:10px 3px;color:var(--text2);opacity:.3;transition:opacity .2s;line-height:1;}
.side-nav:hover{opacity:.9;background:rgba(255,255,255,.95);}
.side-nav.left{left:2px;}
.side-nav.right{right:2px;}

/* ── HEADER NAV (最新+範圍) ── */
.hdr-nav{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.hdr-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:8px;padding:1px 5px;color:var(--text2);font-family:var(--mono);}
.hdr-nav button:hover{background:var(--bg);border-color:var(--text3);}
.hdr-nav .nav-label{font-family:var(--mono);font-size:7px;color:var(--text3);}

/* ── EXPAND ── */
.expand-btn{background:none;border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:11px;padding:0 4px;color:var(--text3);line-height:1.4;}
.expand-btn:hover{background:var(--bg);color:var(--text2);}
.card.expanded{position:fixed;top:calc(var(--hdr) + var(--ab));left:0;right:0;bottom:0;z-index:50;border-radius:0;border:none;}
</style>
</head>
<body>

<!-- ═══════ HEADER ═══════ -->
<div id="hdr">
  <img src="/static/badge.png" alt="ICS" style="height:34px;width:34px;border-radius:50%;margin-right:4px;">
  <div class="h-ver">cmd-v0.1.0</div>
  <div class="h-clock" id="clock">--:--:--</div>
  <div class="h-sep"></div>
  <div class="status-blocks">
    <div class="sb ok" id="sb-cap"><div class="sb-label">量能</div><div class="sb-val" id="sb-cap-v">—</div></div>
    <div class="sb ok" id="sb-flow"><div class="sb-label">流向</div><div class="sb-val" id="sb-flow-v">—</div></div>
    <div class="sb ok" id="sb-inc"><div class="sb-label">事件</div><div class="sb-val" id="sb-inc-v">—</div></div>
    <div class="sb ok" id="sb-res"><div class="sb-label">資源</div><div class="sb-val" id="sb-res-v">—</div></div>
  </div>
  <div class="h-sep"></div>
  <div style="font-family:var(--mono);font-size:8px;color:var(--text3);text-align:right;">
    <div id="last-update">—</div>
  </div>
  <div class="h-sep"></div>
  <div id="conn"><div class="dot"></div><span id="conn-label">待連線</span></div>
</div>

<!-- ═══════ ANALYSIS BAR ═══════ -->
<div id="analysis-bar"><span class="icon">🟢</span><span id="analysis-text">系統啟動中⋯</span></div>

<!-- ═══════ MAIN 2×2 ═══════ -->
<div id="main">
  <div class="card" id="card-1">
    <div class="card-hdr">
      <div class="card-title">① 量能壓力 · 收容+醫療床位</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="hdr-nav"><span class="nav-label" id="nav-range"></span><button onclick="navChart(0)">最新</button></div>
        <button class="expand-btn" onclick="toggleExpand('card-1')">⤢</button>
      </div>
    </div>
    <div class="card-body">
      <div class="legend">
        <div class="li"><div class="ld" style="background:#E67E22;height:4px"></div>收容床位%</div>
        <div class="li"><div class="ld" style="background:#C0392B;height:4px"></div>醫療床位%</div>
        <div class="li"><div class="ld dash" style="border-color:rgba(90,138,176,.6)"></div>警戒70%</div>
        <div class="li"><div class="ld dash" style="border-color:rgba(204,42,42,.5)"></div>危急90%</div>
      </div>
      <div class="chart-wrap"><button class="side-nav left" onclick="navChart(-1)">◀</button><canvas id="c1"></canvas><button class="side-nav right" onclick="navChart(1)">▶</button></div>
    </div>
  </div>

  <div class="card" id="card-2">
    <div class="card-hdr">
      <div class="card-title">② 流向與橋接 · 來源+SRT→醫療</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="hdr-nav"><span class="nav-label" id="nav-range-2"></span><button onclick="navChart(0)">最新</button></div>
        <button class="expand-btn" onclick="toggleExpand('card-2')">⤢</button>
      </div>
    </div>
    <div class="card-body">
      <div class="legend" style="flex-direction:column;gap:2px;">
        <div style="display:flex;gap:8px;">
          <div class="li"><div class="ld" style="background:#1565C0;height:4px"></div>A 前進組</div>
          <div class="li"><div class="ld" style="background:#E65100;height:4px"></div>B 收容轉送</div>
          <div class="li"><div class="ld" style="background:#2E7D32;height:4px"></div>C 自行抵達</div>
        </div>
        <div style="display:flex;gap:8px;">
          <div class="li"><div class="ld" style="background:#E74C3C;height:4px"></div>SRT Red+</div>
          <div class="li"><div class="ld" style="background:#FF8F00;height:4px"></div>醫療紅傷</div>
        </div>
      </div>
      <div class="chart-wrap"><button class="side-nav left" onclick="navChart(-1)">◀</button><canvas id="c2"></canvas><button class="side-nav right" onclick="navChart(1)">▶</button></div>
    </div>
  </div>

  <div class="card" id="card-3">
    <div class="card-hdr">
      <div class="card-title">③ 事件態勢 · 頻率+嚴重度+積壓</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="hdr-nav"><span class="nav-label" id="nav-range-3"></span><button onclick="navChart(0)">最新</button></div>
        <button class="expand-btn" onclick="toggleExpand('card-3')">⤢</button>
      </div>
    </div>
    <div class="card-body">
      <div class="legend">
        <div class="li"><div class="ld" style="background:var(--red)"></div>高</div>
        <div class="li"><div class="ld" style="background:var(--yellow)"></div>中</div>
        <div class="li"><div class="ld" style="background:var(--green)"></div>低</div>
        <div class="li"><div class="ld" style="background:#1a2535;height:4px"></div>未結累計</div>
        <div class="li"><div class="ld dash" style="border-color:var(--text3)"></div>結案速率</div>
      </div>
      <div class="chart-wrap"><button class="side-nav left" onclick="navChart(-1)">◀</button><canvas id="c3"></canvas><button class="side-nav right" onclick="navChart(1)">▶</button></div>
    </div>
  </div>

  <div class="card" id="card-4">
    <div class="card-hdr">
      <div class="card-title">④ 資源 · 人力負荷+物資消耗</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="hdr-nav"><span class="nav-label" id="nav-range-4"></span><button onclick="navChart(0)">最新</button></div>
        <button class="expand-btn" onclick="toggleExpand('card-4')">⤢</button>
      </div>
    </div>
    <div class="card-body">
      <div class="legend">
        <div class="li"><div class="ld" style="background:#1976D2;height:4px"></div>收容人均</div>
        <div class="li"><div class="ld" style="background:#7B1FA2;height:4px"></div>醫療人均</div>
        <div class="li"><div class="ld dash" style="border-color:#D32F2F;border-width:3px"></div>IV%</div>
        <div class="li"><div class="ld dash" style="border-color:#F57F17;border-width:3px"></div>氧氣%</div>
        <div class="li"><div class="ld dash" style="border-color:#388E3C;border-width:3px"></div>止血帶%</div>
      </div>
      <div class="chart-wrap"><button class="side-nav left" onclick="navChart(-1)">◀</button><canvas id="c4"></canvas><button class="side-nav right" onclick="navChart(1)">▶</button></div>
    </div>
  </div>
</div>

<!-- ═══════ OVERLAY ═══════ -->
<div id="overlay">
  <div id="modal">
    <div id="modal-hdr">
      <div id="modal-title">切面</div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// 資料層：API polling + mock fallback
// ══════════════════════════════════════════════════════════════

const API_BASE = location.origin;
const POLL_INTERVAL = 5000;
const VIEW_SIZE = 12;  // 圖表可視區間（顯示幾個時間點）
let _data = null;      // 最新 /api/dashboard 回傳
let _viewEnd = -1;     // 可視區間右端 index（-1 = 最新）

function getApiSeries(data) {
  const sh = data.shelter_history || [];
  const mh = data.medical_history || [];
  if (sh.length < 1 && mh.length < 1) return null;
  const N = Math.max(sh.length, mh.length);
  const pad = (arr, n) => { while(arr.length < n) arr.unshift(arr[0]||{}); return arr.slice(-n); };
  const s = pad([...sh].reverse(), N);  // API 回傳最新在前，反轉為時間正序
  const m = pad([...mh].reverse(), N);
  const ex = (snap) => (typeof snap.extra === 'string' ? JSON.parse(snap.extra) : snap.extra) || {};
  const times = s.map(snap => (snap.snapshot_time||snap.t||'').slice(11,16) || '?');

  return {
    times, N,
    sPct: s.map(snap => snap.bed_total ? Math.round((snap.bed_used||0)/snap.bed_total*100) : 0),
    mPct: m.map(snap => snap.bed_total ? Math.round((snap.bed_used||0)/snap.bed_total*100) : 0),
    sBu: s.map(snap => snap.bed_used||0), sBt: s.map(snap => snap.bed_total||0),
    mBu: m.map(snap => snap.bed_used||0), mBt: m.map(snap => snap.bed_total||0),
    srcA: m.map(snap => ex(snap).src_a || 0),
    srcB: m.map(snap => ex(snap).src_b || 0),
    srcC: m.map(snap => ex(snap).src_c || 0),
    srtR: s.map(snap => { const srt = snap.srt || ex(snap).srt || {}; return srt.red || 0; }),
    srtY: s.map(snap => { const srt = snap.srt || ex(snap).srt || {}; return srt.yellow || 0; }),
    srtG: s.map(snap => { const srt = snap.srt || ex(snap).srt || {}; return srt.green || 0; }),
    medCR: m.map(snap => (snap.casualties_red ?? (snap.casualties||{}).red) || 0),
    medCY: m.map(snap => (snap.casualties_yellow ?? (snap.casualties||{}).yellow) || 0),
    medCG: m.map(snap => (snap.casualties_green ?? (snap.casualties||{}).green) || 0),
    medCB: m.map(snap => (snap.casualties_black ?? (snap.casualties||{}).black) || 0),
    pendS: s.map(snap => snap.pending_intake || 0),
    // 事件
    incHigh: s.map((snap,i) => (ex(snap).incident_pressure?.high||0) + (ex(m[i]).incident_pressure?.high||0)),
    incMed:  s.map((snap,i) => (ex(snap).incident_pressure?.medium||0) + (ex(m[i]).incident_pressure?.medium||0)),
    incLow:  s.map((snap,i) => (ex(snap).incident_pressure?.low||0) + (ex(m[i]).incident_pressure?.low||0)),
    incOpen: s.map((snap,i) => (ex(snap).incident_pressure?.open_total||0) + (ex(m[i]).incident_pressure?.open_total||0)),
    incRes:  s.map((snap,i) => (ex(snap).incident_pressure?.resolved_30min||0) + (ex(m[i]).incident_pressure?.resolved_30min||0)),
    // 資源
    opsS: s.map(snap => ex(snap).staff_ratio || 0),
    opsM: m.map(snap => ex(snap).staff_ratio || 0),
    ivPct:  m.map(snap => { const sup=ex(snap).supplies||{}, mx=ex(snap).supplies_max||{}; return mx.iv ? Math.round((sup.iv||0)/mx.iv*100) : 100; }),
    oxPct:  m.map(snap => { const sup=ex(snap).supplies||{}, mx=ex(snap).supplies_max||{}; return mx.oxygen ? Math.round((sup.oxygen||0)/mx.oxygen*100) : 100; }),
    toPct:  m.map(snap => { const sup=ex(snap).supplies||{}, mx=ex(snap).supplies_max||{}; return mx.tourniquet ? Math.round((sup.tourniquet||0)/mx.tourniquet*100) : 100; }),
    // 原始
    rawS: s, rawM: m,
    rawIncS: s.map(snap => { const ip=ex(snap).incident_pressure||{}; return {h:ip.high||0,m:ip.medium||0,l:ip.low||0,open:ip.open_total||0,res:ip.resolved_30min||0}; }),
    rawIncM: m.map(snap => { const ip=ex(snap).incident_pressure||{}; return {h:ip.high||0,m:ip.medium||0,l:ip.low||0,open:ip.open_total||0,res:ip.resolved_30min||0}; }),
  };
}

function getSeries() {
  if (!_data) return null;
  const full = getApiSeries(_data);
  if (!full) return null;
  // 套用 viewport 裁切
  const total = full.N;
  if (total <= VIEW_SIZE) { _viewEnd = -1; return full; }
  const end = _viewEnd < 0 ? total : Math.min(_viewEnd, total);
  const start = Math.max(0, end - VIEW_SIZE);
  return sliceSeries(full, start, end);
}

function sliceSeries(d, s, e) {
  const sl = arr => (arr||[]).slice(s, e);
  return {
    ...d, N: e - s, _totalN: d.N, _start: s, _end: e,
    times: sl(d.times),
    sPct: sl(d.sPct), mPct: sl(d.mPct),
    sBu: sl(d.sBu), sBt: sl(d.sBt), mBu: sl(d.mBu), mBt: sl(d.mBt),
    srcA: sl(d.srcA), srcB: sl(d.srcB), srcC: sl(d.srcC),
    srtR: sl(d.srtR), srtY: sl(d.srtY), srtG: sl(d.srtG),
    medCR: sl(d.medCR), medCY: sl(d.medCY), medCG: sl(d.medCG), medCB: sl(d.medCB),
    pendS: sl(d.pendS),
    incHigh: sl(d.incHigh), incMed: sl(d.incMed), incLow: sl(d.incLow),
    incOpen: sl(d.incOpen), incRes: sl(d.incRes),
    opsS: sl(d.opsS), opsM: sl(d.opsM),
    ivPct: sl(d.ivPct), oxPct: sl(d.oxPct), toPct: sl(d.toPct),
    rawS: sl(d.rawS), rawM: sl(d.rawM),
    rawIncS: sl(d.rawIncS), rawIncM: sl(d.rawIncM),
  };
}

function navChart(dir) {
  if (!_data) return;
  const full = getApiSeries(_data);
  if (!full) return;
  const total = full.N;
  if (dir === 0) { _viewEnd = -1; } // 最新
  else {
    const curEnd = _viewEnd < 0 ? total : _viewEnd;
    _viewEnd = Math.max(VIEW_SIZE, Math.min(total, curEnd + dir * Math.floor(VIEW_SIZE / 2)));
    if (_viewEnd >= total) _viewEnd = -1; // 到底了就切回最新
  }
  refresh();
}

// ── API polling ──
async function poll() {
  try {
    const resp = await fetch(API_BASE + '/api/dashboard', { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) throw new Error(resp.status);
    _data = await resp.json();
    el('conn').className = '';
    el('conn-label').textContent = '即時';
  } catch(e) {
    el('conn').className = 'off';
    el('conn-label').textContent = _data ? '離線' : '待連線';
  }
  refresh();
}

// ══════════════════════════════════════════════════════════════
// 算法工具
// ══════════════════════════════════════════════════════════════

function slope(arr) {
  const n = arr.length;
  if (n < 4) return 0;
  return ((arr[n-1]+arr[n-2]+arr[n-3])/3) - ((arr[0]+arr[1]+arr[2])/3);
}
function rate(arr) {
  const n = arr.length;
  if (n < 2) return 0;
  return (arr[n-1]-arr[0])/(n-1);
}
function minsUntil(current, threshold, ratePerSnap, snapMins) {
  if (ratePerSnap <= 0) return null;
  const remaining = threshold - current;
  if (remaining <= 0) return 0;
  return Math.round((remaining / ratePerSnap) * snapMins);
}
function ipiCalc(h, m) { return h * 3 + m; }
function clr(level) { return level === 'crit' ? 'crit' : level === 'warn' ? 'warn' : 'ok'; }

// ══════════════════════════════════════════════════════════════
// Canvas 繪圖
// ══════════════════════════════════════════════════════════════

function drawChart(id, datasets, opts, N, times, onClickCb) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const par = canvas.parentElement;
  const W = par.clientWidth, H = par.clientHeight;
  if (!W || !H) return;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const pad = {t:6, r:28, b:20, l:30};
  const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;
  const yMin = opts.yMin||0, yMax = opts.yMax||100, yR = yMax-yMin||1;

  function px(i){ return pad.l + (i/(N-1)) * cW; }
  function py(v){ return pad.t + cH - ((v-yMin)/yR)*cH; }

  // Grid
  ctx.strokeStyle='#d8e0ec'; ctx.lineWidth=0.5;
  const gridSteps = opts.gridSteps || [0,25,50,75,100];
  gridSteps.filter(v => v >= yMin && v <= yMax).forEach(v => {
    const y = py(v);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cW,y); ctx.stroke();
    ctx.fillStyle='#9ab0c8'; ctx.font='6px IBM Plex Mono,monospace'; ctx.textAlign='right';
    ctx.fillText(v, pad.l-3, y+2);
  });

  // Threshold lines
  (opts.thresholds||[]).forEach(th => {
    ctx.strokeStyle=th.color; ctx.lineWidth=1; ctx.setLineDash([4,3]);
    const y = py(th.value);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cW,y); ctx.stroke();
    ctx.setLineDash([]);
  });

  // Stacked bars
  if (opts.stacked) {
    for (let i = 0; i < N; i++) {
      let base = 0;
      opts.stacked.forEach(st => {
        const v = st.data[i] || 0;
        const barW = cW/(N-1)*0.6;
        ctx.fillStyle = st.color;
        const barH = (v/yR)*cH;
        ctx.fillRect(px(i)-barW/2, py(base+v), barW, barH);
        base += v;
      });
    }
  }

  // Stacked area
  if (opts.stackedArea) {
    const layers = opts.stackedArea;
    // 從下往上堆疊
    const cumul = Array(N).fill(0);
    layers.forEach(layer => {
      const top = layer.data.map((v,i) => cumul[i] + (v||0));
      // 填色
      ctx.beginPath();
      for (let i=0; i<N; i++) { i===0 ? ctx.moveTo(px(i), py(top[i])) : ctx.lineTo(px(i), py(top[i])); }
      for (let i=N-1; i>=0; i--) { ctx.lineTo(px(i), py(cumul[i])); }
      ctx.closePath();
      ctx.fillStyle = layer.fillColor;
      ctx.fill();
      // 邊線
      ctx.strokeStyle = layer.color; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i=0; i<N; i++) { i===0 ? ctx.moveTo(px(i), py(top[i])) : ctx.lineTo(px(i), py(top[i])); }
      ctx.stroke();
      // 更新累計
      top.forEach((v,i) => cumul[i] = v);
    });
  }

  // Lines
  datasets.forEach(ds => {
    if (ds.fill) {
      ctx.beginPath();
      ds.data.forEach((v,i) => { i===0 ? ctx.moveTo(px(i),py(v)) : ctx.lineTo(px(i),py(v)); });
      ctx.lineTo(px(N-1),py(yMin)); ctx.lineTo(px(0),py(yMin)); ctx.closePath();
      ctx.fillStyle = ds.fillColor||'rgba(200,220,255,.1)'; ctx.fill();
    }
    ctx.strokeStyle=ds.color; ctx.lineWidth=ds.w||2; ctx.lineJoin='round';
    ctx.setLineDash(ds.dash||[]);
    ctx.beginPath();
    ds.data.forEach((v,i) => { i===0 ? ctx.moveTo(px(i),py(v)) : ctx.lineTo(px(i),py(v)); });
    ctx.stroke(); ctx.setLineDash([]);
    // 資料點
    ds.data.forEach((v,i) => {
      ctx.fillStyle=ds.color; ctx.beginPath(); ctx.arc(px(i),py(v),2.5,0,Math.PI*2); ctx.fill();
    });
    // 末端值
    const lv = ds.data[N-1];
    ctx.fillStyle=ds.color; ctx.font='bold 8px IBM Plex Mono,monospace'; ctx.textAlign='left';
    ctx.fillText(lv+(ds.unit||''), px(N-1)+4, py(lv)+3);
  });

  // X 軸
  ctx.fillStyle='#7a8ba0'; ctx.font='7px IBM Plex Mono,monospace'; ctx.textAlign='center';
  times.forEach((t,i) => { if(i%2===0 || i===N-1) ctx.fillText(t, px(i), H-3); });

  // 點擊
  if (onClickCb) {
    canvas.onclick = function(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) - pad.l;
      const idx = Math.round((x / cW) * (N-1));
      if (idx >= 0 && idx < N) onClickCb(idx);
    };
  }
}

// ══════════════════════════════════════════════════════════════
// 主要渲染
// ══════════════════════════════════════════════════════════════

function refresh() {
  const d = getSeries();
  if (!d) {
    el('analysis-bar').innerHTML = '<span class="icon">&#9711;</span><span>等待資料中⋯ 尚未收到任何快照</span>';
    return;
  }
  renderHeader(d);
  renderAnalysis(d);
  renderCharts(d);
}

function renderHeader(d) {
  const N = d.N;
  // 量能
  const sp = d.sPct[N-1], mp = d.mPct[N-1];
  const capMax = Math.max(sp, mp);
  const capLvl = capMax >= 90 ? 'crit' : capMax >= 70 ? 'warn' : 'ok';
  el('sb-cap').className = 'sb ' + capLvl;
  el('sb-cap-v').textContent = '收容'+sp+'% 醫療'+mp+'%';

  // 流向
  const sa=d.srcA[N-1], sb=d.srcB[N-1], sc=d.srcC[N-1];
  const maxSrc = Math.max(sa,sb,sc);
  const srcName = maxSrc===sa ? 'A前進' : maxSrc===sb ? 'B收容' : 'C自行';
  const srcRate = rate(d.srcB);
  const flowLvl = srcRate > 0.5 ? 'crit' : srcRate > 0.3 ? 'warn' : 'ok';
  el('sb-flow').className = 'sb ' + flowLvl;
  el('sb-flow-v').textContent = '主要：' + srcName;

  // 事件
  const totalIPI = ipiCalc(d.incHigh[N-1], d.incMed[N-1]);
  const incLvl = totalIPI >= 6 ? 'crit' : totalIPI >= 3 ? 'warn' : 'ok';
  el('sb-inc').className = 'sb ' + incLvl;
  el('sb-inc-v').textContent = 'IPI ' + totalIPI + '　未結 ' + d.incOpen[N-1];

  // 資源
  const ivLast = d.ivPct[N-1], oxLast = d.oxPct[N-1], toL = d.toPct[N-1];
  const minSupply = Math.min(ivLast, oxLast, toL);
  const ivR = rate(d.ivPct);
  const minsIV = ivR < 0 ? minsUntil(ivLast, 20, Math.abs(ivR), 5) : null;
  const resLvl = minSupply <= 20 ? 'crit' : (minSupply <= 40 || (minsIV !== null && minsIV < 30)) ? 'warn' : 'ok';
  el('sb-res').className = 'sb ' + resLvl;
  el('sb-res-v').textContent = minsIV !== null && minsIV < 60 ? 'IV '+minsIV+'m 見底' : '物資 '+minSupply+'%';

  // 卡片背景色
  setCardBg('card-1', capLvl);
  setCardBg('card-2', flowLvl);
  setCardBg('card-3', incLvl);
  setCardBg('card-4', resLvl);

  // 更新時間
  el('last-update').textContent = new Date().toTimeString().slice(0,8);

  // 導覽範圍標籤
  const totalN = d._totalN || d.N;
  const start = d._start != null ? d._start + 1 : 1;
  const end = d._end != null ? d._end : totalN;
  const rangeText = totalN <= VIEW_SIZE ? `${totalN}筆` : `${start}-${end} / ${totalN}`;
  ['nav-range','nav-range-2','nav-range-3','nav-range-4'].forEach(id => {
    const e = document.getElementById(id); if (e) e.textContent = rangeText;
  });
}

function setCardBg(id, lvl) {
  const card = el(id);
  card.classList.remove('bg-warn','bg-crit');
  if (lvl === 'crit') card.classList.add('bg-crit');
  else if (lvl === 'warn') card.classList.add('bg-warn');
}

function renderAnalysis(d) {
  const N = d.N;
  const parts = [];

  // 量能
  const mSl = slope(d.mPct);
  if (mSl > 15) parts.push('醫療量能加速上升（+'+Math.round(mSl)+'%）');
  else if (mSl > 5) parts.push('醫療量能持續上升');
  const sSl = slope(d.sPct);
  if (sSl > 20) parts.push('收容量能加速');

  // 來源
  const srcBR = rate(d.srcB);
  if (srcBR > 0.3) parts.push('B來源（收容轉送）上升，SRT壓力轉移中');
  const srcAR = rate(d.srcA);
  if (srcAR > 0.3) parts.push('前進組持續送入');

  // 橋接
  const srtSl = slope(d.srtR);
  if (srtSl > 0 && d.srtR[N-1] > d.medCR[N-1]) parts.push('SRT橋接預警：約15分鐘後到達醫療');

  // 事件
  const totalIPI = ipiCalc(d.incHigh[N-1], d.incMed[N-1]);
  if (totalIPI >= 6) parts.push('現場高壓（IPI '+totalIPI+'）');
  else if (totalIPI >= 3) parts.push('事件密度上升（IPI '+totalIPI+'）');

  // 物資
  const ivR = rate(d.ivPct);
  if (ivR < 0) {
    const mins = minsUntil(d.ivPct[N-1], 20, Math.abs(ivR), 5);
    if (mins !== null && mins < 60) parts.push('IV輸液'+mins+'分見底');
  }

  // 人力
  const sRatio = d.opsS[N-1], mRatio = d.opsM[N-1];
  if (mRatio > 5) parts.push('醫療人力負擔危險（人均'+mRatio.toFixed(1)+'）');
  if (sRatio > 12) parts.push('收容人力負擔危險（人均'+sRatio.toFixed(1)+'）');

  const bar = el('analysis-bar');
  if (parts.length === 0) {
    bar.innerHTML = '<span class="icon">🟢</span><span>各組運作正常，無異常趨勢。</span>';
  } else {
    const worst = parts.some(p => p.includes('加速') || p.includes('危險') || p.includes('高壓') || p.includes('見底'));
    const icon = worst ? '🔴' : '🟡';
    bar.innerHTML = '<span class="icon">'+icon+'</span><span>' + parts.join('。') + '。</span>';
  }
}

function renderCharts(d) {
  const N = d.N, T = d.times, cb = idx => showSlice(idx, d);

  // ① 量能
  drawChart('c1', [
    {data:d.sPct, color:'#E67E22', w:2.5, unit:'%', fill:true, fillColor:'rgba(230,126,34,.1)'},
    {data:d.mPct, color:'#C0392B', w:2.5, unit:'%', fill:true, fillColor:'rgba(192,57,43,.1)'},
  ], {yMin:0,yMax:100, thresholds:[{value:70,color:'rgba(90,138,176,.5)'},{value:90,color:'rgba(204,42,42,.4)'}]}, N, T, cb);

  // ② 流向+橋接
  const srcMax = Math.max(...d.srcA.map((a,i)=>a+(d.srcB[i]||0)+(d.srcC[i]||0)), ...d.srtR) + 3;
  drawChart('c2', [
    {data:d.srtR,  color:'#E74C3C', w:2, unit:''},
    {data:d.medCR, color:'#FF8F00', w:2, unit:''},
    {data:d.pendS, color:'#7a8ba0', w:1, unit:'', dash:[4,2]},
  ], {
    yMin:0, yMax:srcMax,
    stacked:[
      {data:d.srcA, color:'#1565C0'},
      {data:d.srcB, color:'#E65100'},
      {data:d.srcC, color:'#2E7D32'},
    ],
    gridSteps: Array.from({length:6},(_,i)=>Math.round(srcMax/5*i)),
  }, N, T, cb);

  // ③ 事件態勢
  const incMax = Math.max(...d.incOpen, ...d.incHigh.map((h,i)=>h+(d.incMed[i]||0)+(d.incLow[i]||0))) + 2;
  drawChart('c3', [
    {data:d.incOpen, color:'#1a2535', w:2.5, unit:''},
    {data:d.incRes,  color:'#7a8ba0', w:1.5, unit:'', dash:[4,2]},
  ], {
    yMin:0, yMax:Math.max(incMax, 5),
    stackedArea:[
      {data:d.incLow,  color:'#1a9e52', fillColor:'rgba(26,158,82,.2)'},
      {data:d.incMed,  color:'#d49000', fillColor:'rgba(212,144,0,.25)'},
      {data:d.incHigh, color:'#cc2a2a', fillColor:'rgba(204,42,42,.3)'},
    ],
    gridSteps: Array.from({length:6},(_,i)=>Math.round(Math.max(incMax,5)/5*i)),
  }, N, T, cb);

  // ④ 資源
  drawChart('c4', [
    {data:d.opsS, color:'#1976D2', w:2.5, unit:''},
    {data:d.opsM, color:'#7B1FA2', w:2.5, unit:''},
    {data:d.ivPct,  color:'#D32F2F', w:1.5, unit:'%', dash:[3,2]},
    {data:d.oxPct,  color:'#F57F17', w:1.5, unit:'%', dash:[3,2]},
    {data:d.toPct,  color:'#388E3C', w:1.5, unit:'%', dash:[3,2]},
  ], {yMin:0,yMax:100, thresholds:[{value:20,color:'rgba(204,42,42,.4)'}]}, N, T, cb);
}

// ══════════════════════════════════════════════════════════════
// 切面 Modal（資訊層）
// ══════════════════════════════════════════════════════════════

function showSlice(idx, d) {
  const N = d.N, t = d.times[idx];
  const sp = d.sPct[idx], mp = d.mPct[idx];
  const slc = sp>=90?'var(--red)':sp>=70?'var(--yellow)':'var(--green)';
  const mlc = mp>=90?'var(--red)':mp>=70?'var(--yellow)':'var(--green)';

  // 來源
  const sa=d.srcA[idx], sb=d.srcB[idx], sc=d.srcC[idx];
  const maxS=Math.max(sa,sb,sc);
  const srcDiag = maxS===sa ? '▶ 主要來自前進組，確認前線傷患狀況'
    : maxS===sb ? '▶ 主要來自收容轉送，SRT 篩選壓力轉移中'
    : '▶ 主要自行抵達，確認外圍壓力來源';

  // 事件
  const si = d.rawIncS[idx]||{h:0,m:0,l:0,open:0,res:0};
  const mi = d.rawIncM[idx]||{h:0,m:0,l:0,open:0,res:0};
  const sIPI = ipiCalc(si.h, si.m), mIPI = ipiCalc(mi.h, mi.m);
  const ic = v => v>=6?'var(--red)':v>=3?'var(--yellow)':'var(--green)';

  // 物資（mock 用原始值，API 用 %）
  const rawM = d.rawM[idx] || {};
  const iv = d.ivPct[idx], ox = d.oxPct[idx], to = d.toPct[idx];
  const supBar = (label, pct) => {
    const c = pct<=20?'var(--red)':pct<=40?'var(--yellow)':'var(--green)';
    return `<div class="slice-row"><span class="sk">${label}</span><span class="sv" style="color:${c}">${pct}%</span></div><div class="slice-bar"><div class="slice-fill" style="width:${pct}%;background:${c}"></div></div>`;
  };

  // 趨勢分析
  const analysis = buildSliceAnalysis(idx, d);

  let html = `<div class="slice-time">${t} 時間點完整切面</div>`;

  // 分段條產生器（segments = [{count, color, label}]）
  function segBar(segments, total) {
    if (!total) return '';
    let h = `<div style="display:flex;height:20px;border-radius:4px;overflow:hidden;background:#eee;margin:6px 0 2px;">`;
    segments.forEach(seg => {
      if (seg.count <= 0) return;
      const w = (seg.count / total * 100).toFixed(1);
      h += `<div style="width:${w}%;background:${seg.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;min-width:18px;">${seg.count}</div>`;
    });
    h += '</div>';
    // 標籤列
    h += '<div style="display:flex;gap:8px;margin-top:2px;">';
    segments.forEach(seg => {
      h += `<div style="font-size:8px;color:var(--text3)"><span style="color:${seg.color}">■</span> ${seg.label}${seg.count}</div>`;
    });
    h += '</div>';
    return h;
  }

  // 床位卡片產生器（PWA 風格：大數字 + 分段條 + 變化率）
  function bedCard(title, unit, bu, bt, pct, color, idx, buArr, segments, extras) {
    // 變化率
    let rateHtml = '';
    if (idx > 0) {
      const diff = bu - (buArr[idx-1]||0);
      if (diff !== 0) {
        const arrow = diff > 0 ? '▲' : '▼';
        const rc = diff > 0 ? 'var(--red)' : 'var(--green)';
        rateHtml = `<div style="font-size:10px;color:var(--text3);margin-top:2px;">${arrow} <span style="color:${rc}">${diff>0?'+':''}${diff}</span>/${unit} · 依據 ${idx+1} 筆</div>`;
      }
    }
    let h = `<div class="slice-card"><div class="slice-card-title">${title}</div>`;
    h += `<div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px;">`;
    h += `<span style="font-size:32px;font-weight:800;color:var(--text1)">${bu}</span>`;
    h += `<span style="font-size:13px;color:var(--text3)">/ ${bt}${unit}</span>`;
    h += `<span style="font-size:24px;font-weight:700;color:${color};margin-left:auto">${pct}%</span>`;
    h += `</div>`;
    h += segBar(segments, bt);
    h += rateHtml;
    // 額外指標
    extras.forEach(e => {
      h += `<div class="slice-row" style="margin-top:4px"><span class="sk">${e.label}</span><span class="sv" style="color:${e.color||'inherit'}">${e.value}</span></div>`;
    });
    h += '</div>';
    return h;
  }

  // 雙組並排
  html += '<div class="slice-grid">';
  html += bedCard('收容組', '人', d.sBu[idx], d.sBt[idx], sp, slc, idx, d.sBu,
    [
      {count: d.srtR[idx], color:'#e74c3c', label:'R'},
      {count: d.srtY[idx], color:'#f1c40f', label:'Y'},
      {count: d.srtG[idx], color:'#2ecc71', label:'G'},
    ],
    [
      {label:'待入站', value: d.pendS[idx]+' 人'},
      {label:'人均服務量', value: d.opsS[idx].toFixed?d.opsS[idx].toFixed(1):d.opsS[idx]},
    ]
  );
  html += bedCard('醫療組', '床', d.mBu[idx], d.mBt[idx], mp, mlc, idx, d.mBu,
    [
      {count: d.medCB[idx], color:'#2c3e50', label:'黑'},
      {count: d.medCR[idx], color:'#e74c3c', label:'紅'},
      {count: d.medCY[idx], color:'#f1c40f', label:'黃'},
      {count: d.medCG[idx], color:'#2ecc71', label:'綠'},
    ],
    [
      {label:'人均服務量', value: d.opsM[idx].toFixed?d.opsM[idx].toFixed(1):d.opsM[idx]},
    ]
  );
  html += '</div>';

  // 來源分析
  html += '<div class="slice-card"><div class="slice-card-title">醫療入站來源（累計至 '+t+'）</div>';
  html += '<div class="src-breakdown">';
  html += `<div class="src-chip" style="background:rgba(32,96,176,.08);border-color:var(--src-a)"><div class="sc-label" style="color:var(--src-a)">A 前進組</div><div class="sc-val" style="color:var(--src-a)">${sa}</div></div>`;
  html += `<div class="src-chip" style="background:rgba(212,144,0,.08);border-color:var(--src-b)"><div class="sc-label" style="color:var(--src-b)">B 收容轉送</div><div class="sc-val" style="color:var(--src-b)">${sb}</div></div>`;
  html += `<div class="src-chip" style="background:rgba(26,158,82,.08);border-color:var(--src-c)"><div class="sc-label" style="color:var(--src-c)">C 自行抵達</div><div class="sc-val" style="color:var(--src-c)">${sc}</div></div>`;
  html += '</div>';
  html += `<div style="font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:6px;">${srcDiag}</div>`;
  html += '</div>';

  // 事件摘要
  html += '<div class="slice-card"><div class="slice-card-title">事件壓力（最近 30 分）</div>';
  html += '<div style="display:flex;gap:8px;">';
  html += `<div style="flex:1;text-align:center;padding:8px;background:#fff;border-radius:6px;">`;
  html += `<div style="font-size:9px;color:var(--text3)">收容 IPI</div>`;
  html += `<div style="font-size:24px;font-weight:700;color:${ic(sIPI)}">${sIPI}</div>`;
  html += `<div style="font-size:9px;color:var(--text3)">高${si.h} 中${si.m} 低${si.l}</div></div>`;
  html += `<div style="flex:1;text-align:center;padding:8px;background:#fff;border-radius:6px;">`;
  html += `<div style="font-size:9px;color:var(--text3)">醫療 IPI</div>`;
  html += `<div style="font-size:24px;font-weight:700;color:${ic(mIPI)}">${mIPI}</div>`;
  html += `<div style="font-size:9px;color:var(--text3)">高${mi.h} 中${mi.m} 低${mi.l}</div></div>`;
  html += '</div>';
  html += `<div style="font-size:10px;color:var(--text2);margin-top:6px;">未結事件：${si.open+mi.open}　結案速率：${si.res+mi.res} 件/30min</div>`;
  html += '</div>';

  // 物資
  html += '<div class="slice-card"><div class="slice-card-title">物資狀況</div>';
  html += supBar('IV 輸液', iv) + supBar('氧氣瓶', ox) + supBar('止血帶', to);
  html += '</div>';

  // 趨勢分析
  if (analysis) html += analysis;

  el('modal-title').textContent = '切面快照 · ' + t;
  el('modal-body').innerHTML = html;
  el('overlay').className = 'show';
}

function buildSliceAnalysis(idx, d) {
  if (idx < 2) return '';
  const items = [];
  const prev = Math.max(0, idx-3);

  const sDiff = d.sPct[idx]-d.sPct[prev], mDiff = d.mPct[idx]-d.mPct[prev];
  if (mDiff > 0) items.push('醫療床位 15 分鐘 <b style="color:var(--red)">+'+mDiff+'%</b>');
  if (sDiff > 0) items.push('收容床位 15 分鐘 <b style="color:var(--yellow)">+'+sDiff+'%</b>');

  const srtD = d.srtR[idx]-d.srtR[prev], crD = d.medCR[idx]-d.medCR[prev];
  if (srtD > 0 && crD === 0) items.push('<b style="color:var(--red)">SRT Red+ 上升'+srtD+'，醫療紅傷尚未跟進</b>——預計 15 分鐘內出現');
  if (srtD > 0 && crD > 0) items.push('SRT 橋接已觸發：收容 Red+ ↑'+srtD+'，醫療紅傷 ↑'+crD);

  const ivD = d.ivPct[idx]-d.ivPct[prev];
  if (ivD < 0) {
    const rateP = Math.abs(ivD)/3;
    const minsL = rateP > 0 ? Math.round(d.ivPct[idx]/rateP*5) : null;
    if (minsL !== null) items.push('IV 消耗中，按此速率還剩 <b style="color:var(--red)">'+minsL+' 分鐘</b>');
  }

  const incD = (d.incHigh[idx]+d.incMed[idx]) - (d.incHigh[prev]+d.incMed[prev]);
  if (incD > 2) items.push('事件密度快速上升（+'+incD+' 件/15min）');

  if (items.length === 0) return '';
  return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-top:10px;">'
    +'<div style="font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">趨勢分析</div>'
    +'<ul style="padding-left:14px;">'
    +items.map(i=>'<li style="font-size:11px;color:var(--text2);margin-bottom:5px;line-height:1.5;">'+i+'</li>').join('')
    +'</ul></div>';
}

function closeModal() { el('overlay').className = ''; }

// ══════════════════════════════════════════════════════════════
// 放大/縮小
// ══════════════════════════════════════════════════════════════

let _expandedCard = null;

function toggleExpand(cardId) {
  const card = el(cardId);
  if (_expandedCard === cardId) {
    // 縮小
    card.classList.remove('expanded');
    _expandedCard = null;
  } else {
    // 先縮回上一張
    if (_expandedCard) el(_expandedCard).classList.remove('expanded');
    card.classList.add('expanded');
    _expandedCard = cardId;
  }
  // 重繪（尺寸變了）
  setTimeout(() => { const d = getSeries(); if (d) renderCharts(d); }, 50);
}

// ESC 縮小
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _expandedCard) toggleExpand(_expandedCard);
});

function el(id) { return document.getElementById(id); }

el('overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
setInterval(() => { el('clock').textContent = new Date().toTimeString().slice(0,8); }, 1000);
el('clock').textContent = new Date().toTimeString().slice(0,8);

// 開始 polling（無 mock，純 API）
setTimeout(() => poll(), 300);
setInterval(poll, POLL_INTERVAL);
window.addEventListener('resize', () => { const d = getSeries(); if (d) renderCharts(d); });
</script>
