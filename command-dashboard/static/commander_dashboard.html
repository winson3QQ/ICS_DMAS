// ══════════════════════════════════════════════════════════════
// 算法工具
// ══════════════════════════════════════════════════════════════
function slope(arr) {
  const n = arr.length;
  if (n < 4) return 0;
  return ((arr[n-1]+arr[n-2]+arr[n-3])/3) - ((arr[0]+arr[1]+arr[2])/3);
}
function rate(arr) {
  const n = arr.length;
  if (n < 2) return 0;
  return (arr[n-1]-arr[0])/(n-1);
}
function minsUntil(current, threshold, ratePerSnap, snapMins) {
  if (ratePerSnap <= 0) return null;
  const remaining = threshold - current;
  if (remaining <= 0) return 0;
  return Math.round((remaining / ratePerSnap) * snapMins);
}
function ipiCalc(h, m) { return h * 3 + m; }

// ══════════════════════════════════════════════════════════════
// Sparkline / 完整圖表繪圖
// expanded=true 時加入 Y 軸標籤、X 軸時間、資料點、末端值
// ══════════════════════════════════════════════════════════════
function drawSparkline(canvasId, datasets, opts, N, expanded, times) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const par = canvas.parentElement;
  const W = par.clientWidth, H = par.clientHeight;
  if (!W || !H) return;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);

  // 展開時留空間給軸標籤（放大字體用較多 padding）
  const fs = expanded ? {axis:11, threshold:10, value:13, dot:3.5} : {axis:7, threshold:7, value:9, dot:2};
  const pad = expanded ? {t:8, r:44, b:24, l:40} : {t:2, r:4, b:2, l:4};
  const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;
  const yMin = opts.yMin||0, yMax = opts.yMax||100, yR = yMax-yMin||1;
  function px(i){ return pad.l + (i/Math.max(N-1,1)) * cW; }
  function py(v){ return pad.t + cH - ((v-yMin)/yR)*cH; }

  // 展開時：Y 軸 grid + 標籤
  if (expanded) {
    const steps = opts.gridSteps || _autoGridSteps(yMin, yMax);
    ctx.strokeStyle='rgba(110,118,129,.2)'; ctx.lineWidth=0.5;
    ctx.fillStyle='#8b949e'; ctx.font=fs.axis+'px IBM Plex Mono,monospace'; ctx.textAlign='right';
    steps.forEach(v => {
      if (v < yMin || v > yMax) return;
      const y = py(v);
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cW,y); ctx.stroke();
      ctx.fillText(v, pad.l-4, y+4);
    });
  }

  // 門檻線
  (opts.thresholds||[]).forEach(th => {
    ctx.strokeStyle=th.color; ctx.lineWidth=expanded?1:0.5; ctx.setLineDash([4,3]);
    const y = py(th.value);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cW,y); ctx.stroke();
    ctx.setLineDash([]);
    if (expanded) {
      ctx.fillStyle=th.color; ctx.font=fs.threshold+'px IBM Plex Mono,monospace'; ctx.textAlign='left';
      ctx.fillText(th.label||th.value, pad.l+cW+3, y+4);
    }
  });

  // 堆疊面積
  if (opts.stackedArea) {
    const cumul = Array(N).fill(0);
    opts.stackedArea.forEach(layer => {
      const top = layer.data.map((v,i) => cumul[i] + (v||0));
      ctx.beginPath();
      for (let i=0; i<N; i++) { i===0 ? ctx.moveTo(px(i), py(top[i])) : ctx.lineTo(px(i), py(top[i])); }
      for (let i=N-1; i>=0; i--) { ctx.lineTo(px(i), py(cumul[i])); }
      ctx.closePath();
      ctx.fillStyle = layer.fillColor; ctx.fill();
      top.forEach((v,i) => cumul[i] = v);
    });
  }

  // 線條
  datasets.forEach(ds => {
    if (ds.fill) {
      ctx.beginPath();
      ds.data.forEach((v,i) => { i===0 ? ctx.moveTo(px(i),py(v)) : ctx.lineTo(px(i),py(v)); });
      ctx.lineTo(px(N-1),py(yMin)); ctx.lineTo(px(0),py(yMin)); ctx.closePath();
      ctx.fillStyle = ds.fillColor||'rgba(100,150,255,.1)'; ctx.fill();
    }
    ctx.strokeStyle=ds.color; ctx.lineWidth=expanded?(ds.w||1.5)*1.5:(ds.w||1.5); ctx.lineJoin='round';
    ctx.setLineDash(ds.dash||[]);
    ctx.beginPath();
    ds.data.forEach((v,i) => { i===0 ? ctx.moveTo(px(i),py(v)) : ctx.lineTo(px(i),py(v)); });
    ctx.stroke(); ctx.setLineDash([]);

    // 展開時：資料點 + 末端數值
    if (expanded) {
      ds.data.forEach((v,i) => {
        ctx.fillStyle=ds.color; ctx.beginPath(); ctx.arc(px(i),py(v),fs.dot,0,Math.PI*2); ctx.fill();
      });
      const lv = ds.data[N-1];
      if (lv != null) {
        ctx.fillStyle=ds.color; ctx.font='bold '+fs.value+'px IBM Plex Mono,monospace'; ctx.textAlign='left';
        ctx.fillText(lv+(ds.unit||''), px(N-1)+6, py(lv)+4);
      }
    }
  });

  // 展開時：X 軸時間標籤
  if (expanded && times && times.length >= N) {
    ctx.fillStyle='#8b949e'; ctx.font=fs.axis+'px IBM Plex Mono,monospace'; ctx.textAlign='center';
    const step = N <= 15 ? 1 : N <= 30 ? 2 : 3;
    for (let i=0; i<N; i++) {
      if (i % step === 0 || i === N-1) ctx.fillText(times[i], px(i), H-3);
    }
  }
}

function _autoGridSteps(yMin, yMax) {
  const range = yMax - yMin;
  const step = range <= 10 ? 2 : range <= 50 ? 10 : 25;
  const steps = [];
  for (let v = yMin; v <= yMax; v += step) steps.push(v);
  return steps;
}

// ══════════════════════════════════════════════════════════════
// 主要渲染
// ══════════════════════════════════════════════════════════════
function refresh() {
  const d = getSeries();
  if (!d) {
    _renderZoneANoSnap();
  } else {
    renderZoneA(d);
    renderSparklines(d);
  }
  _renderConnDots();
  renderZoneC(d);
  renderMapOverlay();
}

function _renderZoneANoSnap() {
  const allEvts = _data?.events || [];
  const openEvts = allEvts.filter(e => e.status === 'open' || e.status === 'in_progress');
  const hasCrit = openEvts.some(e => e.severity === 'critical');
  const hasWarn = openEvts.some(e => e.severity === 'warning');
  const overall = hasCrit ? 'crit' : hasWarn ? 'warn' : 'ok';
  const lamp = el('status-lamp');
  lamp.className = overall;
  lamp.textContent = overall === 'crit' ? '警報' : overall === 'warn' ? '注意' : '正常';
  const critEvts = openEvts.filter(e => e.severity === 'critical').length;
  const warnEvts = openEvts.filter(e => e.severity === 'warning').length;
  lamp.title = '未結事件 ' + openEvts.length + ' 件\n緊急 ' + critEvts + ' / 警告 ' + warnEvts;
  el('counts-shelter').textContent = openEvts.length > 0 ? '未結事件 ' + openEvts.length + ' 件' : '等待資料中⋯';
  el('counts-medical').textContent = '';
  const evtCount = allEvts.length;
  if (evtCount > 0) {
    el('dci-val').textContent = Math.min(evtCount * 5, 50);
    el('dci-val').style.color = 'var(--yellow)';
  } else {
    el('dci-val').textContent = '—';
    el('dci-val').style.color = 'var(--text3)';
  }
  el('dci').title = '資料信心指數 (DCI)\n尚未收到快照\n事件記錄：' + allEvts.length + ' 筆';
}

function _renderConnDots() {
  const ch = _data?.calc?.comm_health || {};
  const map = {shelter:'cl-shelter', medical:'cl-medical'};
  const labels = {shelter:'收容', medical:'醫療'};
  ['shelter','medical'].forEach(k => {
    const dot = el('cd-' + k);
    const lbl = el(map[k]);
    const level = ch[k]?.health_level || 'lkp';
    if (dot) dot.className = 'conn-dot ' + level;
    if (lbl) lbl.textContent = level === 'lkp' ? labels[k] + ' 未連線' : labels[k];
  });
}

function renderZoneA(d) {
  const N = d.N;
  // 量能
  const sp = d.sPct[N-1], mp = d.mPct[N-1];
  const capMax = Math.max(sp, mp);
  const capLvl = capMax >= 90 ? 'crit' : capMax >= 70 ? 'warn' : 'ok';

  // 事件
  const totalIPI = ipiCalc(d.incHigh[N-1], d.incMed[N-1]);
  const incLvl = totalIPI >= 6 ? 'crit' : totalIPI >= 3 ? 'warn' : 'ok';

  // 資源
  const ivLast = d.ivPct[N-1], oxLast = d.oxPct[N-1], toL = d.toPct[N-1];
  const minSupply = Math.min(ivLast, oxLast, toL);
  const resLvl = minSupply <= 20 ? 'crit' : minSupply <= 40 ? 'warn' : 'ok';

  // 綜合態勢燈（取最嚴重的）
  const levels = [capLvl, incLvl, resLvl];
  const overall = levels.includes('crit') ? 'crit' : levels.includes('warn') ? 'warn' : 'ok';
  const lamp = el('status-lamp');
  lamp.className = overall;
  lamp.textContent = overall === 'crit' ? '警報' : overall === 'warn' ? '注意' : '正常';
  // tooltip 顯示原因
  const reasons = [];
  const lvlLabel = {ok:'正常', warn:'注意', crit:'警報'};
  reasons.push('量能：' + lvlLabel[capLvl] + '（收容' + sp + '% 醫療' + mp + '%）');
  reasons.push('事件：' + lvlLabel[incLvl] + '（IPI ' + totalIPI + '）');
  reasons.push('資源：' + lvlLabel[resLvl] + '（最低' + Math.round(minSupply) + '%）');
  lamp.title = reasons.join('\n');

  // 計數
  const sBu = d.sBu[N-1], mBu = d.mBu[N-1];
  el('counts-shelter').textContent = '收容 ' + sBu + ' 人';
  el('counts-medical').textContent = '醫療 ' + mBu + ' 人';


  // DCI（暫用簡易版，Wave 2 用 calc_engine）
  const calc = _data?.calc || {};
  const dci = calc.data_confidence?.overall;
  if (dci != null) {
    el('dci-val').textContent = Math.round(dci);
    el('dci-val').style.color = dci >= 80 ? 'var(--green)' : dci >= 50 ? 'var(--yellow)' : 'var(--red)';
  }
  // DCI tooltip
  const freshLabels = {ok:'即時', warn:'稍舊', crit:'過時', lkp:'未連線'};
  const chh = calc.comm_health || {};
  const dciParts = ['資料信心指數 (DCI)'];
  ['shelter','medical','forward','security'].forEach(k => {
    const name = {shelter:'收容',medical:'醫療',forward:'前進',security:'安全'}[k];
    const fl = chh[k]?.health_level || 'lkp';
    dciParts.push(name + '：' + freshLabels[fl]);
  });
  dciParts.push('事件記錄：' + (_data?.events?.length || 0) + ' 筆');
  el('dci').title = dciParts.join('\n');

}

function renderSparklines(d) {
  const N = d.N;
  const isExp = id => _expandedSpark === id;
  const t = d.times; // X 軸時間陣列

  // ① 量能
  const sp = d.sPct[N-1], mp = d.mPct[N-1];
  const capMax = Math.max(sp, mp);
  const capLvl = capMax >= 90 ? 'crit' : capMax >= 70 ? 'warn' : 'ok';
  el('sp-cap-v').textContent = '收' + sp + '% 醫' + mp + '%';
  setRag('sp-cap', capLvl);
  drawSparkline('sc1', [
    {data:d.sPct, color:'#E67E22', w:1.5, fill:true, fillColor:'rgba(230,126,34,.15)', unit:'%'},
    {data:d.mPct, color:'#C0392B', w:1.5, fill:true, fillColor:'rgba(192,57,43,.12)', unit:'%'},
  ], {yMin:0, yMax:100, thresholds:[{value:70,color:'rgba(212,144,0,.4)',label:'70%'},{value:90,color:'rgba(204,42,42,.4)',label:'90%'}]}, N, isExp('sp-cap'), t);

  // ② 流向
  const sa=d.srcA[N-1], sb=d.srcB[N-1], sc=d.srcC[N-1];
  const srcRate = rate(d.srcB);
  const flowLvl = srcRate > 0.5 ? 'crit' : srcRate > 0.3 ? 'warn' : 'ok';
  const maxSrc = Math.max(sa,sb,sc);
  const srcName = maxSrc===sa ? 'A前進' : maxSrc===sb ? 'B收容' : 'C自行';
  el('sp-flow-v').textContent = srcName + ' SRT:' + d.srtR[N-1];
  setRag('sp-flow', flowLvl);
  const srcMax = Math.max(...d.srcA.map((a,i)=>a+(d.srcB[i]||0)+(d.srcC[i]||0)), ...d.srtR, 5);
  drawSparkline('sc2', [
    {data:d.srtR, color:'#E74C3C', w:1.5, unit:''},
    {data:d.medCR, color:'#FF8F00', w:1.5, unit:''},
  ], {yMin:0, yMax:srcMax+2}, N, isExp('sp-flow'), t);

  // ③ 事件
  const totalIPI = ipiCalc(d.incHigh[N-1], d.incMed[N-1]);
  const incLvl = totalIPI >= 6 ? 'crit' : totalIPI >= 3 ? 'warn' : 'ok';
  el('sp-inc-v').textContent = '未結' + d.incOpen[N-1] + ' IPI:' + totalIPI;
  setRag('sp-inc', incLvl);
  const incMax = Math.max(...d.incOpen, ...d.incHigh.map((h,i)=>h+(d.incMed[i]||0)+(d.incLow[i]||0)), 3);
  drawSparkline('sc3', [
    {data:d.incOpen, color:'#e6edf3', w:1.5, unit:''},
  ], {yMin:0, yMax:incMax+1,
    stackedArea:[
      {data:d.incLow,  fillColor:'rgba(26,158,82,.2)'},
      {data:d.incMed,  fillColor:'rgba(212,144,0,.25)'},
      {data:d.incHigh, fillColor:'rgba(204,42,42,.3)'},
    ]
  }, N, isExp('sp-inc'), t);

  // ④ 資源
  const ivLast = d.ivPct[N-1], oxLast = d.oxPct[N-1], toL = d.toPct[N-1];
  const minSupply = Math.min(ivLast, oxLast, toL);
  const resLvl = minSupply <= 20 ? 'crit' : minSupply <= 40 ? 'warn' : 'ok';
  el('sp-res-v').textContent = 'IV:' + ivLast + '% O₂:' + oxLast + '%';
  setRag('sp-res', resLvl);
  drawSparkline('sc4', [
    {data:d.ivPct,  color:'#D32F2F', w:1.5, dash:[3,2], unit:'%'},
    {data:d.oxPct,  color:'#F57F17', w:1.5, dash:[3,2], unit:'%'},
    {data:d.toPct,  color:'#388E3C', w:1.5, dash:[3,2], unit:'%'},
  ], {yMin:0, yMax:100, thresholds:[{value:20,color:'rgba(204,42,42,.4)',label:'20%'}]}, N, isExp('sp-res'), t);

  // ⑤ 人力
  const sR = d.opsS[N-1], mR = d.opsM[N-1];
  const staffLvl = Math.max(sR, mR) > 8 ? 'crit' : Math.max(sR, mR) > 5 ? 'warn' : 'ok';
  el('sp-staff-v').textContent = '收' + sR.toFixed(1) + ' 醫' + mR.toFixed(1);
  setRag('sp-staff', staffLvl);
  drawSparkline('sc5', [
    {data:d.opsS, color:'#1976D2', w:1.5, unit:''},
    {data:d.opsM, color:'#7B1FA2', w:1.5, unit:''},
  ], {yMin:0, yMax:Math.max(...d.opsS, ...d.opsM, 8)+2, thresholds:[{value:8,color:'rgba(204,42,42,.4)',label:'8'}]}, N, isExp('sp-staff'), t);
}

function setRag(cardId, lvl) {
  const card = el(cardId);
  card.classList.remove('bg-warn','bg-crit');
  if (lvl === 'crit') card.classList.add('bg-crit');
  else if (lvl === 'warn') card.classList.add('bg-warn');
  const rag = el(cardId + '-rag');
  if (rag) { rag.className = 'spark-rag ' + lvl; }
}

function switchLeftPanel(group) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.panel-tab[data-group="' + group + '"]').classList.add('active');
  el('sg-situation').style.display = group === 'situation' ? 'flex' : 'none';
  el('sg-resource').style.display = group === 'resource' ? 'flex' : 'none';
  // 重繪 sparkline（尺寸改變）
  setTimeout(() => { const d = getSeries(); if (d) renderSparklines(d); }, 50);
}

function switchDecTab(tab) {
  _decTab = tab;
  document.querySelectorAll('.dec-tab').forEach(t => t.classList.remove('active'));
  el('dec-tab-' + tab).classList.add('active');
  const d = getSeries();
  if (d) renderZoneC(d);
}

function renderZoneC(d) {
  const N = d ? d.N : 0;
  const calc = _data?.calc || {};

  // 物資倒數（從 calc_engine burn_rates 或前端估算）
  const br = calc.burn_rates || {};
  const ivTTZ = br.iv?.time_to_zero_min;
  const oxTTZ = br.oxygen?.time_to_zero_min;
  const toTTZ = br.tourniquet?.time_to_zero_min;
  const minTTZ = [ivTTZ, oxTTZ, toTTZ].filter(v => v != null && v >= 0);
  const supplyMin = minTTZ.length > 0 ? Math.min(...minTTZ) : null;

  setPill('zc-supply', 'zc-supply-t', supplyMin, 120, 240);

  // 容量倒數 — 優先用 server countdown，fallback 前端估算
  const medCountdown = calc.medical?.countdown_to_red;
  let capMins = medCountdown?.minutes_to_threshold;
  if (capMins == null && d) {
    const capR = rate(d.mPct);
    capMins = capR > 0 ? minsUntil(d.mPct[N-1], 90, capR, 5) : null;
  }
  setPill('zc-cap', 'zc-cap-t', capMins, 60, 120);

  // 人力倒數
  const staffR = d ? rate(d.opsM) : 0;
  const staffMins = (staffR > 0 && d) ? minsUntil(d.opsM[N-1], 8, staffR, 5) : null;
  setPill('zc-staff', 'zc-staff-t', staffMins, 30, 60);

  // 升降級（從 calc_engine 或 Wave 3 填入）
  const esc = calc.escalation;
  if (esc) {
    let html = '';
    (esc.triggers_met || []).forEach(t => {
      const cls = t.severity === 'critical' ? 'crit' : 'warn';
      html += `<div class="zc-esc-item"><span class="tag ${cls}">${t.rule_id}</span>${t.description}</div>`;
    });
    (esc.deescalation || []).forEach(t => {
      html += `<div class="zc-esc-item"><span class="tag ok">${t.rule_id}</span>${t.description}</div>`;
    });
    if (!html) html = '<div style="color:var(--green);font-size:11px;">無觸發條件</div>';
    el('zc-esc-list').innerHTML = html;
  }

  // 待裁示 / 已裁示卡片（依 _decTab 切換）
  const pendingDecs = _data?.decisions?.pending || [];
  const decidedDecs = _data?.decisions?.decided || [];
  el('dec-count').textContent = pendingDecs.length;

  if (_decTab === 'pending') {
    if (pendingDecs.length === 0) {
      el('right-dec-list').innerHTML = '<div style="color:var(--green);font-size:11px;">無待裁示事項</div>';
    } else {
      let dhtml = '';
      pendingDecs.forEach(dec => {
        const age = _decisionAge(dec.created_at);
        const cls = dec.severity === 'critical' ? 'crit' : 'warn';
        dhtml += `<div class="zc-esc-item" style="cursor:pointer;padding:2px 0;" onclick="showDecisionModal('${dec.id}')">`;
        dhtml += `<span class="tag ${cls}">${dec.severity === 'critical' ? '急' : '注意'}</span>`;
        dhtml += `<span style="font-size:10px;">${_truncate(dec.decision_title, 20)}</span>`;
        dhtml += `<span style="font-size:9px;color:var(--text3);margin-left:auto;"> ${age}</span>`;
        dhtml += `</div>`;
      });
      el('right-dec-list').innerHTML = dhtml;
    }
  } else {
    // 已裁示頁籤
    if (decidedDecs.length === 0) {
      el('right-dec-list').innerHTML = '<div style="color:var(--text3);font-size:11px;">無已裁示紀錄</div>';
    } else {
      let dhtml = '';
      decidedDecs.forEach(dec => {
        const age = _decisionAge(dec.decided_at || dec.created_at);
        dhtml += `<div class="zc-esc-item" style="cursor:pointer;padding:2px 0;" onclick="showDecisionModal('${dec.id}')">`;
        dhtml += `<span class="tag ok">${dec.status || '已決'}</span>`;
        dhtml += `<span style="font-size:10px;">${_truncate(dec.decision_title, 20)}</span>`;
        dhtml += `<span style="font-size:9px;color:var(--text3);margin-left:auto;"> ${age}</span>`;
        dhtml += `</div>`;
      });
      el('right-dec-list').innerHTML = dhtml;
    }
  }

  // 事件追蹤（開放 + 已結案灰色）
  const allEvents = _data?.events || [];
  const openEvents = allEvents.filter(e => e.status === 'open' || e.status === 'in_progress');
  const resolvedEvents = allEvents.filter(e => e.status === 'resolved' || e.status === 'closed');
  const now0 = Date.now();
  const overdueCount = openEvents.filter(e => {
    if (!e.response_deadline) return false;
    const ts = e.response_deadline.endsWith('Z') ? e.response_deadline : e.response_deadline+'Z';
    return new Date(ts).getTime() < now0;
  }).length;
  const pendingCount = openEvents.filter(e => e.status === 'open').length;
  const progCount = openEvents.filter(e => e.status === 'in_progress').length;
  // evt-count 已移除，統計改由 evt-stats 顯示
  // 總數（不含已結案）
  el('evt-open-total').textContent = openEvents.length > 0 ? openEvents.length : '';
  // 逾時（左側，事件追蹤旁）
  el('evt-overdue').innerHTML = overdueCount > 0 ? `<span style="color:var(--red);font-weight:700;cursor:pointer;animation:pulse 1s infinite;" onclick="_toggleEvtFilter('overdue')">逾${overdueCount}</span>` : '';
  // 統計列（右側）— 可點擊篩選
  const _af = _evtFilter; // active filter
  let statsHtml = '';
  if (pendingCount > 0) statsHtml += `<span style="color:#e67e22;font-weight:700;cursor:pointer;${_af==='pending'?'text-decoration:underline;':''}" onclick="_toggleEvtFilter('pending')">待處理${pendingCount}</span> `;
  if (progCount > 0) statsHtml += `<span style="color:var(--yellow);cursor:pointer;${_af==='progress'?'text-decoration:underline;':''}" onclick="_toggleEvtFilter('progress')">處理${progCount}</span> `;
  if (resolvedEvents.length > 0) statsHtml += `<span style="opacity:.5;cursor:pointer;" onclick="_toggleEvtFilter('resolved')">結案${resolvedEvents.length}</span>`;
  el('evt-stats').innerHTML = statsHtml;

  // 篩選/分組提示列
  const filterBar = el('evt-filter-bar');
  const filterLabels = {overdue:'逾時', pending:'待處理', progress:'處理中', resolved:'已結案'};
  let barParts = [];
  if (_evtFilter) barParts.push('篩選：' + filterLabels[_evtFilter]);
  if (_evtGroupByUnit) barParts.push('按組別分類');
  if (barParts.length > 0) {
    filterBar.innerHTML = `<span>${barParts.join(' · ')}</span><span style="cursor:pointer;margin-left:auto;color:var(--text3);" onclick="_evtFilter=null;_evtGroupByUnit=false;renderZoneC(getSeries());">✕ 清除</span>`;
    filterBar.style.display = 'flex';
    filterBar.style.justifyContent = 'space-between';
    filterBar.style.alignItems = 'center';
  } else {
    filterBar.style.display = 'none';
  }

  const unitColors = {forward:'#e68c1e',security:'#3366e6',shelter:'#d4b200',medical:'#e03030',command:'#22b05a'};
  const unitNames = {forward:'前進組',security:'安全組',shelter:'收容組',medical:'醫療組',command:'指揮部'};

  // 篩選
  let filteredOpen = openEvents;
  let filteredResolved = resolvedEvents;
  if (_evtFilter === 'overdue') {
    filteredOpen = openEvents.filter(e => {
      if (!e.response_deadline) return false;
      const ts = e.response_deadline.endsWith('Z') ? e.response_deadline : e.response_deadline+'Z';
      return new Date(ts).getTime() < now0;
    });
    filteredResolved = [];
  } else if (_evtFilter === 'pending') {
    filteredOpen = openEvents.filter(e => e.status === 'open');
    filteredResolved = [];
  } else if (_evtFilter === 'progress') {
    filteredOpen = openEvents.filter(e => e.status === 'in_progress');
    filteredResolved = [];
  } else if (_evtFilter === 'resolved') {
    filteredOpen = [];
  }

  let evtHtml = '';
  if (filteredOpen.length === 0 && filteredResolved.length === 0) {
    evtHtml = _evtFilter ? '<div style="color:var(--text3);font-size:11px;padding:8px;">無符合篩選的事件</div>'
                         : '<div style="color:var(--green);font-size:12px;padding:8px;">無事件</div>';
  } else {
    const now = Date.now();
    filteredOpen.sort((a, b) => {
      const aOd = a.response_deadline && new Date(a.response_deadline.endsWith('Z') ? a.response_deadline : a.response_deadline+'Z').getTime() < now;
      const bOd = b.response_deadline && new Date(b.response_deadline.endsWith('Z') ? b.response_deadline : b.response_deadline+'Z').getTime() < now;
      return (aOd === bOd) ? 0 : aOd ? -1 : 1;
    });

    // 事件卡片 HTML 產生函式
    const _evtCardHtml = (ev) => {
      const cd = ev.response_deadline ? _countdownStr(ev.response_deadline) : '';
      let tagColor = 'var(--yellow)';
      if (ev.response_deadline) {
        const ts = ev.response_deadline.endsWith('Z') ? ev.response_deadline : ev.response_deadline+'Z';
        const dl = new Date(ts).getTime();
        if (dl < now) { tagColor = 'var(--red)'; var _isOverdue = true; }
        else {
          var _isOverdue = false;
          const cr = new Date((ev.occurred_at||ev.created_at).endsWith('Z') ? (ev.occurred_at||ev.created_at) : (ev.occurred_at||ev.created_at)+'Z').getTime();
          if ((dl - now) < (dl - cr) * 0.5) tagColor = '#e67e22';
        }
      }
      const uColor = unitColors[ev.reported_by_unit] || 'var(--text3)';
      const uName = unitNames[ev.reported_by_unit] || '';
      const overdueAnim = _isOverdue ? 'animation:pulse 1s infinite;' : '';
      let h = '';
      h += `<div style="cursor:pointer;padding:6px 8px;margin-bottom:3px;background:var(--surface2);border-radius:5px;border-left:3px solid ${uColor};" onclick="_openEventByCode('${ev.id}')" onmousedown="_evtCardDown('${ev.id}')" onmouseup="_evtCardUp()" onmouseleave="_evtCardUp()" ontouchstart="_evtCardDown('${ev.id}')" ontouchend="_evtCardUp()">`;
      h += `<div style="display:flex;justify-content:space-between;align-items:center;">`;
      h += `<span style="font-size:11px;font-weight:700;">${ev.description||ev.event_type}</span>`;
      h += `<span style="font-size:10px;font-weight:700;color:${tagColor};${overdueAnim}">${cd}</span>`;
      h += `</div>`;
      h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px;">`;
      h += `<span style="font-size:9px;color:var(--text3);font-weight:600;">${uName}</span>`;
      h += `<span style="font-size:9px;color:var(--text3);">${(ev.event_code||'').replace(/-\d{4}-/, '-')}</span>`;
      h += `</div>`;
      h += `</div>`;
      return h;
    };

    // 組別分類 or 時間序
    if (_evtGroupByUnit) {
      const groups = {};
      const unitOrder = ['forward','security','shelter','medical','command'];
      filteredOpen.forEach(ev => {
        const u = ev.reported_by_unit || 'command';
        if (!groups[u]) groups[u] = [];
        groups[u].push(ev);
      });
      unitOrder.forEach(u => {
        if (!groups[u] || groups[u].length === 0) return;
        const uColor = unitColors[u] || 'var(--text3)';
        const uName = unitNames[u] || u;
        evtHtml += `<div style="font-size:9px;color:${uColor};padding:6px 0 2px;font-weight:700;border-bottom:1px solid ${uColor}33;">── ${uName} ──</div>`;
        groups[u].forEach(ev => { evtHtml += _evtCardHtml(ev); });
      });
    } else {
      filteredOpen.forEach(ev => { evtHtml += _evtCardHtml(ev); });
    }
    // 已結案
    if (filteredResolved.length > 0) {
      const _resolvedCard = (ev) => {
        const uColor = unitColors[ev.reported_by_unit] || 'var(--text3)';
        const uName = unitNames[ev.reported_by_unit] || '';
        let h = '';
        h += `<div style="cursor:pointer;padding:5px 8px;margin-bottom:2px;background:var(--surface2);border-radius:5px;border-left:3px solid ${uColor}55;opacity:.55;" onclick="_openEventByCode('${ev.id}')">`;
        h += `<div style="display:flex;justify-content:space-between;align-items:center;">`;
        h += `<span style="font-size:10px;font-weight:600;">${ev.description||ev.event_type}</span>`;
        h += `<span style="font-size:9px;color:var(--text3);">已結案</span>`;
        h += `</div>`;
        h += `<div style="display:flex;justify-content:space-between;margin-top:1px;">`;
        h += `<span style="font-size:9px;color:var(--text3);">${uName}</span>`;
        h += `<span style="font-size:8px;color:var(--text3);">${(ev.event_code||'').replace(/-\d{4}-/, '-')}</span>`;
        h += `</div>`;
        h += `</div>`;
        return h;
      };

      if (_evtGroupByUnit) {
        evtHtml += `<div style="font-size:9px;color:var(--text3);padding:5px 0 2px;font-weight:600;">已結案</div>`;
        const rGroups = {};
        const unitOrder = ['forward','security','shelter','medical','command'];
        filteredResolved.forEach(ev => {
          const u = ev.reported_by_unit || 'command';
          if (!rGroups[u]) rGroups[u] = [];
          rGroups[u].push(ev);
        });
        unitOrder.forEach(u => {
          if (!rGroups[u] || rGroups[u].length === 0) return;
          const uColor = unitColors[u] || 'var(--text3)';
          const uName = unitNames[u] || u;
          evtHtml += `<div style="font-size:9px;color:${uColor};padding:4px 0 2px;font-weight:700;border-bottom:1px solid ${uColor}33;opacity:.6;">── ${uName} ──</div>`;
          rGroups[u].forEach(ev => { evtHtml += _resolvedCard(ev); });
        });
      } else {
        evtHtml += `<div style="font-size:9px;color:var(--text3);padding:5px 0 2px;font-weight:600;">已結案</div>`;
        filteredResolved.forEach(ev => { evtHtml += _resolvedCard(ev); });
      }
    }
  }
  el('right-evt-list').innerHTML = evtHtml;
  _resizeEvtList();
}

function _resizeEvtList() {
  const container = el('right-events');
  const list = el('right-evt-list');
  if (!container || !list) return;
  // 計算 list 上方所有兄弟的高度（標題列 + 篩選提示列）
  let usedH = 0;
  for (const child of container.children) {
    if (child === list) break;
    usedH += child.offsetHeight;
  }
  const availH = container.clientHeight - usedH;
  list.style.maxHeight = Math.max(availH, 50) + 'px';
}

let _expandedSection = sessionStorage.getItem('_expandedSection') || null;
function toggleRightExpand(section = 'events') {
  if (_expandedSection === section) {
    _applyRightExpand(null);
  } else {
    _applyRightExpand(section);
  }
}
function _applyRightExpand(section) {
  _expandedSection = section;
  sessionStorage.setItem('_expandedSection', section || '');
  const panel = el('panel-right');
  const left = el('panel-left');
  const divider = el('right-events').nextElementSibling;

  if (!section) {
    // 收合
    panel.classList.remove('expanded');
    left.classList.remove('collapsed');
    el('right-events').style.display = '';
    el('right-events').style.flex = '6';
    el('right-decisions').style.display = '';
    el('right-decisions').style.flex = '4';
    divider.style.display = '';
    el('evt-expand-arrow').textContent = '▶';
  } else {
    // 展開
    panel.classList.add('expanded');
    left.classList.add('collapsed');
    divider.style.display = 'none';
    if (section === 'events') {
      el('right-events').style.display = '';
      el('right-events').style.flex = '1';
      el('right-decisions').style.display = 'none';
      el('evt-expand-arrow').textContent = '◀';
    } else {
      el('right-decisions').style.display = '';
      el('right-decisions').style.flex = '1';
      el('right-events').style.display = 'none';
    }
  }
  // 展開/收合後重算 list 高度
  requestAnimationFrame(_resizeEvtList);
}

// 長按事件卡片 → 地圖 highlight
let _evtCardTimer = null;
let _evtCardDidHighlight = false;
function _evtCardDown(eventId) {
  _evtCardDidHighlight = false;
  _evtCardTimer = setTimeout(() => {
    _evtCardTimer = null;
    _evtCardDidHighlight = true;
    _highlightEvent(eventId);
  }, 600);
}
function _evtCardUp() {
  if (_evtCardTimer) { clearTimeout(_evtCardTimer); _evtCardTimer = null; }
  if (_evtCardDidHighlight) {
    _unhighlightEvent();
    // 延遲重設，防止 mouseup 後的 click 觸發 modal
    setTimeout(() => { _evtCardDidHighlight = false; }, 100);
  }
}

function _openEventByCode(eventId) {
  // 長按觸發了 highlight，不要開 modal
  if (_evtCardDidHighlight) return;
  const zone = _findZoneByEventId(eventId);
  if (zone) {
    showEventProcessModal(zone);
  } else {
    // 沒有地圖據點的事件，用簡易 modal
    const ev = (_data?.events || []).find(e => e.id === eventId);
    if (ev) showEventDetail(ev);
  }
}

function setPill(pillId, timeId, mins, warnThresh, okThresh) {
  const pill = el(pillId);
  const timeEl = el(timeId);
  if (mins == null) {
    timeEl.textContent = 'OK';
    timeEl.className = 'zc-time ok';
    pill.className = 'zc-pill';
    return;
  }
  const lvl = mins < warnThresh ? 'crit' : mins < okThresh ? 'warn' : 'ok';
  const text = mins < 60 ? mins + 'm' : Math.floor(mins/60) + 'h+';
  timeEl.textContent = text;
  timeEl.className = 'zc-time ' + lvl;
  pill.className = 'zc-pill ' + (lvl === 'ok' ? '' : lvl);
}

// ══════════════════════════════════════════════════════════════
// 切面 Modal
// ══════════════════════════════════════════════════════════════
function showSlice(idx, d, focusType) {
  const N = d.N, t = d.times[idx];
  const sp = d.sPct[idx], mp = d.mPct[idx];
  const slc = v => v>=90?'var(--red)':v>=70?'var(--yellow)':'var(--green)';

  const sa=d.srcA[idx], sb=d.srcB[idx], sc=d.srcC[idx];
  const si = d.rawIncS[idx]||{h:0,m:0,l:0,open:0,res:0};
  const mi = d.rawIncM[idx]||{h:0,m:0,l:0,open:0,res:0};
  const iv = d.ivPct[idx], ox = d.oxPct[idx], to = d.toPct[idx];

  const supBar = (label, pct) => {
    const c = pct<=20?'var(--red)':pct<=40?'var(--yellow)':'var(--green)';
    return `<div class="slice-row"><span class="sk">${label}</span><span class="sv" style="color:${c}">${pct}%</span></div><div class="slice-bar"><div class="slice-fill" style="width:${pct}%;background:${c}"></div></div>`;
  };

  function segBar(segments, total) {
    if (!total) return '';
    let h = '<div style="display:flex;height:22px;border-radius:4px;overflow:hidden;background:var(--border);margin:6px 0 2px;">';
    segments.forEach(seg => {
      if (seg.count <= 0) return;
      const w = (seg.count / total * 100).toFixed(1);
      h += `<div style="width:${w}%;background:${seg.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;min-width:18px;">${seg.count}</div>`;
    });
    h += '</div><div style="display:flex;gap:8px;margin-top:2px;">';
    segments.forEach(seg => {
      h += `<div style="font-size:9px;color:var(--text3)"><span style="color:${seg.color}">■</span> ${seg.label}${seg.count}</div>`;
    });
    h += '</div>';
    return h;
  }

  let html = `<div class="slice-time">${t} 時間點完整切面</div>`;
  html += '<div class="slice-grid">';

  // 收容組
  html += '<div class="slice-card"><div class="slice-card-title">收容組</div>';
  html += `<div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px;">`;
  html += `<span style="font-size:28px;font-weight:800;">${d.sBu[idx]}</span>`;
  html += `<span style="font-size:12px;color:var(--text3)">/ ${d.sBt[idx]}人</span>`;
  html += `<span style="font-size:22px;font-weight:700;color:${slc(sp)};margin-left:auto">${sp}%</span></div>`;
  html += segBar([
    {count:d.srtR[idx],color:'#e74c3c',label:'R'},{count:d.srtY[idx],color:'#f1c40f',label:'Y'},{count:d.srtG[idx],color:'#2ecc71',label:'G'}
  ], d.sBt[idx]);
  html += `<div class="slice-row" style="margin-top:6px"><span class="sk">待入站</span><span class="sv">${d.pendS[idx]}人</span></div>`;
  html += `<div class="slice-row"><span class="sk">人均服務量</span><span class="sv">${d.opsS[idx].toFixed?d.opsS[idx].toFixed(1):d.opsS[idx]}</span></div>`;
  html += '</div>';

  // 醫療組
  html += '<div class="slice-card"><div class="slice-card-title">醫療組</div>';
  html += `<div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px;">`;
  html += `<span style="font-size:28px;font-weight:800;">${d.mBu[idx]}</span>`;
  html += `<span style="font-size:12px;color:var(--text3)">/ ${d.mBt[idx]}床</span>`;
  html += `<span style="font-size:22px;font-weight:700;color:${slc(mp)};margin-left:auto">${mp}%</span></div>`;
  html += segBar([
    {count:d.medCB[idx],color:'#2c3e50',label:'黑'},{count:d.medCR[idx],color:'#e74c3c',label:'紅'},
    {count:d.medCY[idx],color:'#f1c40f',label:'黃'},{count:d.medCG[idx],color:'#2ecc71',label:'綠'}
  ], d.mBt[idx]);
  html += `<div class="slice-row" style="margin-top:6px"><span class="sk">待後送</span><span class="sv">${d.pendEvac[idx]}人</span></div>`;
  html += `<div class="slice-row"><span class="sk">人均服務量</span><span class="sv">${d.opsM[idx].toFixed?d.opsM[idx].toFixed(1):d.opsM[idx]}</span></div>`;
  html += '</div>';
  html += '</div>';

  // 來源
  html += '<div class="slice-card"><div class="slice-card-title">醫療入站來源（累計至 '+t+'）</div>';
  html += '<div class="src-breakdown">';
  html += `<div class="src-chip" style="background:rgba(21,101,192,.12);border-color:#1565C0"><div class="sc-label" style="color:#1565C0">A 前進組</div><div class="sc-val" style="color:#1565C0">${sa}</div></div>`;
  html += `<div class="src-chip" style="background:rgba(230,81,0,.1);border-color:#E65100"><div class="sc-label" style="color:#E65100">B 收容轉送</div><div class="sc-val" style="color:#E65100">${sb}</div></div>`;
  html += `<div class="src-chip" style="background:rgba(46,125,50,.1);border-color:#2E7D32"><div class="sc-label" style="color:#2E7D32">C 自行抵達</div><div class="sc-val" style="color:#2E7D32">${sc}</div></div>`;
  html += '</div></div>';

  // 事件
  const sIPI = ipiCalc(si.h, si.m), mIPI = ipiCalc(mi.h, mi.m);
  const ic = v => v>=6?'var(--red)':v>=3?'var(--yellow)':'var(--green)';
  html += '<div class="slice-card"><div class="slice-card-title">事件壓力（最近 30 分）</div>';
  html += '<div style="display:flex;gap:8px;">';
  html += `<div style="flex:1;text-align:center;padding:8px;background:var(--surface2);border-radius:6px;">`;
  html += `<div style="font-size:9px;color:var(--text3)">收容 IPI</div>`;
  html += `<div style="font-size:22px;font-weight:700;color:${ic(sIPI)}">${sIPI}</div>`;
  html += `<div style="font-size:9px;color:var(--text3)">高${si.h} 中${si.m} 低${si.l}</div></div>`;
  html += `<div style="flex:1;text-align:center;padding:8px;background:var(--surface2);border-radius:6px;">`;
  html += `<div style="font-size:9px;color:var(--text3)">醫療 IPI</div>`;
  html += `<div style="font-size:22px;font-weight:700;color:${ic(mIPI)}">${mIPI}</div>`;
  html += `<div style="font-size:9px;color:var(--text3)">高${mi.h} 中${mi.m} 低${mi.l}</div></div>`;
  html += '</div>';
  html += `<div style="font-size:10px;color:var(--text2);margin-top:6px;">未結事件：${si.open+mi.open}　結案速率：${si.res+mi.res} 件/30min</div>`;
  html += '</div>';

  // 物資
  html += '<div class="slice-card"><div class="slice-card-title">物資狀況</div>';
  html += supBar('IV 輸液', iv) + supBar('氧氣瓶', ox) + supBar('止血帶', to);
  html += '</div>';

  el('modal-title').textContent = '切面快照 · ' + t;
  el('modal-body').innerHTML = html;
  el('overlay').className = 'show';
}

function closeModal() { el('overlay').className = ''; sessionStorage.removeItem('_openEventId'); }

// ══════════════════════════════════════════════════════════════
// Sparkline 放大/縮小
// ══════════════════════════════════════════════════════════════
let _expandedSpark = null;

function expandSpark(cardId) {
  const card = el(cardId);
  if (_expandedSpark === cardId) {
    card.classList.remove('expanded');
    _expandedSpark = null;
  } else {
    if (_expandedSpark) el(_expandedSpark).classList.remove('expanded');
    card.classList.add('expanded');
    _expandedSpark = cardId;
  }
  setTimeout(() => { const d = getSeries(); if (d) renderSparklines(d); }, 50);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (_placeMode) cancelPlaceMode();
    else if (_expandedSpark) expandSpark(_expandedSpark);
    else if (el('event-overlay').className === 'show') closeEventForm();
    else closeModal();
  }
});

// ══════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════
el('overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
el('event-overlay').addEventListener('click', function(e) { if(e.target===this) closeEventForm(); });
function _updateClock() {
  const now = new Date();
  el('clock').textContent = now.toTimeString().slice(0,8);
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  const dayName = ['日','一','二','三','四','五','六'][now.getDay()];
  el('date-label').textContent = mm + '/' + dd + ' (' + dayName + ')';
}
setInterval(_updateClock, 1000);
_updateClock();

// 版號統一設定（對齊 shelter/medical PWA 的 PWA_VERSION 做法）
document.title = 'ICS 指揮部 ' + CMD_VERSION;
document.querySelector('.h-ver').textContent = 'cmd-' + CMD_VERSION;

initMap();
// 恢復展開狀態
if (_expandedSection) _applyRightExpand(_expandedSection);
setTimeout(async () => {
  await poll();
  // 重刷後恢復上次開啟的事件 modal
  const savedEvId = sessionStorage.getItem('_openEventId');
  if (savedEvId) {
    const zone = _findZoneByEventId(savedEvId);
    if (zone) showEventProcessModal(zone);
    else { const ev = (_data?.events||[]).find(e=>e.id===savedEvId); if(ev) showEventDetail(ev); }
  }
}, 300);
setInterval(poll, POLL_INTERVAL);
window.addEventListener('resize', () => { const d = getSeries(); if (d) renderSparklines(d); _resizeEvtList(); });
</script>
</body>
</html>
