<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<script>const CMD_VERSION='v0.4.9';</script>
<title>ICS 指揮部</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#1c2333; --border:#30363d;
  --green:#1a9e52; --yellow:#d49000; --red:#cc2a2a;
  --text:#e6edf3; --text2:#8b949e; --text3:#6e7681;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono),-apple-system,sans-serif;}

/* ═══ ZONE A ═══ */
#zone-a{
  height:64px;display:flex;align-items:center;padding:0 16px;gap:14px;
  background:linear-gradient(180deg,#161b22,#0d1117);border-bottom:1px solid var(--border);
}
#status-lamp{
  width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:#fff;flex-shrink:0;
  transition:background .5s,box-shadow .5s;
}
#status-lamp.ok{background:var(--green);box-shadow:0 0 16px rgba(26,158,82,.5);}
#status-lamp.warn{background:var(--yellow);box-shadow:0 0 16px rgba(212,144,0,.5);}
#status-lamp.crit{background:var(--red);box-shadow:0 0 16px rgba(204,42,42,.6);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

#zone-a-mid{flex:1;min-width:0;}
#zone-a-top{display:flex;align-items:baseline;gap:12px;font-size:14px;color:var(--text);}
#zone-a-top .clock{font-size:22px;font-weight:700;}
#zone-a-top .runtime{font-size:13px;color:var(--text2);}
#zone-a-top .counts{font-size:14px;font-weight:600;}
#zone-a-summary{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

#zone-a-right{display:flex;align-items:center;gap:14px;flex-shrink:0;}
#dci{text-align:center;}
#dci-val{font-size:28px;font-weight:700;line-height:1;}
#dci-label{font-size:8px;color:var(--text3);letter-spacing:.1em;}
#conn{display:flex;align-items:center;gap:4px;font-size:10px;color:#00d466;}
#conn .dot{width:7px;height:7px;border-radius:50%;background:#00d466;box-shadow:0 0 6px #00d466;}
#conn.off .dot{background:var(--red);box-shadow:0 0 6px var(--red);}
#conn.off{color:var(--red);}
.h-ver{font-size:9px;color:var(--text3);border:1px solid var(--border);padding:1px 6px;border-radius:3px;}

/* ═══ ZONE B ═══ */
#zone-b{
  display:flex;height:calc(100vh - 64px - 52px);overflow:hidden;
}

/* 側欄面板 */
.side-panel{
  flex:0 0 18%;display:flex;flex-direction:column;padding:4px 5px;gap:3px;overflow:hidden;
  border-right:1px solid var(--border);
}
.side-panel.right{border-right:none;border-left:1px solid var(--border);}

/* 中：地圖 */
#map-panel{
  flex:1;position:relative;background:#111;overflow:hidden;
}
#map-tabs{
  position:absolute;top:8px;left:8px;z-index:10;display:flex;gap:0;
}
.map-tab{
  padding:4px 14px;font-size:11px;font-weight:600;cursor:pointer;
  background:rgba(22,27,34,.85);color:var(--text2);border:1px solid var(--border);
  transition:all .2s;
}
.map-tab:first-child{border-radius:5px 0 0 5px;}
.map-tab:last-child{border-radius:0 5px 5px 0;}
.map-tab.active{background:rgba(26,158,82,.3);color:#fff;border-color:var(--green);}
#map-img{width:100%;height:100%;object-fit:contain;display:block;}
#map-overlay{position:absolute;inset:0;pointer-events:none;}
.zone-marker{
  position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:0;
  transition:transform .15s;
}
.zone-marker:hover{transform:translate(-50%,-50%) scale(1.1);}
.zone-dot{
  display:flex;align-items:center;justify-content:center;
  font-size:14px;line-height:1;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));
  position:relative;
}
/* 預設隱藏標籤 */
.zone-info{
  display:none;flex-direction:column;align-items:center;gap:1px;margin-top:3px;
}
/* hover 或 pinned 時顯示 */
.zone-marker:hover .zone-info,
.zone-marker.pinned .zone-info{display:flex;}
.zone-label{
  font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);
  white-space:nowrap;background:rgba(0,0,0,.6);padding:1px 5px;border-radius:3px;
}
.zone-stats{
  font-size:8px;font-weight:600;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(0,0,0,.7);
  white-space:nowrap;background:rgba(0,0,0,.6);padding:1px 5px;border-radius:3px;
}

/* 地圖編輯模式 */
#map-tools{
  position:absolute;top:8px;right:8px;z-index:10;display:flex;gap:4px;
}
.map-btn{
  width:30px;height:30px;border-radius:5px;border:1px solid var(--border);
  background:rgba(22,27,34,.85);color:var(--text2);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.map-btn:hover{background:rgba(22,27,34,1);color:#fff;}
.map-btn.active{background:rgba(26,158,82,.3);color:#fff;border-color:var(--green);}
#edit-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  display:none;padding:6px 12px;gap:8px;align-items:center;
  background:rgba(22,27,34,.95);border-top:1px solid var(--green);
  font-size:11px;color:var(--text2);
}
#edit-bar.show{display:flex;}
#edit-bar input{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:3px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);width:100px;
}
#edit-bar select{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:3px 6px;border-radius:4px;font-size:11px;font-family:var(--mono);
}
#edit-bar button{
  background:var(--green);color:#fff;border:none;padding:4px 10px;border-radius:4px;
  font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);
}
#edit-bar button.del{background:var(--red);}
.zone-marker.editing{cursor:grab;z-index:20;}
.zone-marker.editing:active{cursor:grabbing;}
.zone-marker.editing .zone-info{display:flex;}
#edit-coords{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10;
  display:none;padding:3px 10px;border-radius:4px;
  background:rgba(0,0,0,.75);color:var(--yellow);font-size:11px;font-weight:600;
}
#edit-coords.show{display:block;}

/* sparkline 卡片 */
.spark-card{
  flex:1;min-height:0;background:var(--surface);border:1px solid var(--border);border-radius:5px;
  display:flex;flex-direction:column;overflow:hidden;cursor:pointer;transition:background .3s;
}
.spark-card:hover{background:var(--surface2);}
.spark-card.bg-warn{border-color:rgba(212,144,0,.5);background:rgba(212,144,0,.06);}
.spark-card.bg-crit{border-color:rgba(204,42,42,.5);background:rgba(204,42,42,.08);}
.spark-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 6px;flex-shrink:0;
}
.spark-title{font-size:9px;font-weight:600;color:var(--text3);}
.spark-val{font-size:10px;font-weight:700;color:var(--text);}
.spark-rag{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:4px;}
.spark-rag.ok{background:var(--green);}
.spark-rag.warn{background:var(--yellow);}
.spark-rag.crit{background:var(--red);}
.spark-body{flex:1;min-height:0;padding:0 2px 1px;}
canvas{display:block;width:100%!important;height:100%!important;}

/* sparkline 展開圖例 */
.spark-detail{display:none;padding:2px 6px;}
.spark-card.expanded .spark-detail{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.spark-detail .li{display:flex;align-items:center;gap:3px;font-size:8px;color:var(--text3);}
.spark-detail .ld{width:14px;height:3px;border-radius:1px;flex-shrink:0;}
.spark-detail .ld.dash{background:transparent !important;border-top:2px dashed;}

/* ═══ ZONE C ═══ */
#zone-c{
  height:52px;display:flex;align-items:stretch;padding:3px 8px;gap:5px;
  background:var(--surface);border-top:1px solid var(--border);
}
.zc-pill{
  flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:5px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:2px 8px;transition:all .3s;
}
.zc-pill.warn{border-color:rgba(212,144,0,.6);background:rgba(212,144,0,.1);}
.zc-pill.crit{border-color:rgba(204,42,42,.6);background:rgba(204,42,42,.12);animation:pulse 1.5s infinite;}
.zc-icon{font-size:14px;}
.zc-label{font-size:8px;color:var(--text3);}
.zc-time{font-size:18px;font-weight:700;line-height:1;}
.zc-time.ok{color:var(--green);}
.zc-time.warn{color:var(--yellow);}
.zc-time.crit{color:var(--red);}

/* 升降級區塊 */
.zc-esc{
  flex:1.5;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:6px 10px;overflow-y:auto;
}
.zc-esc-title{font-size:9px;color:var(--text3);letter-spacing:.08em;margin-bottom:4px;}
.zc-esc-item{font-size:10px;color:var(--text2);margin-bottom:2px;}
.zc-esc-item .tag{display:inline-block;padding:0 4px;border-radius:2px;font-size:8px;font-weight:700;margin-right:4px;}
.zc-esc-item .tag.warn{background:rgba(212,144,0,.2);color:var(--yellow);}
.zc-esc-item .tag.crit{background:rgba(204,42,42,.2);color:var(--red);}
.zc-esc-item .tag.ok{background:rgba(26,158,82,.2);color:var(--green);}

/* 待裁示區塊（與升降級相同樣式） */
.zc-dec{
  flex:1.5;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:6px 10px;overflow-y:auto;
}

/* ═══ OVERLAY MODAL ═══ */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
#overlay.show{display:flex;}
#modal{background:var(--surface);border-radius:10px;border:1px solid var(--border);width:min(760px,94vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;color:var(--text);}
#modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
#modal-title{font-size:12px;font-weight:700;color:var(--text);}
#modal-close{font-size:18px;cursor:pointer;color:var(--text3);background:none;border:none;padding:2px 6px;border-radius:3px;}
#modal-close:hover{background:var(--bg);}
#modal-body{flex:1;overflow-y:auto;padding:16px;}

/* ═══ 事件表單 OVERLAY ═══ */
#event-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
#event-overlay.show{display:flex;}
#event-modal{background:var(--surface);border-radius:10px;border:1px solid var(--border);width:min(480px,94vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;color:var(--text);}
#event-modal input, #event-modal select, #event-modal textarea {
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:6px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);
  width:100%;margin-top:3px;
}
#event-modal label {font-size:10px;color:var(--text3);display:block;margin-bottom:2px;}
#event-modal textarea {resize:vertical;}

/* ═══ 裁示 OVERLAY ═══ */
#decision-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
#decision-overlay.show{display:flex;}
#decision-modal{background:var(--surface);border-radius:10px;border:1px solid var(--border);width:min(560px,94vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;color:var(--text);}

/* 切面通用 */
.slice-time{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.slice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.slice-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:10px;}
.slice-card-title{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.slice-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:3px;}
.slice-row .sk{color:var(--text3);}
.slice-row .sv{font-weight:700;}
.slice-bar{height:5px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.slice-fill{height:100%;border-radius:2px;}
.src-breakdown{display:flex;gap:5px;margin-top:6px;}
.src-chip{flex:1;padding:5px 6px;border-radius:4px;text-align:center;border:1px solid;}
.src-chip .sc-label{font-size:8px;margin-bottom:1px;}
.src-chip .sc-val{font-size:18px;font-weight:700;line-height:1;}

/* 全螢幕放大 */
/* 展開全螢幕 — 放大字體和間距 */
.spark-card.expanded{position:fixed;top:64px;left:0;right:0;bottom:80px;z-index:50;border-radius:0;border:none;background:var(--bg);}
.spark-card.expanded .spark-hdr{padding:8px 16px;}
.spark-card.expanded .spark-title{font-size:14px;}
.spark-card.expanded .spark-val{font-size:16px;}
.spark-card.expanded .spark-rag{width:10px;height:10px;}
.spark-card.expanded .spark-detail{padding:4px 16px;gap:14px;}
.spark-card.expanded .spark-detail .li{font-size:11px;gap:5px;}
.spark-card.expanded .spark-detail .ld{width:20px;height:4px;}
.spark-card.expanded .spark-body{padding:0 8px 6px;}

/* 地圖新鮮度圓點 */
.zone-fresh{
  position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:50%;
  border:1px solid rgba(0,0,0,.5);
}
.zone-fresh.ok{background:var(--green);}
.zone-fresh.warn{background:var(--yellow);animation:blink 1s infinite;}
.zone-fresh.crit{background:var(--red);animation:blink .6s infinite;}
.zone-fresh.lkp{background:#555;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* 通訊健康圓點 */
.comm-dot{width:14px;height:14px;border-radius:50%;background:#555;position:relative;cursor:help;box-shadow:0 0 4px rgba(0,0,0,.4);}
.comm-dot.ok{background:var(--green);}
.comm-dot.warn{background:var(--yellow);animation:blink 1s infinite;}
.comm-dot.crit{background:var(--red);animation:blink .6s infinite;}
.comm-dot.lkp{background:#555;}
.comm-dot::after{content:attr(title);position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--text3);white-space:nowrap;display:none;}
.comm-dot:hover::after{display:block;}

/* 地圖流向箭頭動畫 */
.flow-line{animation:flowDash 1.5s linear infinite;}
@keyframes flowDash{to{stroke-dashoffset:-12;}}

/* 裁示頁籤 */
.dec-tab{cursor:pointer;font-size:9px;color:var(--text3);padding:1px 4px;border-radius:3px;}
.dec-tab.active{color:var(--text);background:rgba(255,255,255,.1);}

/* 事件地圖標記 */
.event-marker{z-index:8;}
.event-marker .zone-info{display:flex !important;}

/* 逾時事件 marker 閃爍 */
.zone-marker.overdue .zone-dot{animation:pulse 1s infinite;}
.zone-marker.overdue .zone-label{background:rgba(204,42,42,.7);}
</style>
</head>
<body>

<!-- ═══════ ZONE A — 態勢速讀 ═══════ -->
<div id="zone-a">
  <img src="/static/badge.png" alt="ICS" style="height:40px;width:40px;border-radius:50%;flex-shrink:0;">
  <div id="status-lamp" class="ok">正常</div>
  <div id="zone-a-mid">
    <div id="zone-a-top">
      <span class="clock" id="clock">--:--:--</span>
      <span class="runtime" id="runtime"></span>
      <span class="counts" id="counts">—</span>
      <div id="comm-dots" style="display:flex;gap:6px;align-items:center;margin-left:10px;">
        <div style="display:flex;align-items:center;gap:3px;"><span class="comm-dot" id="cd-shelter"></span><span style="font-size:9px;color:var(--text3);">收容</span></div>
        <div style="display:flex;align-items:center;gap:3px;"><span class="comm-dot" id="cd-medical"></span><span style="font-size:9px;color:var(--text3);">醫療</span></div>
      </div>
    </div>
    <div id="zone-a-summary">系統啟動中⋯</div>
  </div>
  <div id="zone-a-right">
    <button id="btn-event" onclick="openEventForm()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);">📝 事件</button>
    <div id="dci"><div id="dci-val" style="color:var(--text3)">—</div><div id="dci-label">DCI</div></div>
    <div class="h-ver">cmd-v0.4.1</div>
    <div id="conn"><div class="dot"></div><span id="conn-label">待連線</span></div>
  </div>
</div>

<!-- ═══════ ZONE B — 態勢 + 地圖 + 資源 ═══════ -->
<div id="zone-b">
  <!-- 左：態勢（現場怎麼了） -->
  <div class="side-panel" id="panel-left">
    <div class="spark-card" id="sp-cap" onclick="expandSpark('sp-cap')">
      <div class="spark-hdr">
        <span class="spark-title">量能</span>
        <span style="display:flex;align-items:center;"><span class="spark-val" id="sp-cap-v">—</span><span class="spark-rag ok" id="sp-cap-rag"></span></span>
      </div>
      <div class="spark-detail" id="sp-cap-detail">
        <div class="li"><div class="ld" style="background:#E67E22"></div>收容床位%</div>
        <div class="li"><div class="ld" style="background:#C0392B"></div>醫療床位%</div>
        <div class="li"><div class="ld dash" style="border-color:rgba(212,144,0,.6)"></div>警戒70%</div>
        <div class="li"><div class="ld dash" style="border-color:rgba(204,42,42,.6)"></div>危急90%</div>
      </div>
      <div class="spark-body"><canvas id="sc1"></canvas></div>
    </div>
    <div class="spark-card" id="sp-flow" onclick="expandSpark('sp-flow')">
      <div class="spark-hdr">
        <span class="spark-title">流向</span>
        <span style="display:flex;align-items:center;"><span class="spark-val" id="sp-flow-v">—</span><span class="spark-rag ok" id="sp-flow-rag"></span></span>
      </div>
      <div class="spark-detail" id="sp-flow-detail">
        <div class="li"><div class="ld" style="background:#E74C3C"></div>SRT Red+</div>
        <div class="li"><div class="ld" style="background:#FF8F00"></div>醫療紅傷</div>
      </div>
      <div class="spark-body"><canvas id="sc2"></canvas></div>
    </div>
    <div class="spark-card" id="sp-inc" onclick="expandSpark('sp-inc')">
      <div class="spark-hdr">
        <span class="spark-title">事件</span>
        <span style="display:flex;align-items:center;"><span class="spark-val" id="sp-inc-v">—</span><span class="spark-rag ok" id="sp-inc-rag"></span></span>
      </div>
      <div class="spark-detail" id="sp-inc-detail">
        <div class="li"><div class="ld" style="background:#e6edf3;height:4px"></div>未結累計</div>
        <div class="li"><div class="ld" style="background:var(--red)"></div>高</div>
        <div class="li"><div class="ld" style="background:var(--yellow)"></div>中</div>
        <div class="li"><div class="ld" style="background:var(--green)"></div>低</div>
      </div>
      <div class="spark-body"><canvas id="sc3"></canvas></div>
    </div>
  </div>

  <!-- 中：互動地圖 -->
  <div id="map-panel">
    <div id="map-tabs">
      <div class="map-tab active" data-map="indoor" onclick="switchMap('indoor')">站內</div>
      <div class="map-tab" data-map="outdoor" onclick="switchMap('outdoor')">站外</div>
    </div>
    <div id="map-tools">
      <div class="map-btn" id="btn-edit" title="編輯據點位置" onclick="toggleEditMode()">⚙</div>
    </div>
    <div id="edit-coords"></div>
    <img id="map-img" src="" alt="地圖載入中">
    <div id="map-overlay"></div>
    <div id="edit-bar">
      <span>📌 編輯模式</span>
      <span style="margin-left:auto">新增：</span>
      <input id="ed-label" placeholder="名稱">
      <select id="ed-icon">
        <option value="pin">📌 圖釘</option><option value="ambulance">🚑 救護</option><option value="warning">⚠ 注意</option><option value="person">👤 人員</option><option value="alert">🔺 警報</option>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// 常數與狀態
// ══════════════════════════════════════════════════════════════
const API_BASE = location.origin;
const POLL_INTERVAL = 5000;
const VIEW_SIZE = 24;  // sparkline 可視區間（投影夠大，放多一點）
let _data = null;
let _viewEnd = -1;
let _mapConfig = null;
let _currentMap = 'indoor';
const _pinnedZones = new Set();
let _startTime = Date.now();
let _editMode = false;
let _selectedZoneId = null;
let _dragState = null;
let _currentDecisionId = null;
let _decTab = 'pending';

const el = id => document.getElementById(id);

// ══════════════════════════════════════════════════════════════
// SVG Icon 定義（取代 emoji，確保跨平台一致）
// ══════════════════════════════════════════════════════════════
const SVG_ICONS = {
  pin: `<svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 1C6.7 1 4 3.7 4 7c0 5 6 12 6 12s6-7 6-12c0-3.3-2.7-6-6-6z" fill="#e05050"/><circle cx="10" cy="7" r="2.5" fill="#fff"/></svg>`,
  ambulance: `<svg width="18" height="18" viewBox="0 0 20 20"><rect x="1" y="5" width="18" height="10" rx="2" fill="#cc2a2a"/><rect x="7" y="7" width="2" height="6" rx=".5" fill="#fff"/><rect x="5" y="9" width="6" height="2" rx=".5" fill="#fff"/><circle cx="5" cy="16" r="1.5" fill="#333"/><circle cx="15" cy="16" r="1.5" fill="#333"/></svg>`,
  warning: `<svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 2L1 17h18L10 2z" fill="#d49000"/><text x="10" y="15" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff" font-family="sans-serif">!</text></svg>`,
  person: `<svg width="18" height="18" viewBox="0 0 20 20"><circle cx="10" cy="5" r="3" fill="#fff"/><path d="M5 18v-4a5 5 0 0 1 10 0v4" fill="#fff" opacity=".9"/></svg>`,
  alert: `<svg width="18" height="18" viewBox="0 0 20 20"><path d="M10 1L0 18h20L10 1z" fill="#cc2a2a"/><text x="10" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff" font-family="sans-serif">!</text></svg>`,
};

// PWA 事件類型定義（對齊 shelter/medical PWA）
const INCIDENT_LABELS_SHELTER = {
  infectious_risk:'傳染疑慮', capacity_overload:'量能超載', noise_disturbance:'災民喧嘩',
  power_outage:'停電', air_raid:'空襲或飛彈攻擊', security_threat:'安全威脅',
  id_mismatch:'身分核對不符', dangerous_resident:'危險收容者', resource_shortage:'物資短缺',
  suspicious_person:'發現可疑人士', facility_damage:'場地/設備損壞', volunteer_conflict:'志工衝突升級',
  rumor_spread:'謠言蔓延', resident_distress:'災民情緒激動', pet_placement:'寵物外送安置',
  immediate_needs:'即時需求', medical_transfer:'需醫療轉介/轉送', non_medical_transport:'需非醫療接駁',
  language_assist:'語言協助', medication_mgmt:'藥品管理', accessible_bed:'無障礙床位分配',
  charging_arrange:'電動輔具充電安排', other:'其他'
};
const INCIDENT_LABELS_MEDICAL = {
  security_threat:'安全威脅', violent_patient:'暴力傷患', infectious_risk:'傳染疑慮',
  resource_shortage:'物資短缺', capacity_overload:'量能超載', equipment_failure:'設備故障',
  evacuation:'撤退'
};
const INCIDENT_LABELS_GENERAL = {
  supply_shortage:'物資短缺', capacity_warning:'容量警告', medical_emergency:'醫療緊急',
  security_incident:'安全事件', personnel_issue:'人員問題', comm_failure:'通訊異常', other:'其他'
};

function updateEventTypeOptions() {
  const unit = el('ev-unit').value;
  const sel = el('ev-type');
  sel.innerHTML = '';
  const labels = unit === 'shelter' ? INCIDENT_LABELS_SHELTER
    : unit === 'medical' ? INCIDENT_LABELS_MEDICAL
    : INCIDENT_LABELS_GENERAL;
  Object.entries(labels).forEach(([k,v]) => {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = v;
    sel.appendChild(opt);
  });
}

// emoji → SVG key 對應（向下相容舊 map_config）
const EMOJI_TO_SVG = {'📌':'pin','🚑':'ambulance','⚠️':'warning','👤':'person'};

function renderIcon(icon) {
  if (SVG_ICONS[icon]) return SVG_ICONS[icon];
  if (EMOJI_TO_SVG[icon]) return SVG_ICONS[EMOJI_TO_SVG[icon]];
  return `<span style="font-size:14px">${icon}</span>`;  // fallback：原始 emoji
}

// ══════════════════════════════════════════════════════════════
// 地圖初始化
// ══════════════════════════════════════════════════════════════
async function initMap() {
  try {
    const resp = await fetch(API_BASE + '/static/map_config.json');
    _mapConfig = await resp.json();
    switchMap('indoor');
  } catch(e) {
    console.warn('地圖設定載入失敗', e);
    el('map-img').alt = '地圖設定載入失敗';
  }
}

function switchMap(key) {
  if (!_mapConfig || !_mapConfig.maps[key]) return;
  _currentMap = key;
  const m = _mapConfig.maps[key];
  el('map-img').src = '/static/' + m.image;
  // tab 切換
  document.querySelectorAll('.map-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.map === key);
  });
  renderMapOverlay();
}

function renderMapOverlay() {
  if (!_mapConfig) return;
  const m = _mapConfig.maps[_currentMap];
  if (!m) return;
  const overlay = el('map-overlay');
  overlay.innerHTML = '';
  overlay.style.pointerEvents = 'none';

  // 取最新資料用於據點狀態
  const calc = _data?.calc || {};
  const latest = key => {
    const snap = calc[key]?.snapshot || {};
    const ex = (typeof snap.extra === 'string' ? JSON.parse(snap.extra) : snap.extra) || {};
    return { snap, ex, fresh: calc[key]?.freshness || {} };
  };

  m.zones.forEach(z => {
    const marker = document.createElement('div');
    marker.className = 'zone-marker';
    marker.style.left = z.x_pct + '%';
    marker.style.top = z.y_pct + '%';
    marker.style.pointerEvents = 'auto';

    // 據點狀態
    let lvl = 'ok', statsText = '';
    if (z.node_type === 'shelter') {
      const d = latest('shelter');
      const bu = d.snap.bed_used || 0, bt = d.snap.bed_total || 1;
      const pct = Math.round(bu/bt*100);
      lvl = pct >= 90 ? 'crit' : pct >= 70 ? 'warn' : 'ok';
      statsText = bu + '人 / ' + pct + '%';
    } else if (z.node_type === 'medical') {
      const d = latest('medical');
      const cr = d.snap.casualties_red || (d.snap.casualties||{}).red || 0;
      const bu = d.snap.bed_used || 0;
      lvl = cr >= 3 ? 'crit' : cr >= 1 ? 'warn' : 'ok';
      statsText = bu + '人 / R:' + cr;
    } else if (z.node_type === 'forward') {
      // 前進組接實際資料
      const units = calc.forward?.units || [];
      if (units.length > 0) {
        const totalR = units.reduce((s,u) => s + ((u.casualties||{}).red||0), 0);
        const totalY = units.reduce((s,u) => s + ((u.casualties||{}).yellow||0), 0);
        lvl = totalR >= 3 ? 'crit' : totalR >= 1 ? 'warn' : 'ok';
        statsText = 'R:' + totalR + ' Y:' + totalY;
      }
    } else if (z.node_type === 'security') {
      // 安全組接實際資料
      const secSnap = calc.security?.snapshot;
      if (secSnap) {
        const ex = (typeof secSnap.extra === 'string' ? JSON.parse(secSnap.extra) : secSnap.extra) || {};
        const posts = ex.post_total || secSnap.post_total || 0;
        const qrf = ex.qrf_available || secSnap.qrf_available || 0;
        const anomaly = ex.post_anomaly || '';
        lvl = anomaly ? 'warn' : 'ok';
        statsText = '哨' + posts + ' QRF:' + qrf;
      }
    }

    const isPinned = _pinnedZones.has(z.id);
    if (isPinned) marker.classList.add('pinned');

    // 取新鮮度
    const freshLevel = (z.node_type && calc[z.node_type]?.freshness?.level) || '';
    const freshDot = freshLevel ? `<span class="zone-fresh ${freshLevel}"></span>` : '';

    // 事件 marker 處理：倒數、結案隱藏、逾時閃紅
    let countdownText = '';
    const isEvtZone = !!(z.event_id || z.event_code);
    if (isEvtZone) {
      // 找對應事件（用 event_id 或 location_zone_id）
      const allEvts = _data?.events || [];
      const ev = z.event_id
        ? allEvts.find(e => e.id === z.event_id)
        : allEvts.find(e => e.location_zone_id === z.id);

      if (!ev) {
        // 事件不在 open/in_progress 列表中 → 已結案或已刪除，不渲染
        return;
      }

      if (ev.response_deadline) {
        countdownText = _countdownStr(ev.response_deadline);
      }
      // 逾時 → marker 閃紅
      if (ev.response_deadline) {
        const ts = ev.response_deadline.endsWith('Z') ? ev.response_deadline : ev.response_deadline + 'Z';
        if (new Date(ts).getTime() < Date.now()) {
          marker.classList.add('overdue');
        }
      }
    }

    // 事件 marker：只顯示編號+倒數，不顯示據點 stats；hover 才顯示完整標籤
    const isEvt = !!(z.event_id || z.event_code);
    const labelText = isEvt
      ? `${z.event_code || ''} ${z.label}`
      : z.label;
    const displayStats = isEvt ? '' : statsText; // 事件不顯示 R:3 Y:2

    marker.innerHTML = `
      <div class="zone-dot" style="position:relative">${renderIcon(z.icon)}${freshDot}</div>
      <div class="zone-info" ${isEvt ? 'style="display:flex"' : ''}>
        <div class="zone-label">${isEvt ? (z.event_code || z.label) : z.label}</div>
        ${displayStats ? '<div class="zone-stats">' + displayStats + '</div>' : ''}
        ${countdownText ? '<div class="zone-stats" style="color:' + (countdownText.startsWith('逾時') ? 'var(--red)' : 'var(--yellow)') + '">' + countdownText + '</div>' : ''}
      </div>
    `;

    if (_editMode) {
      // 編輯模式：拖曳定位，點擊填入屬性
      marker.classList.add('editing');
      if (z.id === _selectedZoneId) marker.style.outline = '2px solid var(--green)';
      marker.addEventListener('mousedown', (e) => _startDrag(marker, z, e));
      marker.addEventListener('touchstart', (e) => _startDrag(marker, z, e), {passive:false});
    } else {
      // 正常模式：單擊固定標籤，雙擊開 modal
      // 用 delay 區分單/雙擊，避免單擊吃掉雙擊
      let _clickTimer = null;
      marker.addEventListener('click', (e) => {
        e.stopPropagation();
        console.log('[click]', z.id, z.label, 'node_type:', z.node_type, 'event_id:', z.event_id);
        if (_clickTimer) { clearTimeout(_clickTimer); _clickTimer = null; return; }
        _clickTimer = setTimeout(() => {
          _clickTimer = null;
          console.log('[click-single]', z.id, z.label);
          if (_pinnedZones.has(z.id)) {
            _pinnedZones.delete(z.id);
            marker.classList.remove('pinned');
          } else {
            _pinnedZones.add(z.id);
            marker.classList.add('pinned');
          }
        }, 250);
      });
      marker.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        if (_clickTimer) { clearTimeout(_clickTimer); _clickTimer = null; }
        const isEventMarker = z.event_id || z.event_code || (z.node_type !== 'shelter' && z.node_type !== 'medical');
        console.log('[dblclick]', z.id, z.label, 'node_type:', z.node_type, 'event_id:', z.event_id, 'isEvent:', isEventMarker);
        try {
          if (isEventMarker) {
            console.log('[dblclick] → showEventProcessModal');
            showEventProcessModal(z);
          } else {
            console.log('[dblclick] → showZoneDetail');
            showZoneDetail(z);
          }
        } catch(err) {
          console.error('[dblclick] ERROR:', err);
        }
      });
    }

    overlay.appendChild(marker);
  });

  // 流向箭頭
  renderFlows();

  // 事件 marker 已統一由 zone marker 處理（v0.4.3+），不再另外渲染
}

// ══════════════════════════════════════════════════════════════
// 地圖流向箭頭
// ══════════════════════════════════════════════════════════════
function renderFlows() {
  // 移除舊箭頭
  document.querySelectorAll('.flow-arrow').forEach(e => e.remove());
  if (!_mapConfig || _editMode) return;
  const m = _mapConfig.maps[_currentMap];
  if (!m || !m.flows || !m.flows.length) return;
  const overlay = el('map-overlay');
  const calc = _data?.calc || {};

  m.flows.forEach(f => {
    const fromZ = m.zones.find(z => z.id === f.from);
    const toZ = m.zones.find(z => z.id === f.to);
    if (!fromZ || !toZ) return;

    // 計算流量（用於粗度）
    let volume = 1;
    if (f.from && calc.forward?.units) {
      const totalR = (calc.forward.units || []).reduce((s,u) => s + ((u.casualties||{}).red||0), 0);
      volume = Math.max(1, totalR);
    }

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('flow-arrow');
    svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;';
    svg.innerHTML = `
      <defs>
        <marker id="arrowhead-${f.from}" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="rgba(240,136,62,.8)"/>
        </marker>
      </defs>
      <line x1="${fromZ.x_pct}%" y1="${fromZ.y_pct}%" x2="${toZ.x_pct}%" y2="${toZ.y_pct}%"
        stroke="rgba(240,136,62,.6)" stroke-width="${Math.min(volume + 1, 5)}"
        stroke-dasharray="8 4" marker-end="url(#arrowhead-${f.from})"
        class="flow-line"/>
    `;
    overlay.appendChild(svg);
  });
}

function showEventDetail(ev) {
  const age = _decisionAge(ev.occurred_at || ev.created_at);
  const sevColor = ev.severity === 'critical' ? 'var(--red)' : ev.severity === 'warning' ? 'var(--yellow)' : 'var(--text3)';

  let html = `<div style="margin-bottom:12px;">`;
  html += `<span style="display:inline-block;padding:2px 8px;border-radius:3px;background:${sevColor}33;color:${sevColor};font-size:10px;font-weight:700;">${ev.severity}</span>`;
  html += `<span style="font-size:10px;color:var(--text3);margin-left:8px;">${ev.reported_by_unit} \u00b7 ${age}</span>`;
  html += `</div>`;
  html += `<div style="font-size:14px;font-weight:700;margin-bottom:8px;">${ev.event_type}</div>`;
  html += `<div style="font-size:11px;color:var(--text2);margin-bottom:8px;">${ev.description}</div>`;
  if (ev.location_desc) html += `<div style="font-size:10px;color:var(--text3);margin-bottom:8px;">\ud83d\udccd ${ev.location_desc}</div>`;
  html += `<div style="font-size:10px;color:var(--text3);">回報：${ev.operator_name}\u3000狀態：${ev.status}</div>`;

  if (ev.status === 'open' || ev.status === 'in_progress') {
    html += `<div style="margin-top:12px;display:flex;gap:6px;">`;
    html += `<button onclick="updateEventStatus('${ev.id}','in_progress')" style="flex:1;padding:6px;background:var(--yellow);color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--mono);">處理中</button>`;
    html += `<button onclick="updateEventStatus('${ev.id}','resolved')" style="flex:1;padding:6px;background:var(--green);color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--mono);">結案</button>`;
    html += `</div>`;
  }

  el('modal-title').textContent = '\ud83d\udccb 事件詳情';
  el('modal-body').innerHTML = html;
  el('overlay').className = 'show';
}

async function updateEventStatus(eventId, status) {
  try {
    const resp = await fetch(API_BASE + '/api/events/' + eventId + '/status?status=' + status + '&operator=指揮官', {
      method: 'PATCH',
    });
    if (resp.ok) { closeModal(); poll(); }
  } catch(e) { alert('更新失敗：' + e.message); }
}

// ══════════════════════════════════════════════════════════════

function _countdownStr(deadline) {
  if (!deadline) return '';
  const ts = deadline.endsWith('Z') ? deadline : deadline + 'Z';
  const diff = new Date(ts).getTime() - Date.now();
  const absDiff = Math.abs(diff);
  const min = Math.floor(absDiff / 60000);
  const sec = Math.floor((absDiff % 60000) / 1000);
  const timeStr = min + ':' + String(sec).padStart(2, '0');
  return diff < 0 ? '逾時 ' + timeStr : '剩餘 ' + timeStr;
}

function showEventProcessModal(zone) {
  // 找對應事件：優先用 event_id，其次用 location_zone_id 比對
  const allEvts = _data?.events || [];
  const ev = zone.event_id
    ? allEvts.find(e => e.id === zone.event_id)
    : allEvts.find(e => e.location_zone_id === zone.id);
  if (!ev) {
    // 找不到事件，用一般 zone modal
    showZoneDetail(zone);
    return;
  }

  const sevColor = ev.severity === 'critical' ? 'var(--red)' : ev.severity === 'warning' ? 'var(--yellow)' : 'var(--text3)';
  const statusLabel = {open:'未結',in_progress:'處理中',resolved:'已結案',closed:'已關閉'}[ev.status] || ev.status;
  const statusC = (ev.status === 'resolved' || ev.status === 'closed') ? 'var(--green)' : 'var(--yellow)';
  const notes = _parseNotes(ev.notes);
  const isOpen = ev.status === 'open' || ev.status === 'in_progress';
  const countdown = ev.response_deadline ? _countdownStr(ev.response_deadline) : '';
  const countdownColor = countdown.startsWith('逾時') ? 'var(--red)' : 'var(--yellow)';

  let html = '';
  // 標題區
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">`;
  html += `<div>`;
  html += `<span style="display:inline-block;padding:2px 8px;border-radius:3px;background:${sevColor}33;color:${sevColor};font-size:10px;font-weight:700;">${ev.severity}</span>`;
  html += `<span style="font-size:10px;color:${statusC};font-weight:600;margin-left:6px;">${statusLabel}</span>`;
  html += `</div>`;
  if (countdown) {
    html += `<div style="font-size:12px;font-weight:700;color:${countdownColor};">⏱ ${countdown}</div>`;
  }
  html += `</div>`;

  // 事件資訊
  html += `<div style="font-size:14px;font-weight:700;margin-bottom:6px;">${ev.description || ev.event_type}</div>`;
  html += `<div style="font-size:10px;color:var(--text3);margin-bottom:4px;">`;
  html += `回報：${ev.operator_name}　組別：${ev.reported_by_unit}`;
  if (ev.location_desc) html += `　📍 ${ev.location_desc}`;
  html += `</div>`;
  html += `<div style="font-size:10px;color:var(--text3);margin-bottom:10px;">`;
  html += `發生：${(ev.occurred_at||'').slice(11,16)}　期限：${(ev.response_deadline||'').slice(11,16)}`;
  html += `</div>`;

  // 處置紀錄
  html += `<div style="border-top:1px solid var(--border);padding-top:8px;margin-bottom:8px;">`;
  html += `<div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;">處置紀錄</div>`;
  if (notes.length > 0) {
    notes.forEach(n => {
      html += `<div style="font-size:11px;padding:3px 0;border-bottom:1px solid rgba(48,54,61,.3);">`;
      html += `<span style="color:var(--text3);">${(n.time||'').slice(11,16)}</span>`;
      html += n.by ? ` <span style="color:var(--green);font-weight:600;">${n.by}</span>` : '';
      html += ` — ${n.text}`;
      html += `</div>`;
    });
  } else {
    html += `<div style="font-size:10px;color:var(--text3);">無處置紀錄</div>`;
  }
  html += `</div>`;

  // 操作區（未結案）
  if (isOpen) {
    html += `<div style="border-top:1px solid var(--border);padding-top:8px;">`;
    html += `<div style="display:flex;gap:4px;margin-bottom:6px;">`;
    html += `<input id="ev-proc-note" placeholder="追加處置紀錄..." style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);">`;
    html += `<button onclick="_addEventNoteFromModal('${ev.id}')" style="padding:6px 12px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--mono);">追加</button>`;
    html += `</div>`;
    html += `<div style="display:flex;gap:6px;">`;
    if (ev.status === 'open') {
      html += `<button onclick="_updateEvFromModal('${ev.id}','in_progress')" style="flex:1;padding:6px;background:var(--yellow);color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);">處理中</button>`;
    }
    if (notes.length > 0) {
      html += `<button onclick="_updateEvFromModal('${ev.id}','resolved')" style="flex:1;padding:6px;background:var(--green);color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);">結案</button>`;
    } else {
      html += `<button disabled style="flex:1;padding:6px;background:var(--border);color:var(--text3);border:none;border-radius:4px;font-size:11px;cursor:not-allowed;font-family:var(--mono);" title="請先追加處置紀錄">結案</button>`;
    }
    html += `</div>`;
    html += `</div>`;
  }

  const iconHtml = `<span style="display:inline-flex;vertical-align:middle;margin-right:4px;">${renderIcon(zone.icon)}</span>`;
  el('modal-title').innerHTML = `${iconHtml} ${ev.event_code || ''}　${zone.label}`;
  el('modal-body').innerHTML = html;
  el('overlay').className = 'show';
}

async function _addEventNoteFromModal(eventId) {
  const input = document.getElementById('ev-proc-note');
  const text = input?.value?.trim();
  if (!text) { input?.focus(); return; }
  try {
    const resp = await fetch(API_BASE + '/api/events/' + eventId + '/notes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text, operator: '指揮部' })
    });
    if (resp.ok) {
      await poll();
      // 重新開啟 modal
      const zone = _findZoneByEventId(eventId);
      if (zone) showEventProcessModal(zone);
    }
  } catch(e) { alert('追加失敗：' + e.message); }
}

async function _updateEvFromModal(eventId, status) {
  try {
    const resp = await fetch(API_BASE + '/api/events/' + eventId + '/status?status=' + status + '&operator=指揮部', {
      method: 'PATCH',
    });
    if (resp.ok) {
      closeModal();
      await poll();
    }
  } catch(e) { alert('更新失敗：' + e.message); }
}

function _findZoneByEventId(eventId) {
  if (!_mapConfig) return null;
  for (const mapKey of Object.keys(_mapConfig.maps)) {
    const z = _mapConfig.maps[mapKey].zones.find(z => z.event_id === eventId);
    if (z) return z;
  }
  return null;
}

// ══════════════════════════════════════════════════════════════
// 地圖編輯模式
// ══════════════════════════════════════════════════════════════

function toggleEditMode() {
  _editMode = !_editMode;
  el('btn-edit').classList.toggle('active', _editMode);
  el('edit-bar').classList.toggle('show', _editMode);
  if (!_editMode) {
    _selectedZoneId = null;
    el('edit-coords').classList.remove('show');
    el('btn-update-zone').style.display = 'none';
  }
  renderMapOverlay();
}

function _startDrag(marker, zone, e) {
  if (!_editMode) return;
  e.preventDefault();
  e.stopPropagation();
  const panel = el('map-panel');
  const rect = panel.getBoundingClientRect();
  _dragState = { zone, marker, rect };

  // 選取據點並填入屬性
  _selectZoneForEdit(zone);

  // 高亮選取
  document.querySelectorAll('.zone-marker').forEach(m => m.style.outline = '');
  marker.style.outline = '2px solid var(--green)';

  const onMove = (ev) => {
    const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const x = Math.max(0, Math.min(100, (clientX - rect.left) / rect.width * 100));
    const y = Math.max(0, Math.min(100, (clientY - rect.top) / rect.height * 100));
    zone.x_pct = Math.round(x * 10) / 10;
    zone.y_pct = Math.round(y * 10) / 10;
    marker.style.left = zone.x_pct + '%';
    marker.style.top = zone.y_pct + '%';
    el('edit-coords').textContent = `${zone.label}  x:${zone.x_pct}%  y:${zone.y_pct}%`;
    el('edit-coords').classList.add('show');
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    _dragState = null;
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
}

// 選取據點填入編輯列
function _selectZoneForEdit(zone) {
  _selectedZoneId = zone.id;
  el('ed-label').value = zone.label || '';
  el('ed-type').value = zone.node_type || '';
  el('ed-icon').value = zone.icon || '📌';
  el('btn-update-zone').style.display = 'inline-block';
}

// 更新選中據點的屬性
function updateSelectedZone() {
  if (!_selectedZoneId || !_mapConfig) return;
  const m = _mapConfig.maps[_currentMap];
  const zone = m.zones.find(z => z.id === _selectedZoneId);
  if (!zone) return;
  zone.label = el('ed-label').value.trim() || zone.label;
  zone.node_type = el('ed-type').value || null;
  zone.icon = el('ed-icon').value;
  renderMapOverlay();
}

async function addMarkerAtCenter() {
  if (!_mapConfig || !_currentMap) return;
  const m = _mapConfig.maps[_currentMap];
  const label = el('ed-label').value.trim();
  if (!label) { el('ed-label').focus(); return; }
  const icon = el('ed-icon').value;
  const nodeType = el('ed-type').value || null;
  const id = 'custom_' + Date.now();
  const zone = { id, label, sub: '', x_pct: 50, y_pct: 50, node_type: nodeType, icon };

  // 非收容/醫療 → 自動建事件
  if (nodeType !== 'shelter' && nodeType !== 'medical') {
    const severity = nodeType === 'urgent' ? 'critical' : 'warning';
    try {
      const resp = await fetch(API_BASE + '/api/events', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          reported_by_unit: nodeType || 'command',
          event_type: label,
          severity: severity,
          description: label,
          operator_name: '指揮部',
          location_zone_id: id,
          location_desc: label,
        })
      });
      if (resp.ok) {
        const data = await resp.json();
        zone.event_id = data.id;
        zone.event_code = data.event_code;
      }
    } catch(e) { console.warn('自動建事件失敗', e); }
  }

  m.zones.push(zone);
  el('ed-label').value = '';
  renderMapOverlay();
  // 自動儲存 map config（含事件 zone）
  saveMapConfig();
}

function deleteSelectedMarker() {
  if (!_selectedZoneId || !_mapConfig) return;
  const m = _mapConfig.maps[_currentMap];
  const idx = m.zones.findIndex(z => z.id === _selectedZoneId);
  if (idx === -1) return;
  m.zones.splice(idx, 1);
  // 清除相關 flows
  m.flows = (m.flows || []).filter(f => f.from !== _selectedZoneId && f.to !== _selectedZoneId);
  _selectedZoneId = null;
  _pinnedZones.delete(_selectedZoneId);
  el('edit-coords').classList.remove('show');
  el('btn-update-zone').style.display = 'none';
  renderMapOverlay();
}

async function saveMapConfig() {
  if (!_mapConfig) return;
  try {
    const resp = await fetch(API_BASE + '/api/map_config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(_mapConfig)
    });
    if (resp.ok) {
      el('edit-coords').textContent = '✓ 已儲存';
      el('edit-coords').classList.add('show');
      setTimeout(() => el('edit-coords').classList.remove('show'), 2000);
    } else {
      alert('儲存失敗：' + resp.status);
    }
  } catch(e) {
    alert('儲存失敗：' + e.message);
  }
}

// ══════════════════════════════════════════════════════════════
// 據點專屬 Modal（L3 鑽探 — 頁籤：數據 / 事件 / 裁示）
// ══════════════════════════════════════════════════════════════
let _zoneModalTab = 'data';
let _zoneModalZone = null;

function showZoneDetail(zone) {
  if (!_data) return;
  _zoneModalZone = zone;
  _zoneModalTab = (zone.node_type === 'shelter' || zone.node_type === 'medical') ? 'data' : 'events';
  _renderZoneModal();
}

function _renderZoneModal() {
  const zone = _zoneModalZone;
  if (!zone || !_data) return;
  const calc = _data.calc || {};
  const nt = zone.node_type;
  const nodeData = nt ? calc[nt] : null;
  const freshLabel = nodeData?.freshness?.label || '—';
  const freshLvl = nodeData?.freshness?.level || 'lkp';
  const freshColor = freshLvl==='ok'?'var(--green)':freshLvl==='warn'?'var(--yellow)':freshLvl==='crit'?'var(--red)':'var(--text3)';

  // 頁籤 HTML
  const hasData = nt === 'shelter' || nt === 'medical';
  let tabsHtml = '<div style="display:flex;gap:2px;margin-bottom:12px;">';
  if (hasData) tabsHtml += _zoneTab('data', '📊 數據');
  tabsHtml += _zoneTab('events', '📋 事件');
  tabsHtml += _zoneTab('decisions', '⚖ 裁示');
  tabsHtml += '</div>';

  // 內容
  let body = '';
  if (_zoneModalTab === 'data' && hasData) {
    body = _zoneDataTab(zone);
  } else if (_zoneModalTab === 'events') {
    body = _zoneEventsTab(zone);
  } else if (_zoneModalTab === 'decisions') {
    body = _zoneDecisionsTab(zone);
  }

  const iconHtml = `<span style="display:inline-flex;vertical-align:middle;margin-right:4px;">${renderIcon(zone.icon)}</span>`;
  el('modal-title').innerHTML = `${iconHtml} ${zone.label} <span style="font-size:10px;color:${freshColor};margin-left:6px;">${freshLabel}</span>`;
  el('modal-body').innerHTML = tabsHtml + body;
  el('overlay').className = 'show';
}

function _zoneTab(key, label) {
  const active = _zoneModalTab === key;
  return `<button onclick="_zoneModalTab='${key}';_renderZoneModal()" style="padding:4px 12px;border-radius:4px;border:1px solid ${active?'var(--green)':'var(--border)'};background:${active?'rgba(26,158,82,.2)':'var(--surface2)'};color:${active?'#fff':'var(--text3)'};font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);">${label}</button>`;
}

function _zoneDataTab(zone) {
  const d = getApiSeries(_data);
  if (!d) return '<div style="color:var(--text3)">無快照資料</div>';
  const N = d.N;
  const idx = N - 1;
  const t = d.times[idx];
  const slc = v => v>=90?'var(--red)':v>=70?'var(--yellow)':'var(--green)';

  let html = `<div class="slice-time">最新快照 · ${t}</div>`;

  if (zone.node_type === 'shelter') {
    const sp = d.sPct[idx];
    html += '<div class="slice-card"><div class="slice-card-title">收容組</div>';
    html += `<div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px;">`;
    html += `<span style="font-size:28px;font-weight:800;">${d.sBu[idx]}</span>`;
    html += `<span style="font-size:12px;color:var(--text3)">/ ${d.sBt[idx]}人</span>`;
    html += `<span style="font-size:22px;font-weight:700;color:${slc(sp)};margin-left:auto">${sp}%</span></div>`;
    html += `<div class="slice-row" style="margin-top:6px"><span class="sk">待入站</span><span class="sv">${d.pendS[idx]}人</span></div>`;
    html += `<div class="slice-row"><span class="sk">人均服務量</span><span class="sv">${d.opsS[idx]?.toFixed?.(1)||d.opsS[idx]}</span></div>`;
    html += '</div>';
  } else if (zone.node_type === 'medical') {
    const mp = d.mPct[idx];
    const iv = d.ivPct[idx], ox = d.oxPct[idx], to = d.toPct[idx];
    const supBar = (label, pct) => {
      const c = pct<=20?'var(--red)':pct<=40?'var(--yellow)':'var(--green)';
      return `<div class="slice-row"><span class="sk">${label}</span><span class="sv" style="color:${c}">${pct}%</span></div><div class="slice-bar"><div class="slice-fill" style="width:${pct}%;background:${c}"></div></div>`;
    };
    html += '<div class="slice-card"><div class="slice-card-title">醫療組</div>';
    html += `<div style="display:flex;align-items:baseline;gap:6px;margin:4px 0 2px;">`;
    html += `<span style="font-size:28px;font-weight:800;">${d.mBu[idx]}</span>`;
    html += `<span style="font-size:12px;color:var(--text3)">/ ${d.mBt[idx]}床</span>`;
    html += `<span style="font-size:22px;font-weight:700;color:${slc(mp)};margin-left:auto">${mp}%</span></div>`;
    html += `<div class="slice-row" style="margin-top:6px"><span class="sk">待後送</span><span class="sv">${d.pendEvac[idx]}人</span></div>`;
    html += `<div class="slice-row"><span class="sk">人均服務量</span><span class="sv">${d.opsM[idx]?.toFixed?.(1)||d.opsM[idx]}</span></div>`;
    html += '</div>';
    html += '<div class="slice-card"><div class="slice-card-title">物資</div>';
    html += supBar('IV 輸液', iv) + supBar('氧氣瓶', ox) + supBar('止血帶', to);
    html += '</div>';
  }
  return html;
}

function _zoneEventsTab(zone) {
  const unit = zone.node_type || '';
  const allEvents = _data?.events || [];
  const filtered = unit ? allEvents.filter(e => e.reported_by_unit === unit) : allEvents;
  const open = filtered.filter(e => e.status !== 'resolved' && e.status !== 'closed');
  const closed = filtered.filter(e => e.status === 'resolved' || e.status === 'closed');

  let html = `<div style="margin-bottom:8px;display:flex;gap:6px;">`;
  html += `<button onclick="openEventForm('${unit}','${zone.label}','${zone.id}')" style="padding:4px 12px;background:var(--green);color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);">📝 新增事件</button>`;
  html += `</div>`;

  if (filtered.length === 0) {
    html += '<div style="color:var(--text3);font-size:11px;">無事件記錄</div>';
    return html;
  }

  // 未結案事件（可操作）
  if (open.length > 0) {
    html += `<div style="font-size:10px;color:var(--text3);margin-bottom:4px;">🔴 開放中 (${open.length})</div>`;
    open.forEach(ev => { html += _eventCardHTML(ev, false); });
  }
  // 已結案（摺疊）
  if (closed.length > 0) {
    html += `<div style="font-size:10px;color:var(--text3);margin:8px 0 4px;">✅ 已結案 (${closed.length})</div>`;
    closed.forEach(ev => { html += _eventCardHTML(ev, true); });
  }
  return html;
}

function _eventCardHTML(ev, dimmed) {
  const sevC = ev.severity==='critical'?'var(--red)':ev.severity==='warning'?'var(--yellow)':'var(--text3)';
  const statusLabel = {open:'未結',in_progress:'處理中',resolved:'已結案',closed:'已關閉'}[ev.status]||ev.status;
  const statusC = (ev.status==='resolved'||ev.status==='closed')?'var(--green)':'var(--yellow)';
  const notes = _parseNotes(ev.notes);
  const isOpen = ev.status === 'open' || ev.status === 'in_progress';

  let html = `<div style="padding:8px 10px;margin-bottom:6px;background:var(--surface2);border-radius:5px;border-left:3px solid ${sevC};${dimmed?'opacity:.5;':''}">`;
  // 標題列
  html += `<div style="display:flex;justify-content:space-between;align-items:center;">`;
  html += `<span style="font-size:12px;font-weight:700;">${ev.event_type}</span>`;
  html += `<span style="font-size:10px;color:${statusC};font-weight:600;">${statusLabel}</span>`;
  html += `</div>`;
  // 描述
  html += `<div style="font-size:11px;color:var(--text2);margin-top:3px;">${ev.description}</div>`;
  html += `<div style="font-size:10px;color:var(--text3);margin-top:3px;">回報：${ev.operator_name}　${_decisionAge(ev.occurred_at||ev.created_at)}</div>`;

  // 處置紀錄（對齊 shelter PWA）
  if (notes.length > 0) {
    html += `<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:4px;">`;
    html += `<div style="font-size:9px;color:var(--text3);margin-bottom:2px;">處置紀錄</div>`;
    notes.forEach(n => {
      html += `<div style="font-size:10px;padding:2px 0;border-bottom:1px solid rgba(48,54,61,.3);">`;
      html += `<span style="color:var(--text3);">${(n.time||'').slice(11,16)}</span>`;
      html += n.by ? ` <span style="color:var(--green);font-weight:600;">${n.by}</span>` : '';
      html += ` — ${n.text}`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  // 操作區（未結案）
  if (isOpen) {
    html += `<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px;">`;
    // 追加紀錄
    html += `<div style="display:flex;gap:4px;margin-bottom:4px;">`;
    html += `<input id="ev-note-${ev.id}" placeholder="追加處置紀錄..." style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:3px;font-size:10px;font-family:var(--mono);">`;
    html += `<button onclick="_addEventNote('${ev.id}')" style="padding:4px 8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:3px;font-size:10px;cursor:pointer;font-family:var(--mono);">追加</button>`;
    html += `</div>`;
    // 狀態按鈕
    html += `<div style="display:flex;gap:4px;">`;
    if (ev.status === 'open') {
      html += `<button onclick="_updateEvAndRefresh('${ev.id}','in_progress')" style="flex:1;padding:4px;background:var(--yellow);color:#fff;border:none;border-radius:3px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--mono);">處理中</button>`;
    }
    const hasNotes = notes.length > 0;
    if (hasNotes) {
      html += `<button onclick="_updateEvAndRefresh('${ev.id}','resolved')" style="flex:1;padding:4px;background:var(--green);color:#fff;border:none;border-radius:3px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--mono);">結案</button>`;
    } else {
      html += `<button disabled style="flex:1;padding:4px;background:var(--border);color:var(--text3);border:none;border-radius:3px;font-size:10px;cursor:not-allowed;font-family:var(--mono);" title="請先追加處置紀錄">結案</button>`;
    }
    html += `</div>`;
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function _parseNotes(notesField) {
  if (!notesField) return [];
  if (Array.isArray(notesField)) return notesField;
  try { return JSON.parse(notesField); } catch { return []; }
}

async function _addEventNote(eventId) {
  const input = document.getElementById('ev-note-' + eventId);
  const text = input?.value?.trim();
  if (!text) { input?.focus(); return; }
  try {
    const resp = await fetch(API_BASE + '/api/events/' + eventId + '/notes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text, operator: '指揮部' })
    });
    if (resp.ok) { await poll(); _renderZoneModal(); }
    else alert('追加失敗：' + resp.status);
  } catch(e) { alert('追加失敗：' + e.message); }
}

async function _updateEvAndRefresh(eventId, status) {
  try {
    const resp = await fetch(API_BASE + '/api/events/' + eventId + '/status?status=' + status + '&operator=指揮部', {
      method: 'PATCH',
    });
    if (resp.ok) { await poll(); _renderZoneModal(); }
  } catch(e) { alert('更新失敗：' + e.message); }
}

function _zoneDecisionsTab(zone) {
  const unit = zone.node_type || '';
  const chains = _data?.decisions?.chains || {};
  const allDecs = _data?.decisions?.pending?.concat(_data?.decisions?.decided || []) || [];
  // 篩選與此組相關的 decisions（透過 primary_event_id 關聯的 event 的 reported_by_unit）
  const events = _data?.events || [];
  const unitEventIds = new Set(events.filter(e => e.reported_by_unit === unit).map(e => e.id));
  const filtered = allDecs.filter(d => d.primary_event_id && unitEventIds.has(d.primary_event_id));

  if (filtered.length === 0 && !unit) {
    // 非組別據點，顯示全部
    return _renderDecisionList(allDecs.slice(0, 10));
  }

  if (filtered.length === 0) {
    return '<div style="color:var(--text3);font-size:11px;">無相關裁示事項</div>';
  }

  return _renderDecisionList(filtered);
}

function _renderDecisionList(decs) {
  let html = '';
  decs.forEach(dec => {
    const age = _decisionAge(dec.created_at);
    const sevC = dec.severity==='critical'?'var(--red)':'var(--yellow)';
    const statusLabel = dec.status==='pending'?'待裁示':'已裁示：'+dec.status;
    html += `<div style="padding:6px 8px;margin-bottom:4px;background:var(--surface2);border-radius:5px;border-left:3px solid ${sevC};cursor:pointer;" onclick="showDecisionModal('${dec.id}')">`;
    html += `<div style="display:flex;justify-content:space-between;">`;
    html += `<span style="font-size:11px;font-weight:700;">${_truncate(dec.decision_title, 30)}</span>`;
    html += `<span style="font-size:9px;color:var(--text3);">${statusLabel}</span>`;
    html += `</div>`;
    html += `<div style="font-size:9px;color:var(--text3);margin-top:2px;">${dec.decision_type} · ${age}</div>`;
    html += `</div>`;
  });
  return html;
}

function _decisionAge(createdAt) {
  if (!createdAt) return '';
  const ts = createdAt.endsWith('Z') ? createdAt : createdAt + 'Z';
  const diff = (Date.now() - new Date(ts).getTime()) / 60000;
  if (diff < 1) return '<1m';
  if (diff < 60) return Math.floor(diff) + 'm';
  return Math.floor(diff/60) + 'h' + Math.floor(diff%60) + 'm';
}

function _truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '\u2026' : (s || ''); }

function showDecisionModal(decId) {
  const decisions = (_data?.decisions?.pending || []).concat(_data?.decisions?.decided || []);
  const dec = decisions.find(d => d.id === decId);
  if (!dec) return;
  _currentDecisionId = decId;

  const age = _decisionAge(dec.created_at);
  const sevColor = dec.severity === 'critical' ? 'var(--red)' : 'var(--yellow)';

  let html = `<div style="margin-bottom:12px;">`;
  html += `<span style="display:inline-block;padding:2px 8px;border-radius:3px;background:${sevColor}33;color:${sevColor};font-size:10px;font-weight:700;">${dec.severity}</span>`;
  html += `<span style="font-size:10px;color:var(--text3);margin-left:8px;">${dec.decision_type} \u00b7 ${age}</span>`;
  html += `</div>`;
  html += `<div style="font-size:14px;font-weight:700;margin-bottom:8px;">${dec.decision_title}</div>`;
  html += `<div style="font-size:11px;color:var(--text2);margin-bottom:12px;">${dec.impact_description}</div>`;

  html += `<div class="slice-card" style="margin-bottom:8px;">`;
  html += `<div class="slice-card-title">建議動作 A</div>`;
  html += `<div style="font-size:12px;">${dec.suggested_action_a}</div>`;
  html += `</div>`;
  if (dec.suggested_action_b) {
    html += `<div class="slice-card" style="margin-bottom:8px;">`;
    html += `<div class="slice-card-title">建議動作 B</div>`;
    html += `<div style="font-size:12px;">${dec.suggested_action_b}</div>`;
    html += `</div>`;
  }

  if (dec.status === 'pending') {
    html += `<div style="margin-top:12px;">`;
    html += `<label style="font-size:10px;color:var(--text3);">裁示備註</label>`;
    html += `<input id="dec-note" placeholder="（選填）" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);margin:4px 0 8px;">`;
    html += `<div style="display:flex;gap:6px;">`;
    html += `<button onclick="submitDecision('approved')" style="flex:1;padding:8px;background:var(--green);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--mono);">\u2713 核可</button>`;
    html += `<button onclick="submitDecision('hold')" style="flex:1;padding:8px;background:var(--yellow);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--mono);">\u23f8 保留</button>`;
    html += `<button onclick="submitDecision('redirect')" style="flex:1;padding:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--mono);">\u2197 轉交</button>`;
    html += `</div>`;
    html += `<div style="display:flex;gap:6px;margin-top:6px;">`;
    html += `<button onclick="escalateDecision('${dec.id}')" style="flex:1;padding:6px;background:var(--red);color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--mono);">\u2b06 升級</button>`;
    html += `<button onclick="closeDecision('${dec.id}')" style="flex:1;padding:6px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--mono);">\u2713 結案</button>`;
    html += `</div></div>`;
  } else {
    html += `<div style="margin-top:12px;font-size:11px;color:var(--text2);">已裁示：${dec.status} by ${dec.decided_by || '\u2014'}</div>`;
  }

  el('modal-title').textContent = '\u2696 裁示事項';
  el('modal-body').innerHTML = html;
  el('overlay').className = 'show';
}

async function submitDecision(action) {
  if (!_currentDecisionId) return;
  const note = document.getElementById('dec-note')?.value || '';
  try {
    const resp = await fetch(API_BASE + '/api/decisions/' + _currentDecisionId + '/decide', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action, decided_by: '指揮官', execution_note: note })
    });
    if (resp.ok) {
      closeModal();
      _currentDecisionId = null;
      poll();
    } else {
      const err = await resp.json().catch(() => ({}));
      alert('裁示失敗：' + (err.detail || resp.status));
    }
  } catch(e) {
    alert('裁示失敗：' + e.message);
  }
}

async function escalateDecision(decId) {
  const decisions = _data?.decisions?.pending || [];
  const dec = decisions.find(d => d.id === decId);
  if (!dec) return;
  try {
    const resp = await fetch(API_BASE + '/api/decisions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        decision_type: 'escalation',
        severity: 'critical',
        decision_title: dec.decision_title,
        impact_description: dec.impact_description + '（升級）',
        suggested_action_a: dec.suggested_action_a,
        created_by: '指揮官',
        parent_decision_id: decId,
        primary_event_id: dec.primary_event_id,
      })
    });
    if (resp.ok) { closeModal(); poll(); }
  } catch(e) { alert('升級失敗：' + e.message); }
}

async function closeDecision(decId) {
  try {
    const resp = await fetch(API_BASE + '/api/decisions/' + decId + '/decide', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'completed', decided_by: '指揮官', execution_note: '結案' })

  } catch(e) { alert('結案失敗：' + e.message); }
}

function getApiSeries(data) {
  const sh = data.shelter_history || [];
  const mh = data.medical_history || [];
  if (sh.length < 1 && mh.length < 1) return null;
  const N = Math.max(sh.length, mh.length);
  const pad = (arr, n) => { while(arr.length < n) arr.unshift(arr[0]||{}); return arr.slice(-n); };
  const s = pad([...sh].reverse(), N);
  const m = pad([...mh].reverse(), N);
  const ex = (snap) => (typeof snap.extra === 'string' ? JSON.parse(snap.extra) : snap.extra) || {};
  const times = s.map(snap => (snap.snapshot_time||snap.t||'').slice(11,16) || '?');

  return {
    times, N,
    sPct: s.map(snap => snap.bed_total ? Math.round((snap.bed_used||0)/snap.bed_total*100) : 0),
    mPct: m.map(snap => snap.bed_total ? Math.round((snap.bed_used||0)/snap.bed_total*100) : 0),
    sBu: s.map(snap => snap.bed_used||0), sBt: s.map(snap => snap.bed_total||0),
    mBu: m.map(snap => snap.bed_used||0), mBt: m.map(snap => snap.bed_total||0),
    srcA: m.map(snap => ex(snap).src_a || 0),
    srcB: m.map(snap => ex(snap).src_b || 0),
    srcC: m.map(snap => ex(snap).src_c || 0),
    srtR: s.map(snap => { const srt = snap.srt || ex(snap).srt || {}; return srt.red || 0; }),
    srtY: s.map(snap => { const srt = snap.srt || ex(snap).srt || {}; return srt.yellow || 0; }),
    srtG: s.map(snap => { const srt = snap.srt || ex(snap).srt || {}; return srt.green || 0; }),
    medCR: m.map(snap => (snap.casualties_red ?? (snap.casualties||{}).red) || 0),
    medCY: m.map(snap => (snap.casualties_yellow ?? (snap.casualties||{}).yellow) || 0),
    medCG: m.map(snap => (snap.casualties_green ?? (snap.casualties||{}).green) || 0),
    medCB: m.map(snap => (snap.casualties_black ?? (snap.casualties||{}).black) || 0),
    pendS: s.map(snap => snap.pending_intake || 0),
    pendEvac: m.map(snap => snap.pending_evac || 0),
    incHigh: s.map((snap,i) => (ex(snap).incident_pressure?.high||0) + (ex(m[i]).incident_pressure?.high||0)),
    incMed:  s.map((snap,i) => (ex(snap).incident_pressure?.medium||0) + (ex(m[i]).incident_pressure?.medium||0)),
    incLow:  s.map((snap,i) => (ex(snap).incident_pressure?.low||0) + (ex(m[i]).incident_pressure?.low||0)),
    incOpen: s.map((snap,i) => (ex(snap).incident_pressure?.open_total||0) + (ex(m[i]).incident_pressure?.open_total||0)),
    incRes:  s.map((snap,i) => (ex(snap).incident_pressure?.resolved_30min||0) + (ex(m[i]).incident_pressure?.resolved_30min||0)),
    opsS: s.map(snap => ex(snap).staff_ratio || 0),
    opsM: m.map(snap => ex(snap).staff_ratio || 0),
    ivPct:  m.map(snap => { const sup=ex(snap).supplies||{}, mx=ex(snap).supplies_max||{}; return mx.iv ? Math.round((sup.iv||0)/mx.iv*100) : 100; }),
    oxPct:  m.map(snap => { const sup=ex(snap).supplies||{}, mx=ex(snap).supplies_max||{}; return mx.oxygen ? Math.round((sup.oxygen||0)/mx.oxygen*100) : 100; }),
    toPct:  m.map(snap => { const sup=ex(snap).supplies||{}, mx=ex(snap).supplies_max||{}; return mx.tourniquet ? Math.round((sup.tourniquet||0)/mx.tourniquet*100) : 100; }),
    rawS: s, rawM: m,
    rawIncS: s.map(snap => { const ip=ex(snap).incident_pressure||{}; return {h:ip.high||0,m:ip.medium||0,l:ip.low||0,open:ip.open_total||0,res:ip.resolved_30min||0}; }),
    rawIncM: m.map(snap => { const ip=ex(snap).incident_pressure||{}; return {h:ip.high||0,m:ip.medium||0,l:ip.low||0,open:ip.open_total||0,res:ip.resolved_30min||0}; }),
  };
}

function getSeries() {
  if (!_data) return null;
  const full = getApiSeries(_data);
  if (!full) return null;
  const total = full.N;
  if (total <= VIEW_SIZE) { _viewEnd = -1; return full; }
  const end = _viewEnd < 0 ? total : Math.min(_viewEnd, total);
  const start = Math.max(0, end - VIEW_SIZE);
  return sliceSeries(full, start, end);
}

function sliceSeries(d, s, e) {
  const sl = arr => (arr||[]).slice(s, e);
  return {
    ...d, N: e - s, _totalN: d.N, _start: s, _end: e,
    times: sl(d.times),
    sPct: sl(d.sPct), mPct: sl(d.mPct),
    sBu: sl(d.sBu), sBt: sl(d.sBt), mBu: sl(d.mBu), mBt: sl(d.mBt),
    srcA: sl(d.srcA), srcB: sl(d.srcB), srcC: sl(d.srcC),
    srtR: sl(d.srtR), srtY: sl(d.srtY), srtG: sl(d.srtG),
    medCR: sl(d.medCR), medCY: sl(d.medCY), medCG: sl(d.medCG), medCB: sl(d.medCB),
    pendS: sl(d.pendS), pendEvac: sl(d.pendEvac),
    incHigh: sl(d.incHigh), incMed: sl(d.incMed), incLow: sl(d.incLow),
    incOpen: sl(d.incOpen), incRes: sl(d.incRes),
    opsS: sl(d.opsS), opsM: sl(d.opsM),
    ivPct: sl(d.ivPct), oxPct: sl(d.oxPct), toPct: sl(d.toPct),
    rawS: sl(d.rawS), rawM: sl(d.rawM),
    rawIncS: sl(d.rawIncS), rawIncM: sl(d.rawIncM),
  };
}

function slope(arr) {
  const n = arr.length;
  if (n < 4) return 0;
  return ((arr[n-1]+arr[n-2]+arr[n-3])/3) - ((arr[0]+arr[1]+arr[2])/3);
}
function rate(arr) {
  const n = arr.length;
  if (n < 2) return 0;
  return (arr[n-1]-arr[0])/(n-1);
}
function minsUntil(current, threshold, ratePerSnap, snapMins) {
  if (ratePerSnap <= 0) return null;
  const remaining = threshold - current;
  if (remaining <= 0) return 0;
  return Math.round((remaining / ratePerSnap) * snapMins);
}
function ipiCalc(h, m) { return h * 3 + m; }
