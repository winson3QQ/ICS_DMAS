<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ICS 幕僚儀表板 v6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root {
  --bg:#eef1f6; --surface:#fff; --surface2:#f4f6fa; --border:#d8e0ec;
  --green:#1a9e52; --green-bg:#eaf7f0; --green-b:#a8dfc0;
  --yellow:#d49000; --yellow-bg:#fff8e0; --yellow-b:#f0d080;
  --red:#cc2a2a; --red-bg:#fdeaea; --red-b:#f0a0a0;
  --blue:#2060b0; --blue-bg:#e8f0fc; --blue-b:#90b8e8;
  --text:#1a2535; --text-dim:#7a8ba0; --text-mid:#4a5a70;
  --mono:'IBM Plex Mono',monospace; --sans:'Noto Sans TC',sans-serif;
  --topbar-h:44px; --summary-h:72px; --constraint-h:36px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}

/* ── TOPBAR ── */
.topbar{height:var(--topbar-h);background:#1a2535;display:flex;align-items:center;padding:0 14px;gap:10px;}
.tb-logo{font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;letter-spacing:.1em;}
.tb-ver{font-family:var(--mono);font-size:9px;color:#4a6080;padding:2px 6px;border:1px solid #2d4060;border-radius:2px;}
.tb-mid{flex:1;display:flex;justify-content:center;gap:8px;}
.sp{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.sp .dot{width:7px;height:7px;border-radius:50%;}
.sp-r{background:#3a1212;color:#ff6b6b;} .sp-r .dot{background:#ff3d3d;animation:blink 1s infinite;box-shadow:0 0 5px #ff3d3d;}
.sp-y{background:#3a2e00;color:#ffc600;} .sp-y .dot{background:#ffc600;animation:blink 1.5s infinite;}
.sp-g{background:#0d2e1a;color:#00d466;} .sp-g .dot{background:#00d466;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.tb-clock{font-family:var(--mono);font-size:18px;font-weight:700;color:#fff;}
.tb-conn{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;}
.tb-conn .dot{width:7px;height:7px;border-radius:50%;background:#4a6080;}
.tb-conn.ok .dot{background:#00d466;box-shadow:0 0 4px #00d466;}
.tb-conn.err .dot{background:#ff4444;}
.tb-conn.ok span{color:#00d466;}
.tb-conn.err span{color:#ff4444;}
/* Offline banner */
.offline-banner{display:none;background:#c98000;color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;
  text-align:center;padding:4px;letter-spacing:.05em;}
.offline-banner.show{display:block;}

/* ── SUMMARY BAR ── */
.summary-bar{height:var(--summary-h);background:#1e2d42;border-bottom:2px solid #2a3f5a;display:flex;align-items:stretch;}
.sb-main{flex:1;padding:8px 16px;display:flex;flex-direction:column;justify-content:center;gap:3px;border-right:1px solid #2a3f5a;}
.sb-headline{font-size:14px;font-weight:700;color:#e8f0fc;line-height:1.3;letter-spacing:.02em;}
.sb-focus-row{display:flex;gap:14px;overflow:hidden;}
.sb-focus-item{font-size:10px;color:#6a8aaa;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.sb-focus-item .num{color:#ffc600;font-family:var(--mono);font-weight:700;}
.sb-focus-item .crit{color:#ff6b6b;}
.sb-metrics{display:flex;align-items:stretch;flex-shrink:0;}
.sbm{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 16px;gap:2px;border-right:1px solid #2a3f5a;cursor:default;min-width:80px;}
.sbm:last-child{border-right:none;}
.sbm .label{font-family:var(--mono);font-size:8px;color:#4a6080;letter-spacing:.1em;text-transform:uppercase;}
.sbm .val{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;}
.sbm .sub{font-family:var(--mono);font-size:9px;}
.sbm.alert .val{color:#ff6b6b;animation:blink 1s infinite;}
.sbm.warn .val{color:#ffc600;}
.sbm.dim .val{color:#4a6080;font-size:13px;}

/* ── CONSTRAINT BAR ── */
.constraint-bar{height:var(--constraint-h);background:#232f42;border-bottom:1px solid #2a3f5a;display:flex;align-items:stretch;}
.cst{flex:1;display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid #2a3f5a;cursor:pointer;transition:background .1s;min-width:0;}
.cst:last-child{border-right:none;}
.cst:hover{background:#2d3f58;}
.cst-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cst-dot.ok{background:var(--green);}
.cst-dot.warn{background:var(--yellow);animation:blink 1.5s infinite;}
.cst-dot.crit{background:var(--red);animation:blink 1s infinite;box-shadow:0 0 4px var(--red);}
.cst-dot.lkp{background:#7a8ba0;}
.cst-label{font-family:var(--mono);font-size:10px;font-weight:700;color:#9ab0c8;white-space:nowrap;}
.cst-val{font-family:var(--mono);font-size:10px;color:#6a8aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cst-val .hi{color:#ff6b6b;} .cst-val .mid{color:#ffc600;}

/* ── CONTENT ── */
.content{height:calc(100vh - var(--topbar-h) - var(--summary-h) - var(--constraint-h));
  display:grid;grid-template-columns:168px 1fr 232px;gap:7px;padding:7px;overflow:hidden;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.col-side{display:flex;flex-direction:column;gap:7px;min-height:0;overflow:hidden;}
.panel.half{flex:1;min-height:0;overflow:hidden;}

/* Panel header */
.ph{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;
  background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;gap:6px;}
.ph-left{display:flex;align-items:center;gap:6px;min-width:0;}
.ph-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);white-space:nowrap;}
.ph-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ph-meta{font-family:var(--mono);font-size:9px;color:var(--text-dim);}
.fresh{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.fresh.ok{background:var(--green);}
.fresh.warn{background:var(--yellow);animation:blink 1.5s infinite;}
.fresh.crit{background:var(--red);animation:blink 1s infinite;}
.fresh.lkp{background:#7a8ba0;}
.fresh-text{font-family:var(--mono);font-size:8px;color:var(--text-dim);white-space:nowrap;}
.pb{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px;min-height:0;}
.pb::-webkit-scrollbar{width:3px;}
.pb::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.exp-btn{width:20px;height:20px;border-radius:3px;border:1px solid var(--border);background:var(--bg);
  cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);flex-shrink:0;transition:all .12s;}
.exp-btn:hover{background:var(--text);color:#fff;border-color:var(--text);}

/* Compact blocks */
.cblock{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:5px 8px;margin-bottom:5px;}
.cblock:last-child{margin-bottom:0;}
.cl{font-family:var(--mono);font-size:8px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;}
.cratio{display:flex;align-items:flex-end;gap:1px;line-height:1;font-family:var(--mono);}
.cratio .now{font-size:24px;font-weight:700;}
.cratio .sl{font-size:18px;color:var(--border);margin:0 1px;}
.cratio .mx{font-size:14px;color:var(--text-dim);align-self:flex-end;}
.cratio .u{font-size:9px;color:var(--text-dim);align-self:flex-end;margin-left:2px;margin-bottom:2px;}
.trend{font-family:var(--mono);font-size:9px;margin-top:1px;}
.trend.up{color:var(--red);} .trend.dn{color:var(--green);} .trend.flat{color:var(--text-dim);}
.cap{height:3px;background:var(--bg);border-radius:2px;overflow:visible;margin:3px 0 0;position:relative;}
.cap-f{height:100%;border-radius:2px;transition:width .4s;}
.cap-f.ok{background:var(--green);} .cap-f.warn{background:var(--yellow);} .cap-f.crit{background:var(--red);}
.cap-tick{position:absolute;top:-1px;width:2px;height:5px;background:rgba(0,0,0,.4);border-radius:1px;}
.pill-row{display:flex;gap:3px;margin-top:3px;}
.pill{flex:1;display:flex;flex-direction:column;align-items:center;padding:3px 2px;border-radius:4px;border:1px solid;}
.pill span{font-size:8px;} .pill b{font-family:var(--mono);font-size:14px;line-height:1.1;}
.pill.r{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.pill.y{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow);}
.pill.g{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.pill.k{background:var(--bg);border-color:var(--border);color:var(--text-dim);}
.kv-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-top:3px;}
.kv-row .v{font-family:var(--mono);font-weight:700;}
.kv-row .v.warn{color:var(--yellow);} .kv-row .v.crit{color:var(--red);} .kv-row .v.ok{color:var(--green);}
.sup-row{display:flex;flex-direction:column;gap:2px;margin-top:2px;}
.sup-item{display:flex;align-items:center;justify-content:space-between;font-size:9px;}
.sup-item .sn{color:var(--text-dim);}
.sup-item .sv{font-family:var(--mono);font-weight:700;}
.sup-item .sv.crit{color:var(--red);} .sup-item .sv.warn{color:var(--yellow);}
.stale{font-family:var(--mono);font-size:8px;color:var(--yellow);background:var(--yellow-bg);
  border:1px solid var(--yellow-b);border-radius:3px;padding:2px 5px;margin-top:4px;}
.stale.lkp{color:#7a8ba0;background:#f0f2f5;border-color:var(--border);}
.no-data{font-family:var(--mono);font-size:10px;color:var(--text-dim);padding:12px 0;text-align:center;}

/* Forward unit card */
.fwd-unit{border-radius:5px;padding:6px 8px;margin-bottom:5px;cursor:pointer;transition:opacity .1s;}
.fwd-unit:hover{opacity:.85;}
.fwd-unit.crit{background:var(--red-bg);border:1px solid var(--red);}
.fwd-unit.warn{background:var(--yellow-bg);border:1px solid var(--yellow);}
.fwd-unit.ok{background:var(--bg);border:1px solid var(--border);}
.fwd-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.fwd-name{font-family:var(--mono);font-size:11px;font-weight:700;}

/* Center column */
.col-center{display:flex;flex-direction:column;min-height:0;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.map-head{background:var(--surface2);border-bottom:1px solid var(--border);padding:6px 11px 5px;flex-shrink:0;}
.map-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.map-filters{display:flex;gap:5px;}
.fb{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;
  border:1px solid var(--border);background:var(--bg);color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;gap:4px;transition:all .12s;}
.fb.on{background:var(--text);color:#fff;border-color:var(--text);}
.fb .dot{width:5px;height:5px;border-radius:50%;}
.map-area{flex:1;position:relative;background:#dce8f2;min-height:220px;overflow:hidden;}
#msvg{width:100%;height:100%;display:block;}
.map-note{position:absolute;bottom:8px;left:8px;background:rgba(255,255,255,.88);
  border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:10px;color:var(--red);
  line-height:1.5;max-width:200px;}

/* Event strip */
.ev-strip{border-top:2px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;max-height:175px;}
.ev-strip-head{display:flex;align-items:center;justify-content:space-between;
  padding:5px 11px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.ev-counts{display:flex;gap:10px;font-family:var(--mono);font-size:11px;}
.ev-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.ev-tbl th{font-family:var(--mono);font-size:9px;color:var(--text-dim);text-align:left;
  padding:0 7px 4px;border-bottom:1px solid var(--border);font-weight:400;}
.ev-tbl td{padding:5px 7px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ev-tbl tr:last-child td{border-bottom:none;}
.ev-tbl tr{cursor:pointer;transition:background .1s;}
.ev-tbl tr:hover td{background:var(--bg);}
.ev-tbl-wrap{overflow-y:auto;flex:1;}
.ev-tbl-wrap::-webkit-scrollbar{width:3px;}
.ev-tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);}

/* Tags */
.tag{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;white-space:nowrap;}
.tag-r{background:var(--red-bg);color:var(--red);}
.tag-y{background:var(--yellow-bg);color:var(--yellow);}
.tag-g{background:var(--green-bg);color:var(--green);}
.tag-b{background:var(--blue-bg);color:var(--blue);}
.tag-dim{background:var(--bg);color:var(--text-dim);border:1px solid var(--border);}
.el{font-family:var(--mono);font-size:10px;white-space:nowrap;}
.el-ov{color:var(--red);font-weight:700;} .el-wn{color:var(--yellow);} .el-ok{color:var(--text-dim);}
.ok{color:var(--green);} .warn{color:var(--yellow);} .crit{color:var(--red);}

/* Right column - decisions */
.col-right{display:flex;flex-direction:column;gap:7px;min-height:0;overflow:hidden;}
.dec-panel{flex:1;min-height:0;overflow:hidden;}
.dec-scroll{overflow-y:auto;padding:7px 10px;height:100%;}
.dec-scroll::-webkit-scrollbar{width:3px;}
.dec-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.dcard{border-radius:6px;padding:8px 10px;margin-bottom:6px;border:1px solid;}
.dcard.critical{background:var(--red-bg);border-color:var(--red-b);}
.dcard.warning{background:var(--yellow-bg);border-color:var(--yellow-b);}
.dcard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.dcard-title{font-size:12px;font-weight:700;line-height:1.3;flex:1;padding-right:6px;}
.dcard-seq{font-family:var(--mono);font-size:9px;color:var(--text-dim);white-space:nowrap;}
.dcard-impact{font-size:10px;color:var(--text-mid);line-height:1.4;margin-bottom:6px;}
.dcard-actions{margin-bottom:6px;}
.dcard-action{font-size:10px;color:var(--text-mid);display:flex;align-items:flex-start;gap:4px;margin-bottom:2px;line-height:1.4;}
.dcard-action .alabel{font-family:var(--mono);font-size:9px;color:var(--text-dim);flex-shrink:0;padding-top:1px;}
.dcard-btns{display:flex;gap:5px;flex-wrap:wrap;}
.dbtn{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;
  border:1px solid;cursor:pointer;transition:all .12s;white-space:nowrap;}
.dbtn.approve{background:var(--green-bg);color:var(--green);border-color:var(--green-b);}
.dbtn.approve:hover{background:var(--green);color:#fff;}
.dbtn.hold{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow-b);}
.dbtn.hold:hover{background:var(--yellow);color:#fff;}
.dbtn.redirect{background:var(--bg);color:var(--text-dim);border-color:var(--border);}
.dbtn.redirect:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.dbtn:disabled{opacity:.4;cursor:not-allowed;}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(10,20,40,.52);z-index:500;align-items:center;justify-content:center;padding:20px;}
.mbg.open{display:flex;}
.mc{background:var(--surface);border:1px solid #b0bdd0;border-radius:10px;
  width:560px;max-width:94vw;max-height:82vh;overflow-y:auto;box-shadow:0 16px 50px rgba(0,0,0,.25);}
.mh{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;
  border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.mh-t{font-size:14px;font-weight:700;}
.mclose{width:27px;height:27px;border-radius:50%;border:1px solid var(--border);background:var(--bg);
  cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);}
.mb{padding:14px 16px;}
.mf{margin-bottom:10px;}
.mf .ml{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.08em;margin-bottom:2px;}
.mf .mv{font-size:12px;line-height:1.6;}
.mr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sec{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase;margin:10px 0 6px;}
</style>
</head>
<body>

<div class="offline-banner" id="offline-banner">⚡ 後端連線中斷　顯示最後已知資料　計算停止</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-logo">ICS 指揮部</div>
  <div class="tb-ver">幕僚版 v6</div>
  <div class="tb-mid" id="status-pills">
    <!-- 由 JS 動態填入 -->
    <div style="font-family:var(--mono);font-size:10px;color:#4a6080">資料載入中...</div>
  </div>
  <div class="tb-conn" id="conn-status">
    <div class="dot"></div>
    <span>連線中</span>
  </div>
  <div class="tb-clock" id="clock">--:--:--</div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar">
  <div class="sb-main">
    <div class="sb-headline" id="sb-headline">載入中...</div>
    <div class="sb-focus-row" id="sb-focus-row"></div>
  </div>
  <div class="sb-metrics">
    <div class="sbm alert" id="sbm-countdown">
      <div class="label">醫療警戒倒數</div>
      <div class="val" id="countdown-val">—</div>
      <div class="sub" id="countdown-sub" style="color:#ff6b6b">分鐘</div>
    </div>
    <div class="sbm alert" id="sbm-pending">
      <div class="label">待裁示件數</div>
      <div class="val" id="pending-val">—</div>
      <div class="sub" style="color:#ff6b6b">件</div>
    </div>
    <div class="sbm warn" id="sbm-lowconf">
      <div class="label">信心度低預測</div>
      <div class="val" id="lowconf-val">—</div>
      <div class="sub" style="color:#ffc600">項</div>
    </div>
    <div class="sbm dim">
      <div class="label">最後更新</div>
      <div class="val" id="last-update-val" style="font-size:12px">—</div>
      <div class="sub" id="last-update-sub">—</div>
    </div>
  </div>
</div>

<!-- CONSTRAINT BAR -->
<div class="constraint-bar">
  <div class="cst" id="cst-security" onclick="showConstraintDetail('security')">
    <div class="cst-dot ok" id="cst-dot-security"></div>
    <div class="cst-label">安全</div>
    <div class="cst-val" id="cst-val-security">載入中</div>
  </div>
  <div class="cst" id="cst-comms" onclick="showConstraintDetail('comms')">
    <div class="cst-dot ok" id="cst-dot-comms"></div>
    <div class="cst-label">通聯</div>
    <div class="cst-val" id="cst-val-comms">載入中</div>
  </div>
  <div class="cst" id="cst-supply" onclick="showConstraintDetail('supply')">
    <div class="cst-dot ok" id="cst-dot-supply"></div>
    <div class="cst-label">補給</div>
    <div class="cst-val" id="cst-val-supply">載入中</div>
  </div>
  <div class="cst" id="cst-mobility" onclick="showConstraintDetail('mobility')">
    <div class="cst-dot ok" id="cst-dot-mobility"></div>
    <div class="cst-label">機動預備</div>
    <div class="cst-val" id="cst-val-mobility">載入中</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- LEFT: 收容組 + 醫療組 -->
  <div class="col-side">

    <!-- 收容組 -->
    <div class="panel half">
      <div class="ph">
        <div class="ph-left">
          <div class="fresh lkp" id="fresh-shelter"></div>
          <div class="ph-title">收容組</div>
        </div>
        <div class="ph-right">
          <div class="fresh-text" id="fresh-shelter-label">—</div>
          <div class="exp-btn" onclick="openModal('shelter')" title="展開">⤢</div>
        </div>
      </div>
      <div class="pb" id="panel-shelter">
        <div class="no-data">等待資料...</div>
      </div>
    </div>

          <div class="fresh lkp" id="fresh-forward"></div>

          <div class="fresh-text" id="fresh-forward-label">—</div>
          <div class="exp-btn" onclick="openModal('forward')" title="展開">⤢</div>

        <div class="ph-right">

        </div>

<!-- MODAL -->
<div class="mbg" id="mbg" onclick="if(event.target===this)cmc()">
  <div class="mc">
    <div class="mh">
      <div class="mh-t" id="mt">詳情</div>
      <div class="mclose" onclick="cmc()">✕</div>
    </div>
    <div class="mb" id="mb"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
// 設定
// ──────────────────────────────────────────
const SERVER_URL = localStorage.getItem('ics_server_url') || 'http://localhost:8000';
const POLL_MS    = 10000;   // 10 秒 polling
let lastData     = null;    // 最後一次成功的資料
let isConnected  = false;

// ── 時鐘 ──
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('zh-TW', { hour12: false });
}, 1000);

// ──────────────────────────────────────────
// Polling
// ──────────────────────────────────────────
async function fetchDashboard() {
  try {
    const r = await fetch(`${SERVER_URL}/api/dashboard`, {
      signal: AbortSignal.timeout(8000)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    lastData = data;
    setConnected(true);
    renderAll(data);
  } catch(e) {
    setConnected(false);
    // 仍顯示最後已知資料，但加上離線橫幅
    if (lastData) renderAll(lastData);
  }
}

function setConnected(ok) {
  isConnected = ok;
  const el   = document.getElementById('conn-status');
  const banner = document.getElementById('offline-banner');
  el.className = `tb-conn ${ok ? 'ok' : 'err'}`;
  el.querySelector('span').textContent = ok ? '後端已連線' : '後端離線';
  banner.classList.toggle('show', !ok);
}

// ──────────────────────────────────────────
// 渲染主函式
// ──────────────────────────────────────────
function renderAll(data) {
  const { calc, events, decisions } = data;
  renderSummaryBar(calc, decisions);
  renderConstraints(calc);
  renderShelter(calc.shelter);
  renderMedical(calc.medical);
  renderForward(calc.forward);
  renderSecurity(calc.security);
  renderDecisions(decisions.pending);
  renderEvents(events);
  renderStatusPills(calc);
  // 更新最後更新時間
  const now = new Date();
  document.getElementById('last-update-val').textContent =
    now.toLocaleTimeString('zh-TW', { hour12:false, hour:'2-digit', minute:'2-digit' });
  document.getElementById('last-update-sub').textContent = '最後更新';
}

// ──────────────────────────────────────────
// 指揮摘要列
// ──────────────────────────────────────────
function renderSummaryBar(calc, decisions) {
  const pending = decisions.pending.length;
  const cd = calc.medical?.countdown_to_red;
  const mpi = calc.medical_pressure;

  // 待裁示件數
  const pendingEl = document.getElementById('pending-val');
  pendingEl.textContent = pending;
  document.getElementById('sbm-pending').className =
    `sbm ${pending > 0 ? 'alert' : 'dim'}`;

  // 醫療警戒倒數
  const cdEl = document.getElementById('countdown-val');
  const cdSub = document.getElementById('countdown-sub');
  if (cd && cd.minutes_to_threshold !== null && !cd.already_breached) {
    cdEl.textContent = Math.round(cd.minutes_to_threshold);
    cdSub.textContent = cd.confidence === 'low' ? '分（低信心）' : '分鐘';
    document.getElementById('sbm-countdown').className =
      `sbm ${cd.minutes_to_threshold < 15 ? 'alert' : 'warn'}`;
  } else if (cd?.already_breached) {
    cdEl.textContent = '超';
    cdSub.textContent = '已超門檻';
    document.getElementById('sbm-countdown').className = 'sbm alert';
  } else {
    cdEl.textContent = '—';
    cdSub.textContent = '資料不足';
    document.getElementById('sbm-countdown').className = 'sbm dim';
  }

  // 低信心度
  document.getElementById('lowconf-val').textContent =
    calc.low_confidence_count ?? '—';

  // 局勢一句話（簡易自動生成）
  const parts = [];
  if (mpi?.level === 'critical') parts.push('醫療壓力指數 critical');
  else if (mpi?.level === 'warning') parts.push('醫療壓力警告');
  if (pending > 0) parts.push(`${pending} 件待裁示`);
  const fwdUnits = calc.forward?.units || [];
  const hasLKP = fwdUnits.some(u => u.freshness?.level === 'lkp');
  if (hasLKP) parts.push('前進組 LKP');
  document.getElementById('sb-headline').textContent =
    parts.length > 0 ? parts.join('，') : '各組狀態正常';

  // 主戰點
  const focuses = [];
  const medSnap = calc.medical?.snapshot;
  if (medSnap?.waiting_count > 3)
    focuses.push({ text: `醫療等待`, num: medSnap.waiting_count, unit: '人' });
  if (cd?.minutes_to_threshold < 20 && !cd?.already_breached)
    focuses.push({ text: `醫療警戒倒數`, num: Math.round(cd.minutes_to_threshold), unit: '分', crit: true });
  if (pending > 0)
    focuses.push({ text: `待裁示`, num: pending, unit: '件' });
  fwdUnits.filter(u => u.freshness?.level === 'lkp').forEach(u => {
    focuses.push({ text: `前進${u.unit} LKP`, num: Math.round(u.freshness.minutes), unit: '分', crit: true });
  });

  document.getElementById('sb-focus-row').innerHTML = focuses.slice(0, 4).map(f =>
    `<div class="sb-focus-item"><span>▸</span><span>${f.text} <span class="${f.crit?'crit':'num'}">${f.num}</span>${f.unit}</span></div>`
  ).join('');
}

// ──────────────────────────────────────────
// 頂部組別狀態燈號
// ──────────────────────────────────────────
function renderStatusPills(calc) {
  const pills = [];
  const defs = [
    { key: 'forward',  label: '前進組' },
    { key: 'medical',  label: '醫療組' },
    { key: 'shelter',  label: '收容組' },
    { key: 'security', label: '安全組' },
  ];
  defs.forEach(d => {
    const f = calc[d.key]?.freshness;
    const level = f?.level || 'lkp';
    const cls = level === 'ok' ? 'sp-g' : level === 'warn' ? 'sp-y' : 'sp-r';
    const label = level === 'ok' ? '正常' : level === 'warn' ? '注意' : level === 'lkp' ? 'LKP' : '逾時';
    pills.push(`<div class="sp ${cls}"><div class="dot"></div>${d.label} ${label}</div>`);
  });
  document.getElementById('status-pills').innerHTML = pills.join('');
}

// ──────────────────────────────────────────
// 橫向限制條件
// ──────────────────────────────────────────
function renderConstraints(calc) {
  // 安全
  const sec = calc.security?.snapshot;
  const secExtra = sec?.extra || {};
  const anomaly = secExtra.post_anomaly;
  const iso = secExtra.isolation_count || 0;
  const qrf = secExtra.qrf_available || 0;
  const secLevel = anomaly ? 'warn' : 'ok';
  setConstraint('security', secLevel,
    anomaly ? `<span class="mid">${anomaly}異常</span>，隔離${iso}人，QRF ${qrf}` : `無異常，QRF ${qrf}人待命`);

  // 通聯（依前進組新鮮度）
  const fwdUnits = calc.forward?.units || [];
  const hasLKP  = fwdUnits.some(u => u.freshness?.level === 'lkp');
  const hasCrit = fwdUnits.some(u => u.freshness?.level === 'crit');
  const commsLevel = hasLKP ? 'lkp' : hasCrit ? 'crit' : calc.forward?.freshness?.level || 'lkp';
  const lkpUnits = fwdUnits.filter(u => u.freshness?.level === 'lkp');
  setConstraint('comms', commsLevel,
    lkpUnits.length > 0
      ? `前進${lkpUnits.map(u=>u.unit).join('/')} <span class="hi">LKP ${Math.round(lkpUnits[0]?.freshness?.minutes||0)}分</span>`
      : '前進組通聯正常');

  // 補給（醫療物資）
  const medExtra = calc.medical?.snapshot?.extra || {};
  const sup = medExtra.supplies || {};
  const iv = sup.iv ?? sup.saline;
  const supLevel = (iv !== undefined && iv <= 2) ? 'crit' : (iv !== undefined && iv <= 5) ? 'warn' : 'ok';
  setConstraint('supply', supLevel,
    iv !== undefined
      ? `輸液(IV) <span class="${supLevel==='crit'?'hi':'mid'}">${iv}袋</span>`
      : '補給資料待更新');

  // 機動預備（後送車輛）
  const medSnap = calc.medical?.snapshot;
  const veh = medSnap?.vehicle_available;
  const pe  = medSnap?.pending_evac || 0;
  const mobLevel = (veh !== null && veh !== undefined && veh === 0) ? 'crit' :
                   (pe > 0) ? 'warn' : 'ok';
  setConstraint('mobility', mobLevel,
    veh !== null && veh !== undefined
      ? `後送車 ${veh} 可用，待後送 ${pe} 人`
      : `待後送 ${pe} 人`);
}

function setConstraint(key, level, valHtml) {
  document.getElementById(`cst-dot-${key}`).className = `cst-dot ${level}`;
  document.getElementById(`cst-val-${key}`).innerHTML = valHtml;
}

// ──────────────────────────────────────────
// 收容組
// ──────────────────────────────────────────
function renderShelter(data) {
  setFreshness('shelter', data?.freshness);
  const snap = data?.snapshot;
  if (!snap) { document.getElementById('panel-shelter').innerHTML = `<div class="no-data">無資料</div>`; return; }

  const extra = snap.extra || {};
  const srt   = extra.srt || {};
  const bedPct   = snap.bed_total ? snap.bed_used / snap.bed_total : 0;
  const bedClass = bedPct >= 0.9 ? 'crit' : bedPct >= 0.7 ? 'warn' : 'ok';
  const t = data.bed_trend;

  document.getElementById('panel-shelter').innerHTML = `
    <div class="cblock">
      <div class="cl">床位使用</div>
      <div class="cratio"><span class="now ${bedClass}">${snap.bed_used||'—'}</span><span class="sl">/</span><span class="mx">${snap.bed_total||'—'}</span><span class="u">床</span></div>
      <div class="cap"><div class="cap-f ${bedClass}" style="width:${Math.min(bedPct*100,100).toFixed(1)}%"></div>
        <div class="cap-tick" style="left:70%"></div><div class="cap-tick" style="left:90%"></div></div>
      ${trendLine(t)}
    </div>
    <div class="cblock">
      <div class="cl">SRT 狀態</div>
      <div class="pill-row">
        <div class="pill r"><span>Red+</span><b>${srt.red||0}</b></div>
        <div class="pill y"><span>Yellow</span><b>${srt.yellow||0}</b></div>
        <div class="pill g"><span>Green</span><b>${srt.green||0}</b></div>
      </div>
      <div class="kv-row">
        <span>待入站</span><span class="v ${(extra.pending_intake||0)>5?'crit':(extra.pending_intake||0)>2?'warn':''}">${extra.pending_intake||0}</span>
        <span>CMIST待</span><span class="v ${(extra.cmist_pending||0)>0?'warn':''}">${extra.cmist_pending||0}</span>
      </div>
    </div>
    <div class="cblock">
      <div class="cl">值勤人員</div>
      <div class="cratio"><span class="now">${snap.staff_on_duty||'—'}</span><span class="u">人</span></div>
    </div>`;
}

// ──────────────────────────────────────────
// 醫療組
// ──────────────────────────────────────────
function renderMedical(data) {
  setFreshness('medical', data?.freshness);
  const snap = data?.snapshot;
  if (!snap) { document.getElementById('panel-medical').innerHTML = `<div class="no-data">無資料</div>`; return; }

  const extra  = snap.extra || {};
  const sup    = extra.supplies || {};
  const bedPct = snap.bed_total ? snap.bed_used / snap.bed_total : 0;
  const bedClass = bedPct >= 0.9 ? 'crit' : bedPct >= 0.7 ? 'warn' : 'ok';
  const t   = data.bed_trend;
  const cd  = data.countdown_to_red;
  const ivAmt  = sup.iv ?? sup.saline;
  const ivInit = 10;
  const ivClass = (ivAmt !== undefined && ivAmt <= 2) ? 'crit' : (ivAmt !== undefined && ivAmt <= 5) ? 'warn' : '';

  document.getElementById('panel-medical').innerHTML = `
    <div class="cblock">
      <div class="cl">床位使用</div>
      <div class="cratio"><span class="now ${bedClass}">${snap.bed_used||'—'}</span><span class="sl">/</span><span class="mx">${snap.bed_total||'—'}</span><span class="u">床</span></div>
      <div class="cap"><div class="cap-f ${bedClass}" style="width:${Math.min(bedPct*100,100).toFixed(1)}%"></div>
        <div class="cap-tick" style="left:70%"></div><div class="cap-tick" style="left:90%"></div></div>
      ${trendLine(t)}
      ${cd?.minutes_to_threshold !== null && !cd?.already_breached
        ? `<div style="font-family:var(--mono);font-size:9px;color:${cd.minutes_to_threshold<15?'var(--red)':'var(--yellow)'};margin-top:2px">警戒倒數 ${Math.round(cd.minutes_to_threshold)}分 ${cd.confidence==='low'?'（低信心）':''}</div>`
        : cd?.already_breached ? `<div style="font-family:var(--mono);font-size:9px;color:var(--red)">⚠ 已超門檻</div>` : ''}
    </div>
    <div class="cblock">
      <div class="cl">傷患狀態</div>
      <div class="pill-row">
        <div class="pill r"><span>紅</span><b>${snap.casualties_red||0}</b></div>
        <div class="pill y"><span>黃</span><b>${snap.casualties_yellow||0}</b></div>
        <div class="pill g"><span>綠</span><b>${snap.casualties_green||0}</b></div>
        <div class="pill k"><span>黑</span><b>${snap.casualties_black||0}</b></div>
      </div>
      <div class="kv-row">
        <span>等待進入</span><span class="v ${(snap.waiting_count||0)>3?'crit':(snap.waiting_count||0)>1?'warn':''}">${snap.waiting_count||0}</span>
        <span>待後送</span><span class="v">${snap.pending_evac||0}</span>
      </div>
    </div>
    ${ivAmt !== undefined ? `
    <div class="cblock">
      <div class="cl">管制物資</div>
      <div class="sup-row">
        <div class="sup-item"><span class="sn">靜脈輸液(IV)</span><span class="sv ${ivClass}">${ivAmt}/${ivInit}</span></div>
        ${sup.tourniquet !== undefined ? `<div class="sup-item"><span class="sn">止血帶</span><span class="sv ${sup.tourniquet<=6?'warn':''}">${sup.tourniquet}/30</span></div>` : ''}
        ${sup.oxygen    !== undefined ? `<div class="sup-item"><span class="sn">氧氣瓶</span><span class="sv">${sup.oxygen}/3</span></div>` : ''}
      </div>
    </div>` : ''}
    <div class="cblock">
      <div class="cl">值勤人員</div>
      <div class="cratio"><span class="now">${snap.staff_on_duty||'—'}</span><span class="u">人</span></div>
    </div>`;
}

// ──────────────────────────────────────────
// 前進組
// ──────────────────────────────────────────
function renderForward(data) {
  setFreshness('forward', data?.freshness);
  const units = data?.units || [];
  if (!units.length) {
    document.getElementById('panel-forward').innerHTML = `<div class="no-data">無資料</div>`;
    return;
  }

  let html = '';
  units.forEach(u => {
    const f = u.freshness || {};
    const isLKP  = f.level === 'lkp';
    const isCrit = u.casualties?.red >= 2 || isLKP;
    const isWarn = u.casualties?.red >= 1 || f.level === 'warn';
    const cls = isCrit ? 'crit' : isWarn ? 'warn' : 'ok';
    const tagCls = isCrit ? 'tag-r' : isWarn ? 'tag-y' : 'tag-g';
    const tagLabel = isCrit ? '緊急' : isWarn ? '注意' : '正常';
    const c = u.casualties || {};
    html += `
      <div class="fwd-unit ${cls}" onclick="openModal('forward')">
        <div class="fwd-header">
          <div class="fwd-name">前進 ${u.unit}</div>
          <span class="tag ${tagCls}" style="font-size:9px;padding:1px 5px">${tagLabel}</span>
        </div>
        <div class="pill-row">
          <div class="pill r" style="padding:2px 3px"><span>紅</span><b>${c.red||0}</b></div>
          <div class="pill y" style="padding:2px 3px"><span>黃</span><b>${c.yellow||0}</b></div>
          <div class="pill g" style="padding:2px 3px"><span>綠</span><b>${c.green||0}</b></div>
          <div class="pill k" style="padding:2px 3px"><span>黑</span><b>${c.black||0}</b></div>
        </div>
        ${u.vehicle_needed > 0 ? `<div style="font-size:10px;color:var(--yellow);margin-top:3px">需後送車 ${u.vehicle_needed} 輛</div>` : ''}
        ${u.hazard && u.hazard !== 'none' ? `<div style="font-size:10px;color:var(--red);margin-top:2px">⚠ 危害：${u.hazard}</div>` : ''}
        ${isLKP ? `<div class="stale lkp">⬜ LKP ${Math.round(f.minutes||0)}分　位置僅供參考</div>` :
          f.level === 'crit' ? `<div class="stale">⚠ ${Math.round(f.minutes||0)}分未更新</div>` : ''}
      </div>`;
  });
  document.getElementById('panel-forward').innerHTML = html;
  renderForwardMap(units);
}

// ──────────────────────────────────────────
// 安全組
// ──────────────────────────────────────────
function renderSecurity(data) {
  setFreshness('security', data?.freshness);
  const snap  = data?.snapshot;
  const extra = snap?.extra || {};
  if (!snap) { document.getElementById('panel-security').innerHTML = `<div class="no-data">無資料</div>`; return; }

  const posts = extra.post_total || 0;
  const qrf   = extra.qrf_available || 0;
  const iso   = extra.isolation_count || 0;
  const anomaly = extra.post_anomaly;

  document.getElementById('panel-security').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:3px;margin-bottom:5px">
      ${Array.from({length: posts}, (_, i) => {
        const name = `哨 ${i+1}`;
        const isAnomaly = anomaly && anomaly.includes(`哨${i+1}`);
        return `<div style="display:grid;grid-template-columns:38px 1fr auto;align-items:center;gap:5px;
          padding:4px 7px;background:${isAnomaly?'var(--yellow-bg)':'var(--bg)'};
          border:1px solid ${isAnomaly?'var(--yellow-b)':'var(--border)'};border-radius:4px">
          <div style="font-family:var(--mono);font-size:11px;font-weight:700">${name}</div>
          <div style="font-size:10px;color:var(--text-dim)">${isAnomaly?'<span style="color:var(--yellow)">異常</span>':'正常'}</div>
          <span class="tag ${isAnomaly?'tag-y':'tag-g'}" style="font-size:9px;padding:1px 4px">${isAnomaly?'注意':'正常'}</span>
        </div>`;
      }).join('')}
      ${posts === 0 ? `<div class="no-data">哨位資料待更新</div>` : ''}
    </div>
    <div style="display:flex;gap:5px">
      <div class="cblock" style="flex:1;margin-bottom:0">
        <div class="cl">值勤</div>
        <div class="cratio" style="gap:0"><span class="now">${snap.staff_on_duty||'—'}</span><span class="u">人</span></div>
      </div>
      <div class="cblock" style="flex:1;margin-bottom:0;${iso>0?'border-color:var(--yellow-b);background:var(--yellow-bg)':''}">
        <div class="cl" style="${iso>0?'color:var(--yellow)':''}">隔離</div>
        <div style="font-family:var(--mono);font-size:16px;font-weight:700;${iso>0?'color:var(--yellow)':''}">${iso}</div>
        <div style="font-size:9px;color:var(--text-dim)">人</div>
      </div>
      <div class="cblock" style="flex:1;margin-bottom:0;border-color:var(--green-b);background:var(--green-bg)">
        <div class="cl" style="color:var(--green)">QRF</div>
        <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)">待命</div>
        <div style="font-size:9px;color:var(--green)">${qrf}人</div>
      </div>
    </div>`;
}

// ──────────────────────────────────────────
// 待裁示事項
// ──────────────────────────────────────────
function renderDecisions(pending) {
  const tag = document.getElementById('pending-tag');
  tag.textContent = `${pending.length} 件`;
  tag.className = `tag ${pending.length > 0 ? 'tag-r' : 'tag-dim'}`;

  if (!pending.length) {
    document.getElementById('dec-scroll').innerHTML =
      `<div style="text-align:center;padding:20px;font-size:11px;color:var(--text-dim)">目前無待裁示事項</div>`;
    return;
  }

  document.getElementById('dec-scroll').innerHTML = pending.map(d => `
    <div class="dcard ${d.severity}" id="dc-${d.id}">
      <div class="dcard-head">
        <div class="dcard-title">${d.decision_title}</div>
        <div><span class="tag ${d.severity==='critical'?'tag-r':'tag-y'}" style="font-size:9px">${d.severity}</span>
             <span class="dcard-seq">seq.${d.decision_seq}</span></div>
      </div>
      <div class="dcard-impact">${d.impact_description}</div>
      <div class="dcard-actions">
        <div class="dcard-action"><span class="alabel">A：</span><span>${d.suggested_action_a}</span></div>
        ${d.suggested_action_b ? `<div class="dcard-action"><span class="alabel">B：</span><span>${d.suggested_action_b}</span></div>` : ''}
      </div>
      <div class="dcard-btns">
        <button class="dbtn approve"  onclick="decide('${d.id}','approved',this)">✓ 核可</button>
        <button class="dbtn hold"     onclick="decide('${d.id}','hold',this)">⏸ 暫緩</button>
        <button class="dbtn redirect" onclick="decide('${d.id}','redirect',this)">↩ 改派</button>
      </div>
    </div>
  `).join('');
}

async function decide(id, action, btn) {
  const decided_by = prompt('裁示者（姓名）：');
  if (!decided_by?.trim()) return;
  btn.disabled = true;
  try {
    const r = await fetch(`${SERVER_URL}/api/decisions/${id}/decide`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, decided_by, execution_note: '' }),
    });
    if (!r.ok) throw new Error((await r.json()).detail);
    // 立即從 DOM 移除此卡片（下次 poll 會更新完整列表）
    document.getElementById(`dc-${id}`)?.remove();
  } catch(e) {
    alert(`裁示失敗：${e.message}`);
    btn.disabled = false;
  }
}

// ──────────────────────────────────────────
// 事件列表
// ──────────────────────────────────────────
function renderEvents(events) {
  const open = events.filter(e => e.status === 'open').length;
  const prog = events.filter(e => e.status === 'in_progress').length;
  document.getElementById('ev-counts').innerHTML =
    `<span class="crit">🔴 未結 <b>${open+prog}</b></span>`;

  document.getElementById('ev-tbody').innerHTML = events.slice(0, 8).map(ev => {
    const age = minsAgo(ev.occurred_at);
    const isSev = ev.severity === 'critical';
    const isWarn = ev.severity === 'warning';
    const statusTag = ev.status === 'open' && isSev ? `<span class="tag tag-r">緊急</span>` :
                      ev.status === 'in_progress'   ? `<span class="tag tag-y">處理中</span>` :
                      ev.status === 'open'           ? `<span class="tag tag-b">待處理</span>` :
                      `<span class="tag tag-dim">${ev.status}</span>`;
    const elCls = age > 30 ? 'el-ov' : age > 10 ? 'el-wn' : 'el-ok';
    return `<tr onclick="openEventModal('${ev.id}')">
      <td style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">${fmtTime(ev.occurred_at)}</td>
      <td><span class="tag tag-dim">${ev.reported_by_unit}</span></td>
      <td>${ev.description.slice(0, 18)}${ev.description.length>18?'…':''}</td>
      <td>${statusTag}</td>
      <td><span class="el ${elCls}">${Math.round(age)}分</span></td>
      <td style="font-size:10px">${ev.operator_name}</td>
    </tr>`;
  }).join('');
}

async function openEventModal(id) {
  try {
    const r = await fetch(`${SERVER_URL}/api/events`);
    const events = await r.json();
    const ev = events.find(e => e.id === id);
    if (!ev) return;
    document.getElementById('mt').textContent = ev.description.slice(0, 40);
    document.getElementById('mb').innerHTML = `
      <div class="mr">
        <div class="mf"><div class="ml">組別</div><div class="mv">${ev.reported_by_unit}</div></div>
        <div class="mf"><div class="ml">狀態</div><div class="mv">${ev.status}</div></div>
      </div>
      <div class="mr">
        <div class="mf"><div class="ml">時間</div><div class="mv">${ev.occurred_at}</div></div>
        <div class="mf"><div class="ml">位置</div><div class="mv">${ev.location_desc||'—'}</div></div>
      </div>
      <div class="mf"><div class="ml">說明</div><div class="mv">${ev.description}</div></div>
      <div class="mf"><div class="ml">操作者</div><div class="mv">${ev.operator_name}</div></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        ${ev.status==='open'?`<button onclick="updateEvent('${ev.id}','in_progress','${ev.operator_name}')" style="font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:4px;border:1px solid var(--yellow-b);background:var(--yellow-bg);color:var(--yellow);cursor:pointer">接手處理</button>`:''}
        ${ev.status!=='resolved'?`<button onclick="updateEvent('${ev.id}','resolved','${ev.operator_name}')" style="font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:4px;border:1px solid var(--green-b);background:var(--green-bg);color:var(--green);cursor:pointer">標記結案</button>`:''}
      </div>`;
    document.getElementById('mbg').classList.add('open');
  } catch(e) {}
}

async function updateEvent(id, status, operator) {
  await fetch(`${SERVER_URL}/api/events/${id}/status?status=${status}&operator=${encodeURIComponent(operator)}`, { method: 'PATCH' });
  cmc();
  fetchDashboard();
}

// ──────────────────────────────────────────
// 地圖：前進組動態
// ──────────────────────────────────────────
function renderForwardMap(units) {
  const lpGroup = document.getElementById('lp');
  let svg = `
    <circle cx="110" cy="136" r="13" fill="#2060b0" opacity=".9"/>
    <text x="110" y="133" font-family="IBM Plex Mono" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">哨1</text>
    <circle cx="42" cy="168" r="13" fill="#2060b0" opacity=".9"/>
    <text x="42" y="165" font-family="IBM Plex Mono" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">哨2</text>
    <circle cx="320" cy="284" r="13" fill="#2060b0" opacity=".9"/>
    <text x="320" y="281" font-family="IBM Plex Mono" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">哨3</text>`;
  // 前進小隊（固定示意位置）
  const positions = { A: [555, 258], B: [498, 180], C: [420, 230] };
  units.forEach(u => {
    const [cx, cy] = positions[u.unit] || [520, 220];
    const isLKP = u.freshness?.level === 'lkp';
    if (isLKP) {
      svg += `<circle cx="${cx}" cy="${cy}" r="18" fill="none" stroke="#7a8ba0" stroke-width="1.5" stroke-dasharray="4,3" opacity=".7"/>
              <text x="${cx}" y="${cy-3}" font-family="IBM Plex Mono" font-size="9" fill="#7a8ba0" text-anchor="middle">前進${u.unit}</text>
              <text x="${cx}" y="${cy+8}" font-family="IBM Plex Mono" font-size="8" fill="#7a8ba0" text-anchor="middle">LKP</text>`;
    } else {
      const fill = (u.casualties?.red||0) >= 2 ? '#cc2a2a' : '#1a9e52';
      svg += `<circle cx="${cx}" cy="${cy}" r="15" fill="${fill}" opacity=".9"/>
              <text x="${cx}" y="${cy-2}" font-family="IBM Plex Mono" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">前進${u.unit}</text>
              <text x="${cx}" y="${cy+8}" font-family="IBM Plex Mono" font-size="8" fill="#fff" text-anchor="middle">×${(u.casualties?.red||0)+(u.casualties?.yellow||0)}</text>`;
    }
  });
  lpGroup.innerHTML = svg;

  // Map note for LKP
  const lkpUnits = units.filter(u => u.freshness?.level === 'lkp');
  const noteEl = document.getElementById('map-note');
  if (lkpUnits.length > 0) {
    noteEl.style.display = '';
    noteEl.innerHTML = `⚠ 前進${lkpUnits.map(u=>u.unit).join('/')} LKP ${Math.round(lkpUnits[0]?.freshness?.minutes||0)}分<br><span style="color:var(--text-dim)">圈示為最後已知位置</span>`;
  } else {
    noteEl.style.display = 'none';
  }
}

// ──────────────────────────────────────────
// Modal
// ──────────────────────────────────────────
function openModal(section) {
  if (!lastData) return;
  const { calc, decisions } = lastData;
  let title = '', body = '';
  if (section === 'medical') {
    title = '醫療組　完整詳情';
    const snap = calc.medical?.snapshot;
    body = snap ? detailTable(snap, calc.medical) : '無資料';
  } else if (section === 'shelter') {
    title = '收容組　完整詳情';
    const snap = calc.shelter?.snapshot;
    body = snap ? detailTable(snap, calc.shelter) : '無資料';
  } else if (section === 'forward') {
    title = '前進組　完整詳情';
    body = (calc.forward?.units||[]).map(u => `
      <div class="mf">
        <div class="ml">前進 ${u.unit}　${u.freshness?.label||'—'}</div>
        <div class="mv">紅${u.casualties?.red||0} 黃${u.casualties?.yellow||0} 綠${u.casualties?.green||0} 黑${u.casualties?.black||0}
          ${u.vehicle_needed>0?`　需後送車 ${u.vehicle_needed} 輛`:''}
          ${u.hazard&&u.hazard!=='none'?`　危害: ${u.hazard}`:''}
        </div>
      </div>`).join('') || '無資料';
  } else if (section === 'security') {
    title = '安全組　完整詳情';
    const snap = calc.security?.snapshot;
    body = snap ? detailTable(snap, calc.security) : '無資料';
  } else if (section === 'events') {
    title = '事件動態　全覽';
    body = `<div style="font-size:11px;color:var(--text-dim)">點擊事件行查看詳情</div>`;
  } else {
    return;
  }
  document.getElementById('mt').textContent = title;
  document.getElementById('mb').innerHTML = body;
  document.getElementById('mbg').classList.add('open');
}

function detailTable(snap, sectionData) {
  const rows = Object.entries(snap).filter(([k,v]) => v !== null && v !== undefined && k !== 'extra').map(([k,v]) =>
    `<div class="mf"><div class="ml">${k}</div><div class="mv">${JSON.stringify(v)}</div></div>`
  ).join('');
  const f = sectionData?.freshness;
  return `
    <div class="mf" style="background:var(--surface2);border-radius:5px;padding:8px 12px;margin-bottom:10px">
      <div class="ml">新鮮度</div>
      <div class="mv">${f?.label||'—'}　（${f?.minutes?.toFixed(1)||'—'}分前）</div>
    </div>
    ${sectionData?.bed_trend ? `<div class="mf">
      <div class="ml">趨勢</div>
      <div class="mv">${sectionData.bed_trend.direction||'—'} ${sectionData.bed_trend.rate||'—'}/分　${sectionData.bed_trend.note||''}</div>
    </div>` : ''}
    ${rows}`;
}

function cmc() { document.getElementById('mbg').classList.remove('open'); }
function showConstraintDetail(key) { /* 簡易版：直接 openModal */ }

// ──────────────────────────────────────────
// 工具函式
// ──────────────────────────────────────────
function tgl(btn, id) {
  btn.classList.toggle('on');
  const el = document.getElementById(id);
  if (el) el.style.display = btn.classList.contains('on') ? '' : 'none';
}

function setFreshness(key, f) {
  if (!f) return;
  document.getElementById(`fresh-${key}`).className = `fresh ${f.level}`;
  document.getElementById(`fresh-${key}-label`).textContent = f.label;
}

function trendLine(t) {
  if (!t || t.direction === null) return `<div class="trend flat">趨勢：${t?.note||'資料不足'}</div>`;
  const dir = t.direction === 'up' ? '↑' : t.direction === 'down' ? '↓' : '→';
  const cls = t.direction === 'up' ? 'up' : t.direction === 'down' ? 'dn' : 'flat';
  const conf = t.confidence === 'low' ? '（低信心）' : t.confidence === 'insufficient' ? '（不足）' : '';
  return `<div class="trend ${cls}">${dir} ${t.rate?.toFixed(2)||'—'}/分 ${conf}</div>`;
}

function minsAgo(dtStr) {
  try { return (Date.now() - new Date(dtStr).getTime()) / 60000; }
  catch { return 0; }
}

function fmtTime(dtStr) {
  try { return new Date(dtStr).toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', hour12:false }); }
  catch { return '—'; }
}

// ──────────────────────────────────────────
// 啟動
// ──────────────────────────────────────────
fetchDashboard();
setInterval(fetchDashboard, POLL_MS);
</script>
