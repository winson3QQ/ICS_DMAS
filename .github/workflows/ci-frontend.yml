name: CI Frontend

on:
  pull_request:
    paths:
      - 'command-dashboard/static/**'
      - 'command-dashboard/tests/js/**'
      - 'command-dashboard/package.json'
      - 'command-dashboard/package-lock.json'
      - 'command-dashboard/eslint.config.js'
      - '.github/workflows/ci-frontend.yml'
  push:
    branches: [main]
    paths:
      - 'command-dashboard/static/**'
      - 'command-dashboard/tests/js/**'
      - 'command-dashboard/package.json'
      - 'command-dashboard/package-lock.json'
      - 'command-dashboard/eslint.config.js'
      - '.github/workflows/ci-frontend.yml'

jobs:
  js-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: command-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: command-dashboard/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm test
