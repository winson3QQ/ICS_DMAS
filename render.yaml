services:
  - type: web
    name: ics-command-dashboard
    runtime: python
    buildCommand: pip install -r command-dashboard/requirements.txt
    startCommand: cd command-dashboard && PYTHONPATH=src uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
