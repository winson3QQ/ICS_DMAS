# nginx.conf — Mac 開發機用主設定
#
# Prod（C3-B 客戶部署）會用 /etc/nginx/nginx.conf + /etc/nginx/conf.d/，
# 此檔僅 dev 用，由 deploy/nginx/start-dev.sh 載入（-c 參數）。

worker_processes auto;
error_log /tmp/ics-nginx-error.log warn;
pid /tmp/ics-nginx.pid;

events {
    worker_connections 1024;
}

http {
    # MIME types（macOS Homebrew 預設路徑）
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log 格式（含 X-Forwarded-For，反代後仍見原始 IP）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /tmp/ics-nginx-access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip（API JSON 回應壓縮）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 載入 server block
    include conf.d/command.conf;
    # tier3-mtls.conf.disabled 故意不 include（C4 授權後重命名為 .conf 才會生效）
}
