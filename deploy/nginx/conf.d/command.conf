# command.conf — Command FastAPI 反代
#
# upstream: 127.0.0.1:8000（uvicorn loopback）
# 對外: :443 HTTPS + HTTP/2
# :80 → 301 redirect to :443

upstream command_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP → HTTPS 強制轉址
server {
    listen 80;
    listen [::]:80;
    server_name command.ics.local localhost;

    # ACME http-01 challenge 預留（C3-B 自動續憑證會用）
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name command.ics.local localhost;

    # 憑證（dev: deploy/step-ca/certs/，prod: /etc/ics/certs/，由 install.sh 替換）
    ssl_certificate     CERT_PATH_PLACEHOLDER;
    ssl_certificate_key KEY_PATH_PLACEHOLDER;

    include conf.d/ssl-common.conf;
    include conf.d/security-headers.conf;

    # 上傳體積上限（Pi push batch / 未來照片附件用）
    client_max_body_size 10m;

    # 反代到 FastAPI
    location / {
        proxy_pass http://command_backend;

        # 標準 proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket 升級（未來 Wave 6 即時 push 可能用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout（Pi push 偶爾慢）
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # /health 不過 auth、不記 access log（避免被監控刷爆）
    location = /api/health {
        access_log off;
        proxy_pass http://command_backend;
        proxy_set_header Host $host;
    }
}
