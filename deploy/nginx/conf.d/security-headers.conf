# security-headers.conf — 安全 HTTP 標頭基線
#
# 規格：commercialization §C1-B「HSTS、X-Frame-Options DENY、CSP、X-Content-Type-Options」
#
# 注意分工：
#   - HSTS / X-Frame-Options / X-Content-Type-Options / Referrer-Policy：由 nginx 統一注入
#   - CSP：由 FastAPI middleware 注入（與應用語義耦合，需動態 nonce/report-uri）
#
# always 旗標：4xx/5xx 也要送 header（預設只在 2xx/3xx 送）

# HSTS：1 年 + includeSubDomains，刻意不加 preload（見 README）
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# 禁止任何網站 iframe 嵌入（防 clickjacking）
add_header X-Frame-Options "DENY" always;

# 禁止 MIME sniffing（防 IE/Edge 把 .txt 當 .html）
add_header X-Content-Type-Options "nosniff" always;

# Referrer 跨源時只送 origin，同源送完整 URL
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy：禁用 camera/microphone/geolocation（PWA 不需要）
# 若未來醫療 PWA 要拍照存證，再個別開
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
