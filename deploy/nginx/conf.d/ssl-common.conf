# ssl-common.conf — TLS 設定基線（Mozilla Intermediate 2024-09）
#
# 適用：所有 server block include 此檔
# 規格：commercialization §C1-B「TLS 1.2+，建議 TLS 1.3」
# 依據：https://ssl-config.mozilla.org/#server=nginx&config=intermediate

# 協定版本
ssl_protocols TLSv1.2 TLSv1.3;

# Cipher（TLS 1.2，TLS 1.3 cipher 由 OpenSSL 自選不受此控制）
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;

# Session 重用（效能）
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;  # 約 40000 sessions
ssl_session_tickets off;            # 業界標準關閉，避免 session ticket key 洩漏風險

# OCSP stapling（生產環境啟用，dev 可能無 OCSP responder 故 off）
ssl_stapling off;
ssl_stapling_verify off;
